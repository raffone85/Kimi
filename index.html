<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="color-scheme" content="only light">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#F1F4FB">
<title>Match Analyzer Pro – Fase 5 · Smart Advisor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
/* ==================== FORZA TEMA CHIARO ==================== */
:root{color-scheme: only light}
html{color-scheme: only light; forced-color-adjust: none}

/* ==================== DESIGN TOKENS - TEMA LIGHT CON CARD SCURE ==================== */
*{margin:0;padding:0;box-sizing:border-box}
:root{
 /* SFONDI: pagina chiara, card scure per contrasto massimo */
 --bg-page:#F1F4FB;          /* sfondo pagina grigio chiaro */
 --bg-page-2:#E5EAF5;         /* variante hover sfondo */
 /* CARD: tema scuro navy come Image 2 */
 --card-1:#1D2438;            /* card primaria navy scuro */
 --card-2:#283152;            /* card secondaria (sotto-card) */
 --card-3:#323D63;            /* hover/attivo */
 --card-4:#3E4B78;            /* hover intenso */
 /* BORDI CHIARI su sfondo navy */
 --brd-card:#3E4B78;          /* bordo card su sfondo chiaro */
 --brd-inner:#4F5D8C;         /* bordo interno fra card */
 --brd-hi:#6B7BA6;            /* bordo enfasi */
 /* TESTO */
 --fg-on-light:#1D2438;        /* testo scuro su bg chiaro */
 --fg-on-light-2:#4C5775;      /* testo secondario su bg chiaro */
 --fg-on-dark-1:#FFFFFF;       /* testo su card scure */
 --fg-on-dark-2:#C8D0E4;       /* testo secondario su card scure */
 --fg-on-dark-3:#8B95B4;       /* testo terziario su card scure */
 /* COLORI SEMANTICI */
 --ok:#4CE087;--ok2:#22C55E;--ok-bg:rgba(76,224,135,.18);--ok-brd:rgba(76,224,135,.5);
 --warn:#FFC452;--warn2:#D97706;--warn-bg:rgba(255,196,82,.18);--warn-brd:rgba(255,196,82,.5);
 --err:#FF7B7B;--err2:#DC2626;--err-bg:rgba(255,123,123,.18);--err-brd:rgba(255,123,123,.5);
 --info:#7DB8FF;--info-bg:rgba(125,184,255,.18);--info-brd:rgba(125,184,255,.5);
 --cta:#3B7BFF;--cta-h:#2563EB;
 --gold:#FFD866;--gold-bg:rgba(255,216,102,.2);--gold-brd:rgba(255,216,102,.6);
 --mag:#D8A0FF;--mag-bg:rgba(216,160,255,.18);--mag-brd:rgba(216,160,255,.5);
 --S:'DM Sans',system-ui,sans-serif;
 --M:'IBM Plex Mono',ui-monospace,monospace;
 --rs:10px;--rm:14px;--rl:18px;--rxl:22px;
 /* OMBRE per separare card da sfondo chiaro */
 --sh-card:0 1px 3px rgba(29,36,56,.12), 0 4px 12px rgba(29,36,56,.08), 0 12px 30px rgba(29,36,56,.06);
 --sh-card-hi:0 2px 6px rgba(29,36,56,.15), 0 8px 20px rgba(29,36,56,.12), 0 20px 48px rgba(29,36,56,.08);
 --sh-hero:0 4px 12px rgba(29,36,56,.18), 0 16px 40px rgba(29,36,56,.14), 0 0 0 1px rgba(76,224,135,.15);
}
html{font-size:15px;background:var(--bg-page) !important}
body{background:var(--bg-page) !important;color:var(--fg-on-light);font-family:var(--S);min-height:100vh;min-height:100dvh;-webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);line-height:1.5;-webkit-text-fill-color:initial}
button,input,select,textarea{font:inherit;color:inherit}
button{border:none;background:none;cursor:pointer}

/* ==================== LAYOUT ==================== */
.app{max-width:920px;margin:0 auto;padding:14px 12px 120px;min-height:100vh;min-height:100dvh;background:var(--bg-page)}

/* HEADER - su sfondo chiaro */
.hdr{padding:14px 4px 12px;margin-bottom:14px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap}
.hdr-l h1{font-size:1.5rem;font-weight:800;color:var(--fg-on-light);letter-spacing:-.5px;line-height:1.15}
.hdr-l h1 span{color:var(--ok2)}
.hdr-l .sub{font:500 .82rem var(--S);color:var(--fg-on-light-2);margin-top:3px}
.hdr-r{display:flex;gap:10px;flex-wrap:wrap}
.bk-mini{padding:10px 14px;background:var(--card-1);border:1.5px solid var(--brd-card);border-radius:11px;font:700 .95rem var(--M);color:var(--fg-on-dark-1);min-width:110px;box-shadow:var(--sh-card)}
.bk-mini .lbl{font:700 .65rem var(--S);color:var(--fg-on-dark-3);text-transform:uppercase;letter-spacing:.6px;display:block;margin-bottom:3px}
.bk-mini.pos{color:var(--ok);border-color:var(--ok-brd)}
.bk-mini.neg{color:var(--err);border-color:var(--err-brd)}

/* ==================== TAB NAV - card scura su sfondo chiaro ==================== */
.nav{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding:7px;-webkit-overflow-scrolling:touch;scrollbar-width:none;background:var(--card-1);border-radius:13px;border:1.5px solid var(--brd-card);box-shadow:var(--sh-card)}
.nav::-webkit-scrollbar{display:none}
.nav-btn{padding:10px 16px;border-radius:9px;font:600 .88rem var(--S);color:var(--fg-on-dark-2);white-space:nowrap;transition:all .15s;flex-shrink:0;display:flex;align-items:center;gap:6px;border:1px solid transparent;background:transparent}
.nav-btn:hover{color:var(--fg-on-dark-1);background:var(--card-2);border-color:var(--brd-inner)}
.nav-btn.active{background:var(--card-3);color:#fff;border-color:var(--brd-hi);box-shadow:0 2px 8px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.1)}
.nav-btn .ico{font-size:1rem}

/* ==================== PANNELLO UPLOAD - card scura ==================== */
.panel{background:var(--card-1);border:1.5px solid var(--brd-card);border-radius:var(--rm);padding:16px;margin-bottom:14px;box-shadow:var(--sh-card);color:var(--fg-on-dark-1)}
.panel-tg{display:flex;align-items:center;justify-content:space-between;padding:2px 0;cursor:pointer;user-select:none}
.panel-tg h3{font-size:1.08rem;font-weight:700;color:#fff;display:flex;align-items:center;gap:8px}
.panel-tg h3 .n{font:700 .78rem var(--M);color:var(--fg-on-dark-1);padding:3px 10px;background:var(--card-3);border:1px solid var(--brd-inner);border-radius:6px}
.panel-tg .arrow{color:var(--fg-on-dark-2);font-size:1rem;transition:transform .2s;padding:6px 10px;background:var(--card-2);border-radius:7px;border:1px solid var(--brd-inner);line-height:1}
.panel-tg.open .arrow{transform:rotate(180deg);background:var(--card-3);color:var(--ok)}
.panel-body{max-height:0;overflow:hidden;transition:max-height .35s ease}
.panel-body.open{max-height:3000px;padding-top:16px}

/* CARD UPLOAD DATASET - sotto-card dentro panel scuro */
.up-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}
.up-card{position:relative;padding:13px;border:1.5px solid var(--brd-inner);border-radius:var(--rm);background:var(--card-2);display:flex;flex-direction:column;gap:8px;min-height:120px;transition:all .15s;color:var(--fg-on-dark-1)}
.up-card:hover{border-color:var(--brd-hi);background:var(--card-3);transform:translateY(-1px)}
.up-card.loaded{border:1.5px solid var(--ok-brd);background:linear-gradient(180deg,rgba(76,224,135,.1) 0%,var(--card-2) 55%)}
.up-lbl{font:700 .95rem var(--S);color:#fff;display:flex;align-items:center;gap:8px;line-height:1.25}
.up-lbl .tag-num{font:700 .72rem var(--M);color:var(--fg-on-dark-1);padding:2px 9px;background:var(--card-3);border:1px solid var(--brd-inner);border-radius:5px;margin-left:auto}
.up-meta{font:500 .83rem var(--S);color:var(--fg-on-dark-2);line-height:1.45;flex:1;display:flex;flex-direction:column;gap:3px}
.up-meta small{color:var(--fg-on-dark-3);font-size:.74rem;letter-spacing:.2px}
.up-count{color:var(--ok);font-weight:800}
.up-nofile{color:var(--fg-on-dark-3);font-weight:500;font-style:italic}
.up-actions{display:flex;gap:8px;align-items:center;margin-top:auto;padding-top:4px}
.up-btn{padding:8px 16px;background:var(--cta);border:1px solid var(--cta);border-radius:8px;color:#fff;font:700 .8rem var(--S);cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:5px;box-shadow:0 2px 4px rgba(59,123,255,.3)}
.up-btn:hover{background:var(--cta-h);transform:translateY(-1px);box-shadow:0 4px 8px rgba(59,123,255,.4)}
.up-btn.clear{background:transparent;color:var(--err);border:1px solid var(--err-brd);box-shadow:none}
.up-btn.clear:hover{background:var(--err-bg);transform:translateY(-1px)}
.up-card input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;z-index:1}
.up-card .up-actions{position:relative;z-index:2}

/* Note e status */
.up-note{margin-top:14px;padding:12px 14px;background:var(--card-2);border:1px solid var(--brd-inner);border-radius:var(--rs);color:var(--fg-on-dark-2);font:500 .82rem var(--S);line-height:1.6}
.up-note code{font-family:var(--M);background:var(--card-3);padding:2px 6px;border-radius:4px;color:var(--fg-on-dark-1);font-size:.88em}
.up-status{margin-top:12px;padding:11px 14px;border-radius:var(--rs);font:600 .86rem var(--S);border:1px solid transparent}
.up-status.ok{background:var(--ok-bg);color:var(--ok);border-color:var(--ok-brd)}
.up-status.err{background:var(--err-bg);color:var(--err);border-color:var(--err-brd)}

/* ==================== HERO BET OF THE DAY ==================== */
.hero{background:linear-gradient(160deg,var(--card-2) 0%,var(--card-1) 100%);border:2px solid var(--brd-hi);border-left:5px solid var(--ok);border-radius:var(--rxl);padding:24px 22px;margin-bottom:18px;position:relative;overflow:hidden;box-shadow:var(--sh-hero);color:var(--fg-on-dark-1)}
.hero::before{content:"";position:absolute;top:-80px;right:-60px;width:220px;height:220px;background:radial-gradient(circle,rgba(76,224,135,.2) 0%,transparent 70%);pointer-events:none}
.hero-hdr{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.hero-tag{padding:6px 13px;background:var(--gold-bg);color:var(--gold);border:1.5px solid var(--gold-brd);border-radius:8px;font:800 .78rem var(--M);letter-spacing:1.2px;text-transform:uppercase}
.hero-league{font:600 .82rem var(--S);color:var(--fg-on-dark-2);margin-left:auto;padding:5px 11px;background:var(--card-3);border:1px solid var(--brd-inner);border-radius:7px}
.hero-title{font:700 1.35rem var(--S);color:#fff;line-height:1.3;margin-bottom:6px}
.hero-sub{font:500 .82rem var(--S);color:var(--fg-on-dark-2);margin-bottom:16px;display:flex;gap:6px;flex-wrap:wrap}
.hero-grid{display:grid;grid-template-columns:auto 1fr;gap:22px;align-items:center;margin-bottom:16px}
.hero-pick{display:flex;flex-direction:column;gap:10px}
.hero-market{font:800 1.2rem var(--S);color:#fff;padding:8px 0;border-bottom:1px solid var(--brd-inner)}
.hero-odds{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.hero-odds .it{display:flex;flex-direction:column;padding:10px 13px;background:var(--card-3);border:1px solid var(--brd-inner);border-radius:9px}
.hero-odds .lb{font:700 .7rem var(--S);color:var(--fg-on-dark-3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px}
.hero-odds .vl{font:800 1.12rem var(--M);color:#fff}
.hero-odds .vl.ok{color:var(--ok)}
.hero-odds .vl.info{color:var(--info)}
.hero-narr{padding:14px 16px;background:rgba(0,0,0,.25);border:1px solid var(--brd-inner);border-left:3px solid var(--ok);border-radius:var(--rs);color:var(--fg-on-dark-1);font:400 .92rem var(--S);line-height:1.65;margin-bottom:14px}
.hero-cta{display:flex;gap:10px;flex-wrap:wrap}

/* BUTTONS globali */
.btn{padding:12px 18px;border-radius:10px;font:700 .9rem var(--S);transition:all .15s;display:inline-flex;align-items:center;gap:6px;cursor:pointer;border:1.5px solid transparent}
.btn-primary{background:var(--cta);color:#fff;border-color:var(--cta);box-shadow:0 3px 8px rgba(59,123,255,.35)}
.btn-primary:hover{background:var(--cta-h);transform:translateY(-1px);box-shadow:0 5px 14px rgba(59,123,255,.45)}
.btn-ghost{background:var(--card-2);color:var(--fg-on-dark-1);border-color:var(--brd-inner)}
.btn-ghost:hover{border-color:var(--brd-hi);background:var(--card-3);transform:translateY(-1px)}
.btn-ok{background:var(--ok-bg);color:var(--ok);border-color:var(--ok-brd)}
.btn-ok:hover{background:rgba(76,224,135,.28);transform:translateY(-1px)}

/* ==================== GAUGE SVG ==================== */
.gauge{position:relative;width:124px;height:124px}
.gauge.sm{width:74px;height:74px}
.gauge svg{transform:rotate(-90deg)}
.gauge .bg-ring{fill:none;stroke:var(--card-3);stroke-width:10}
.gauge .fg-ring{fill:none;stroke:var(--ok);stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset .6s ease,stroke .3s}
.gauge.sm .bg-ring,.gauge.sm .fg-ring{stroke-width:7}
.gauge .lbl{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.gauge .lbl .v{font:800 1.5rem var(--M);color:#fff;line-height:1}
.gauge.sm .lbl .v{font-size:1.1rem}
.gauge .lbl .t{font:700 .6rem var(--S);color:var(--fg-on-dark-3);text-transform:uppercase;letter-spacing:.7px;margin-top:3px}
.gauge.sm .lbl .t{font-size:.5rem}
.gauge.g-ok .fg-ring{stroke:var(--ok)}
.gauge.g-wa .fg-ring{stroke:var(--warn)}
.gauge.g-er .fg-ring{stroke:var(--err)}

/* Card contiene gauge? testo chiaro */
.card .gauge .lbl .v, .hero .gauge .lbl .v{color:#fff}
.card .gauge .lbl .t{color:var(--fg-on-dark-3)}

/* ==================== SEZIONI ==================== */
.sec{display:flex;align-items:center;gap:10px;margin:24px 4px 14px;padding-bottom:10px;border-bottom:2px solid var(--card-1)}
.sec h2{font:700 1.15rem var(--S);color:var(--fg-on-light);display:flex;align-items:center;gap:8px}
.sec .ct{font:700 .8rem var(--S);color:var(--fg-on-dark-1);margin-left:auto;padding:5px 11px;background:var(--card-1);border:1px solid var(--brd-card);border-radius:7px}
.sec .ico{font-size:1.15rem}

/* ==================== CARD MATCH - card scura su sfondo chiaro ==================== */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
.card{background:var(--card-1);border:1.5px solid var(--brd-card);border-radius:var(--rm);padding:15px;transition:all .15s;position:relative;cursor:pointer;box-shadow:var(--sh-card);color:var(--fg-on-dark-1)}
.card:hover{border-color:var(--brd-hi);background:var(--card-2);transform:translateY(-2px);box-shadow:var(--sh-card-hi)}
.card-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:11px;padding-bottom:11px;border-bottom:1px solid var(--brd-inner)}
.card-info{flex:1;min-width:0}
.card-league{font:700 .72rem var(--S);color:var(--ok);margin-bottom:4px;text-transform:uppercase;letter-spacing:.55px;display:flex;align-items:center;gap:7px}
.card-league .time{color:var(--fg-on-dark-3);font-weight:500;letter-spacing:0}
.card-match{font:700 1.02rem var(--S);color:#fff;line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:2px}
.card-body{display:flex;flex-direction:column;gap:9px}
.card-market{font:700 1.02rem var(--S);color:#fff;display:flex;align-items:center;gap:7px}
.card-market::before{content:"▸";color:var(--ok);font-size:.95rem}
.card-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:11px;background:var(--card-2);border:1px solid var(--brd-inner);border-radius:var(--rs)}
.card-stats .s{display:flex;flex-direction:column;gap:3px}
.card-stats .lb{font:700 .62rem var(--S);color:var(--fg-on-dark-3);text-transform:uppercase;letter-spacing:.55px}
.card-stats .vl{font:700 .98rem var(--M);color:#fff}
.card-stats .vl.ok{color:var(--ok)}
.card-stats .vl.warn{color:var(--warn)}
.card-stats .vl.err{color:var(--err)}
.card-badges{display:flex;gap:7px;flex-wrap:wrap;padding:4px 0}
.card-foot{display:flex;align-items:center;justify-content:space-between;gap:8px;padding-top:10px;border-top:1px solid var(--brd-inner);margin-top:4px}
.card-foot-l{display:flex;align-items:center;gap:8px;font:500 .74rem var(--S);color:var(--fg-on-dark-3)}

/* ==================== BADGE ==================== */
.bdg{padding:4px 10px;border-radius:6px;font:700 .74rem var(--M);display:inline-flex;align-items:center;gap:4px;white-space:nowrap;border:1px solid transparent}
.bdg-m1{background:var(--gold-bg);color:var(--gold);border-color:var(--gold-brd)}
.bdg-dm-ok{background:var(--ok-bg);color:var(--ok);border-color:var(--ok-brd)}
.bdg-dm-wa{background:var(--warn-bg);color:var(--warn);border-color:var(--warn-brd)}
.bdg-dm-er{background:var(--err-bg);color:var(--err);border-color:var(--err-brd)}
.bdg-val{background:var(--mag-bg);color:var(--mag);border-color:var(--mag-brd)}
.bdg-gz{background:var(--info-bg);color:var(--info);border-color:var(--info-brd)}
.bdg-neu{background:var(--card-3);color:var(--fg-on-dark-2);border-color:var(--brd-inner)}
.bdg-ok{background:var(--ok-bg);color:var(--ok);border-color:var(--ok-brd)}
.bdg-skip{background:var(--err-bg);color:var(--err);border-color:var(--err-brd)}

/* Mini buttons */
.mini-btn{padding:8px 13px;background:var(--card-2);border:1px solid var(--brd-inner);border-radius:7px;color:var(--fg-on-dark-1);font:700 .76rem var(--S);cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all .15s}
.mini-btn:hover{border-color:var(--brd-hi);background:var(--card-3);transform:translateY(-1px)}
.mini-btn.primary{background:var(--cta);border-color:var(--cta);color:#fff}
.mini-btn.primary:hover{background:var(--cta-h)}
.mini-btn.ok{background:var(--ok-bg);color:var(--ok);border-color:var(--ok-brd)}

.card-conf{display:flex;align-items:center;gap:10px}

/* ==================== DETAILS EXPANDABLE ==================== */
details.narr{background:rgba(0,0,0,.25);border:1px solid var(--brd-inner);border-radius:var(--rs);padding:0;margin-top:8px}
details.narr summary{padding:11px 13px;cursor:pointer;font:700 .82rem var(--S);color:var(--fg-on-dark-1);list-style:none;display:flex;align-items:center;gap:7px;user-select:none;background:var(--card-2);border-radius:var(--rs);transition:all .15s}
details.narr summary::-webkit-details-marker{display:none}
details.narr summary:hover{color:var(--ok);background:var(--card-3)}
details.narr summary::before{content:"▸";transition:transform .2s;color:var(--ok);font-size:.9rem}
details.narr[open] summary::before{transform:rotate(90deg)}
details.narr[open] summary{border-bottom-left-radius:0;border-bottom-right-radius:0;border-bottom:1px solid var(--brd-inner)}
details.narr .narr-body{padding:13px 15px;font:400 .88rem var(--S);color:var(--fg-on-dark-1);line-height:1.65}
details.narr .breakdown{margin-top:11px;border-top:1px dashed var(--brd-inner);padding-top:11px}
details.narr .bk-row{display:flex;justify-content:space-between;gap:10px;padding:5px 0;font:500 .82rem var(--S)}
details.narr .bk-row .n{color:var(--fg-on-dark-2)}
details.narr .bk-row .p{font:700 .82rem var(--M);padding:2px 8px;border-radius:5px}
details.narr .bk-row .p.pos{color:var(--ok);background:var(--ok-bg)}
details.narr .bk-row .p.neg{color:var(--err);background:var(--err-bg)}
details.narr .bk-row .p.zero{color:var(--fg-on-dark-3);background:var(--card-3)}

/* ==================== EMPTY / STATUS ==================== */
.empty{text-align:center;padding:48px 24px;color:var(--fg-on-dark-2);background:var(--card-1);border:2px dashed var(--brd-hi);border-radius:var(--rm);box-shadow:var(--sh-card)}
.empty .ico{font-size:2.8rem;margin-bottom:12px;opacity:.85}
.empty p{font:500 .96rem var(--S);line-height:1.65;margin:0 auto;max-width:46ch;color:var(--fg-on-dark-2)}
.empty p.title{font-weight:800;color:#fff;margin-bottom:10px;font-size:1.12rem}

.info-box{padding:13px 15px;background:var(--info-bg);color:var(--info);border:1.5px solid var(--info-brd);border-radius:var(--rm);font:600 .9rem var(--S);line-height:1.55;margin-bottom:12px}

<script>
/* ==================================================================
   MATCH ANALYZER PRO - FASE 5 SMART ADVISOR
   Single-file vanilla JS, pattern IIFE + revealing module
   ================================================================== */
(function(global){
"use strict";

/* ==================== COSTANTI E STATO ==================== */
const VERSION = 5;
const STORAGE_KEY = 'MAP_F5_STATE';

const DATASETS = [
 {key:'ov05pt', label:'Ov 0.5 PT', hint:'IND / Delta / Diff / COv05'},
 {key:'ggov25', label:'GG + Ov/Un 2.5', hint:'IGBc / IGBo / IGBt / MGE / PGG'},
 {key:'mg13',   label:'MG 1-3',    hint:'ICH / ICA / VarC / VarO / MGF'},
 {key:'ia',     label:'Stats IA',  hint:'TT / TIP / Corner / Falli / FG'},
 {key:'plCard', label:'Giocatori Cartellini', hint:'Tackle / Falli / Amm. / Rit.'},
 {key:'plShot', label:'Giocatori Tiri/Gol',   hint:'TT / TiP / Gol / Rit.'},
 {key:'qVal',   label:'Quote Valore 1X2', hint:'T1 / TX / T2 + DM + Spread'},
 {key:'gz',     label:'GZ Index',  hint:'GZ / GZha / IGB / MGE / Diff'},
 {key:'dm',     label:'DataMining Plus', hint:'NP / % mercati / RE / IC / RC / RO'},
 {key:'diffg',  label:'Differenziali Gol', hint:'DGT / DG / DiffC / DiffO / Qt / Qr / QrL'}
];

const W = {
 M1:    0.28,
 DM:    0.22,
 GZ:    0.13,
 DIFFG: 0.12,
 VAL:   0.09,
 IA:    0.08,
 PL:    0.08
};
const CONFLICT_LAMBDA = 8;
const COV_FLOOR = 0.70;

const M1_THR = {
 ov05pt: {ind:320, delta:-20, diff:0},
 gg:     {igbc:150, igbo:150, s12:150, pgg:55},
 o25:    {igbt:300, mge:3, diff:0},
 u25:    {diffMin:1.5, mgeLow:0, mgeHi:3},
 mg13c:  {ichLo:300, ichHi:350, varc:30},
 mg13o:  {icaLo:300, icaHi:350, varo:30}
};

const DIFF_THR = {
 dgt:    0.8,
 team:   0.3,
 dropOk: 0.05
};

const defaultState = () => ({
 version: VERSION,
 savedAt: new Date().toISOString(),
 datasets: {},
 output: null,
 bankroll: {
  total: 1000,
  segregated: 1000,
  startDay: new Date().toDateString(),
  startWeek: startOfWeekISO(),
  pl_day: 0,
  pl_week: 0,
  kellyFraction: 0.25,
  capPct: 0.05,
  afterLossActive: false
 },
 ticket: {
  legs: [],
  stake: 10
 },
 history: [],
 ui: {
  tab: 'oggi',
  uploadOpen: false,
  histFilter: 'all',
  histCategory: 'all',
  q: ''
 }
});

let S = defaultState();

const bus = (() => {
 const subs = {};
 return {
  on(ev, fn){ (subs[ev] = subs[ev] || []).push(fn); },
  emit(ev, payload){ (subs[ev] || []).forEach(fn => { try { fn(payload); } catch(e){ console.error(e); } }); }
 };
})();

/* ==================== HELPER FUNCTIONS ==================== */
function escHtml(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}

function startOfWeekISO(){
 const d = new Date();
 const dow = (d.getDay() + 6) % 7;
 d.setDate(d.getDate() - dow);
 d.setHours(0,0,0,0);
 return d.toISOString();
}

function clamp(v,mn,mx){return Math.max(mn, Math.min(mx, v));}
function round(v,d=2){const p=Math.pow(10,d);return Math.round(v*p)/p;}
function fmtN(v,d=2){if(v===null||v===undefined||Number.isNaN(v))return 'N/D';return Number(v).toFixed(d);}
function fmtPct(v,d=1){if(v===null||v===undefined||Number.isNaN(v))return 'N/D';return (Number(v)*100).toFixed(d)+'%';}
function fmtEur(v){if(v===null||v===undefined||Number.isNaN(v))return '€ -';return '€ '+Number(v).toFixed(2).replace('.',',');}

function normMatchKey(s){
 if(!s) return '';
 return String(s)
  .toLowerCase()
  .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
  .replace(/\s+vs\s+|\s+v\s+/g,' - ')
  .replace(/\s+[-–—]\s+/g,' - ')
  .replace(/[^a-z0-9\- ]/g,' ')
  .replace(/\s+/g,' ')
  .trim();
}

function timeVal(ora){
 if(!ora) return 9999;
 const m = String(ora).match(/(\d{1,2}):(\d{2})/);
 if(!m) return 9999;
 return parseInt(m[1])*60 + parseInt(m[2]);
}

function cleanTime(ora){
 if(!ora) return '';
 const m = String(ora).match(/(\d{1,2}:\d{2})/);
 return m ? m[1] : String(ora);
}

function sortTime(a,b){return timeVal(a.ora)-timeVal(b.ora);}

function parseItalianNumber(s){
 if(s===null||s===undefined) return null;
 let t = String(s).trim().replace(/^"|"$/g,'');
 if(t==='' || t==='-' || t==='N/D' || t==='ND') return null;
 t = t.replace('%','').replace(/\s/g,'');
 if(t.indexOf('.')>=0 && t.indexOf(',')>=0){
  t = t.replace(/\./g,'').replace(',','.');
 } else if(t.indexOf(',')>=0 && t.indexOf('.')<0){
  t = t.replace(',','.');
 }
 const n = parseFloat(t);
 return isNaN(n) ? null : n;
}

function pfOr0(s){ const n = parseItalianNumber(s); return n===null ? 0 : n; }
function piOr0(s){ const n = parseItalianNumber(s); return n===null ? 0 : Math.round(n); }

function std(arr){
 if(!arr.length) return 0;
 const m = arr.reduce((s,x)=>s+x,0)/arr.length;
 const v = arr.reduce((s,x)=>s+(x-m)*(x-m),0)/arr.length;
 return Math.sqrt(v);
}

function stdW(vals, weights){
 const W = weights.reduce((s,x)=>s+x,0);
 if(W<=0) return 0;
 const m = vals.reduce((s,x,i)=>s+x*weights[i],0)/W;
 const v = vals.reduce((s,x,i)=>s+weights[i]*(x-m)*(x-m),0)/W;
 return Math.sqrt(v);
}

function showToast(msg, type=''){
 const wrap = document.getElementById('toastWrap');
 if(!wrap) return;
 const t = document.createElement('div');
 t.className = 'toast ' + type;
 t.textContent = msg;
 wrap.appendChild(t);
 setTimeout(()=>{ t.style.opacity='0'; t.style.transform='translate(-50%,10px)'; setTimeout(()=>t.remove(),220); }, 2600);
}

function setUploadStatus(msg, type=''){
 const el = document.getElementById('upStatus');
 if(!el) return;
 if(!msg){ el.style.display='none'; return; }
 el.style.display = 'block';
 el.className = 'up-status ' + type;
 el.textContent = msg;
}

/* ==================== CSV PARSER ENGINE ==================== */
function detectDelimiter(firstLine){
 const candidates = [';',',','\t','|'];
 let best = ',', bestCount = 0;
 for(const d of candidates){
  let c = 0, inQ = false;
  for(let i=0;i<firstLine.length;i++){
   const ch = firstLine[i];
   if(ch === '"') inQ = !inQ;
   else if(ch === d && !inQ) c++;
  }
  if(c > bestCount){ bestCount = c; best = d; }
 }
 return best;
}

function splitCsvLine(line, sep){
 const out = [];
 let cur = '', inQ = false;
 for(let i=0;i<line.length;i++){
  const ch = line[i];
  if(ch === '"'){
   if(inQ && line[i+1]==='"'){ cur += '"'; i++; }
   else inQ = !inQ;
  } else if(ch === sep && !inQ){
   out.push(cur); cur='';
  } else cur += ch;
 }
 out.push(cur);
 return out.map(x => x.replace(/^"|"$/g,'').trim());
}

function parseCsvLines(text){
 return text.replace(/^\uFEFF/,'').replace(/\r\n?/g,'\n').trim().split('\n').filter(l=>l.trim()!=='');
}

function buildHeaderIndex(headerArr){
 const idx = {};
 headerArr.forEach((h,i) => { idx[h.trim()] = i; });
 return idx;
}

function gCell(row, idx, name){
 const i = idx[name];
 if(i === undefined) return '';
 return (row[i]===undefined||row[i]===null) ? '' : String(row[i]).trim();
}

function parseOv05pt(text){
 const L = parseCsvLines(text); if(L.length<2) return [];
 const sep = detectDelimiter(L[0]);
 const hdr = splitCsvLine(L[0], sep);
 const ix = buildHeaderIndex(hdr);
 const rows = [];
 for(let i=1;i<L.length;i++){
  const f = splitCsvLine(L[i], sep);
  if(f.length < 3) continue;
  const evento = gCell(f,ix,'EVENTO');
  if(!evento) continue;
  const u5raw = gCell(f,ix,'U5[C|O]');
  const u5ctraw = gCell(f,ix,'U5CT[C|O]');
  const splitBar = v => {
   if(!v) return [0,0];
   const p = v.split('|').map(x=>parseInt(x)||0);
   return [p[0]||0, p[1]||0];
  };
  rows.push({
   ora: cleanTime(gCell(f,ix,'ORA')),
   evento,
   rpt: gCell(f,ix,'Rpt'),
   ind: piOr0(gCell(f,ix,'IND')) || 999,
   qrOv05: pfOr0(gCell(f,ix,'QROv0.5pt')) || pfOr0(gCell(f,ix,'QrOv0.5pt')),
   delta: pfOr0(gCell(f,ix,'Delta')),
   u5: splitBar(u5raw),
   u5ct: splitBar(u5ctraw),
   diff: pfOr0(gCell(f,ix,'Diff')),
   mge: pfOr0(gCell(f,ix,'MGE')),
   cov05: pfOr0(gCell(f,ix,'COv0.5%')),
   oov05: pfOr0(gCell(f,ix,'OOv0.5%')),
   qrGG: pfOr0(gCell(f,ix,'QrGG')),
   qrO25: pfOr0(gCell(f,ix,'QrO25')),
   _key: normMatchKey(evento)
  });
 }
 return rows;
}

function parseGGov25(text){

 const sep = detectDelimiter(L[0]);

 for(let i=1;i<L.length;i++){

  if(f.length < 3) continue;
  let oraRaw = gCell(f,ix,'ORA') || gCell(f,ix,'DATA EV.');
  const tm = String(oraRaw).match(/(\d{1,2}:\d{2})/);

function parseIA(text){
 const L = parseCsvLines(text); if(L.length<2) return [];
 const sep = detectDelimiter(L[0]);
 const hdr = splitCsvLine(L[0], sep);
 const ix = buildHeaderIndex(hdr);
 const rows = [];
 for(let i=1;i<L.length;i++){
  const f = splitCsvLine(L[i], sep);
  if(f.length < 3) continue;
  let oraRaw = gCell(f,ix,'DATA EV.') || gCell(f,ix,'ORA');
  const tm = String(oraRaw).match(/(\d{1,2}:\d{2})/);
  const dt = String(oraRaw).match(/(\d{2}-\d{2})/);
  const ora = (dt ? dt[1].replace('-','/')+' ' : '') + (tm ? tm[1] : '');
  const evento = gCell(f,ix,'EVENTO');
  if(!evento) continue;
  const stats = [];
  const cats = [
   ['TT','Tiri Totali','TT1X2','TTaff'],
   ['TIP','Tiri in Porta','TIP1X2','TIPaff'],
   ['COR','Corner','Cor1X2','CorAff'],
   ['FAL','Falli','Fal1X2','FalAff'],
   ['FG','Fuorigioco','FG1X2','FGaff']
  ];
  cats.forEach(([k,lbl,kp,ka]) => {
   const pred = gCell(f,ix,kp);
   const aff = pfOr0(gCell(f,ix,ka));
   if(pred) stats.push({key:k, label:lbl, pred, aff});
  });
  const affArr = stats.map(s=>s.aff);
  const maxAff = affArr.length ? Math.max(...affArr) : 0;
  const avgAff = affArr.length ? affArr.reduce((s,x)=>s+x,0)/affArr.length : 0;
  rows.push({
   ora: ora.trim(),
   evento,
   nazione: gCell(f,ix,'NAZIONE'),
   lega: gCell(f,ix,'LEGA'),
   rpt: gCell(f,ix,'RIS.'),
   stats, maxAff, avgAff,
   highCount: stats.filter(s=>s.aff>=2.5).length,
   _key: normMatchKey(evento)
  });
 }
 return rows;
}

function parseDM(text){
 const L = parseCsvLines(text); if(L.length<2) return [];
 const sep = detectDelimiter(L[0]);
 const hdr = splitCsvLine(L[0], sep);
 const findPair = (name) => {
  const first = hdr.indexOf(name);
  if(first<0) return [-1,-1];
  return [first, first+1];
 };
 const iOra = hdr.indexOf('Ora');
 const iMatch = hdr.indexOf('Match');
 const iR = hdr.indexOf('R');
 const iRpt = hdr.indexOf('Rpt');
 const iNP = hdr.indexOf('NP');
 const i1Perc = hdr.findIndex((h,i) => h === '1' && i > 5);
 const i1Quota = i1Perc + 1;
 const iXPerc = i1Quota + 1;
 const iXQuota = iXPerc + 1;
 const i2Perc = iXQuota + 1;
 const i2Quota = i2Perc + 1;
 const iMGE = hdr.indexOf('MGE');
 const iDIFF = hdr.indexOf('DIFF');
 const iGGPerc = hdr.findIndex((h,i) => h === 'GG' && i > iDIFF);
 const iGGQuota = iGGPerc + 1;
 const [iOV15P, iOV15Q] = findPair('OV15');
 const [iOV25P, iOV25Q] = findPair('OV25');
 const [iUN35P, iUN35Q] = findPair('UN35');
 const [iOV05ptP, iOV05ptQ] = findPair('OV0.5pt');
 const iIC = hdr.indexOf('IC');
 const iRC = hdr.indexOf('RC');
 const iRO = hdr.indexOf('RO');
 const iSCP = hdr.indexOf('SC');
 const iIGBC = hdr.indexOf('IGBC');
 const iSCQ = iIGBC + 1;
 const iSOP = hdr.indexOf('SO');
 const iIGBO = hdr.indexOf('IGBO');
 const iSOQ = iIGBO + 1;
 const iRE = hdr.indexOf('RE');

 const rows = [];
 for(let i=1;i<L.length;i++){
  const f = splitCsvLine(L[i], sep);
  if(f.length < 5) continue;
  const match = f[iMatch] ? f[iMatch].replace(/^"|"$/g,'').trim() : '';
  if(!match) continue;
  rows.push({
   ora: cleanTime(f[iOra]||''),
   match,
   r: f[iR]||'',
   rpt: f[iRpt]||'',
   np: piOr0(f[iNP]),
   p1: pfOr0(f[i1Perc]),       q1: pfOr0(f[i1Quota]),
   pX: pfOr0(f[iXPerc]),       qX: pfOr0(f[iXQuota]),
   p2: pfOr0(f[i2Perc]),       q2: pfOr0(f[i2Quota]),
   mge: pfOr0(f[iMGE]),
   diff: pfOr0(f[iDIFF]),
   pGG: pfOr0(f[iGGPerc]),     qGG: pfOr0(f[iGGQuota]),
   pOV15: pfOr0(f[iOV15P]),    qOV15: pfOr0(f[iOV15Q]),
   pOV25: pfOr0(f[iOV25P]),    qOV25: pfOr0(f[iOV25Q]),
   pUN35: pfOr0(f[iUN35P]),    qUN35: pfOr0(f[iUN35Q]),
   pOV05pt: pfOr0(f[iOV05ptP]), qOV05pt: pfOr0(f[iOV05ptQ]),
   ic: piOr0(f[iIC]),
   rc: piOr0(f[iRC]),
   ro: piOr0(f[iRO]),
   pSC: pfOr0(f[iSCP]),        qSC: pfOr0(f[iSCQ]), igbc: piOr0(f[iIGBC]),
   pSO: pfOr0(f[iSOP]),        qSO: pfOr0(f[iSOQ]), igbo: piOr0(f[iIGBO]),
   re: iRE>=0 ? (f[iRE]||'') : '',
   _key: normMatchKey(match)
  });
 }
 return rows;
}

function parseREField(reStr){
 if(!reStr) return [];
 const parts = reStr.split(/\s{2,}/).filter(s=>s.includes('%'));
 const items = parts.map(s => {
  const mm = s.match(/(\d+\s*-\s*\d+)\s*:\s*([\d.,]+)/);
  if(!mm) return null;
  return { score: mm[1].replace(/\s/g,''), perc: parseItalianNumber(mm[2]) };
 }).filter(x => x && x.perc!==null);
 return items.sort((a,b) => b.perc - a.perc);
}

function parseAndStore(key, text){
 const fn = PARSERS[key];
 if(!fn) throw new Error('Dataset non gestito: ' + key);

}

function buildLookups(){
 const L = {
  ov05pt: new Map(), ggov25: new Map(), mg13: new Map(), ia: new Map(),
  qVal: new Map(), gz: new Map(), dm: new Map(), diffg: new Map(),
  plCardByMatch: new Map(), plShotByMatch: new Map()
 };
 (S.datasets.ov05pt||[]).forEach(r => L.ov05pt.set(r._key, r));
 (S.datasets.ggov25||[]).forEach(r => L.ggov25.set(r._key, r));
 (S.datasets.mg13||[]).forEach(r => L.mg13.set(r._key, r));
 (S.datasets.ia||[]).forEach(r => L.ia.set(r._key, r));
 (S.datasets.qVal||[]).forEach(r => L.qVal.set(r._key, r));
 (S.datasets.gz||[]).forEach(r => L.gz.set(r._key, r));
 (S.datasets.dm||[]).forEach(r => L.dm.set(r._key, r));
 (S.datasets.diffg||[]).forEach(r => L.diffg.set(r._key, r));
 (S.datasets.plCard||[]).forEach(r => {
  if(!L.plCardByMatch.has(r._key)) L.plCardByMatch.set(r._key, []);
  L.plCardByMatch.get(r._key).push(r);
 });
 (S.datasets.plShot||[]).forEach(r => {
  if(!L.plShotByMatch.has(r._key)) L.plShotByMatch.set(r._key, []);
  L.plShotByMatch.get(r._key).push(r);
 });
 return L;
}

function buildUniverse(L){
 const map = new Map();
 const upsert = (key, info) => {
  if(!key) return;
  if(!map.has(key)){
   map.set(key, { _key:key, evento:info.evento||'', ora:info.ora||'', lega:info.lega||'' });
  } else {
   const cur = map.get(key);
   if(!cur.lega && info.lega) cur.lega = info.lega;
   if(!cur.ora && info.ora) cur.ora = info.ora;
   if(!cur.evento && info.evento) cur.evento = info.evento;
  }
 };
 L.ggov25.forEach((r,k) => upsert(k,{evento:r.evento, ora:r.ora, lega:r.lega}));
 L.dm.forEach((r,k) => upsert(k,{evento:r.match, ora:r.ora}));
 L.gz.forEach((r,k) => upsert(k,{evento:r.evento, ora:r.ora, lega:r.lega}));
 L.diffg.forEach((r,k) => upsert(k,{evento:r.evento, ora:r.ora}));
 L.ov05pt.forEach((r,k) => upsert(k,{evento:r.evento, ora:r.ora}));
 L.mg13.forEach((r,k) => upsert(k,{evento:r.evento, ora:r.ora}));
 L.ia.forEach((r,k) => upsert(k,{evento:r.evento, ora:r.ora, lega:r.lega}));
 L.qVal.forEach((r,k) => upsert(k,{evento:r.match, ora:r.ora}));
 return Array.from(map.values());
}

function isM1_ov05pt(r){ return r && r.ind < M1_THR.ov05pt.ind && r.delta < M1_THR.ov05pt.delta && r.diff < M1_THR.ov05pt.diff; }
function isM1_gg(r){ return r && r.igbc>=M1_THR.gg.igbc && r.igbo>=M1_THR.gg.igbo && r.s12<M1_THR.gg.s12 && r.pgg>=M1_THR.gg.pgg; }
function isM1_o25(r){ return r && r.igbt>=M1_THR.o25.igbt && r.mge>=M1_THR.o25.mge && r.diff<=M1_THR.o25.diff; }
function isM1_u25(r){ return r && r.diff>M1_THR.u25.diffMin && r.mge>M1_THR.u25.mgeLow && r.mge<M1_THR.u25.mgeHi; }
function isM1_mg13c(r){ return r && r.ich>=M1_THR.mg13c.ichLo && r.ich<=M1_THR.mg13c.ichHi && r.varc>=M1_THR.mg13c.varc; }
function isM1_mg13o(r){ return r && r.ica>=M1_THR.mg13o.icaLo && r.ica<=M1_THR.mg13o.icaHi && r.varo>=M1_THR.mg13o.varo; }

function gzMap(gz){
 if(gz===null||gz===undefined) return null;
 if(gz < -1800) return {dir:'under', mkt:'U2.5', p:0.64, lbl:'U2.5 64%'};
 if(gz < -1200) return {dir:'under', mkt:'U3.5', p:0.81, lbl:'U3.5 81%'};
 if(gz > 5000)  return {dir:'over',  mkt:'O2.5', p:0.64, lbl:'Ov2.5 64%'};
 if(gz > 1000)  return {dir:'over',  mkt:'O1.5', p:0.80, lbl:'Ov1.5 80%'};
 if(gz > -200 && gz < 200) return {dir:'over', mkt:'O0.5', p:0.95, lbl:'Ov0.5 95%'};
 return {dir:'neutral', mkt:'-', p:0.5, lbl:'Neutrale'};
}

/* ==================== SIGNAL FUNCTIONS S1-S10 ==================== */

function signalS1(L, key){
 const r = L.ov05pt.get(key);
 if(!r) return {active:false, coverage:0};
 const m1 = isM1_ov05pt(r);
 let strength = 0;
 if(m1) strength = 0.9;
 else {
  let s = 0;
  if(r.ind < 320) s += 0.35; else if(r.ind < 340) s += 0.2;
  if(r.delta <= -20) s += 0.35; else if(r.delta <= -5) s += 0.2;
  if(r.diff < 0) s += 0.2;
  strength = s;
 }
 return {active:true, coverage:1, direction:'ov05pt', strength: clamp(strength,0,1), m1, details:{ind:r.ind, delta:r.delta, diff:r.diff, mge:r.mge}};
}

function signalS2(L, key){
 const r = L.ggov25.get(key);
 if(!r) return {active:false, coverage:0};
 const m1 = isM1_gg(r);
 let strength = 0;
 if(m1) strength = 0.9;
 else {
  let s = 0;
  if(r.igbc >= 150) s += 0.25; else if(r.igbc >= 100) s += 0.12;
  if(r.igbo >= 150) s += 0.25; else if(r.igbo >= 100) s += 0.12;
  if(r.s12 < 150) s += 0.2; else if(r.s12 < 250) s += 0.1;
  if(r.pgg >= 55) s += 0.2; else if(r.pgg >= 45) s += 0.1;
  strength = s;
 }
 return {active:true, coverage:1, direction:'gg', strength: clamp(strength,0,1), m1, details:{igbc:r.igbc, igbo:r.igbo, s12:r.s12, pgg:r.pgg}};
}

function signalS3(L, key){
 const r = L.ggov25.get(key);
 if(!r) return {active:false, coverage:0};
 const m1o = isM1_o25(r), m1u = isM1_u25(r);
 let sO = 0, sU = 0;
 if(m1o) sO = 0.9;
 else {
  if(r.igbt >= 300) sO += 0.35; else if(r.igbt >= 250) sO += 0.18;
  if(r.mge >= 3) sO += 0.3; else if(r.mge >= 2.5) sO += 0.15;
  if(r.diff <= 0) sO += 0.2;
 }
 if(m1u) sU = 0.9;
 else {
  if(r.diff > 1.5) sU += 0.35; else if(r.diff > 1) sU += 0.2;
  if(r.mge > 0 && r.mge < 2.5) sU += 0.3;
  else if(r.mge < 3 && r.mge > 0) sU += 0.15;
  if(r.igbt < 250) sU += 0.15;
 }
 sO = clamp(sO,0,1); sU = clamp(sU,0,1);
 const dir = sO >= sU ? 'over' : 'under';
 return {active:true, coverage:1, direction:dir, strength:Math.max(sO,sU), sO, sU, m1: dir==='over'?m1o:m1u, m1o, m1u, details:{igbt:r.igbt, mge:r.mge, diff:r.diff, pgg:r.pgg, qov25:r.qov25}};
}

function signalS4(L, key){
 const r = L.mg13.get(key);
 if(!r) return {active:false, coverage:0};
 const m1c = isM1_mg13c(r), m1o = isM1_mg13o(r);
 let sC = 0, sO = 0;
 if(m1c) sC = 0.9;
 else {
  if(r.ich >= 300 && r.ich <= 400) sC += 0.4;
  if(r.varc >= 30) sC += 0.3; else if(r.varc >= 20) sC += 0.15;
 }
 if(m1o) sO = 0.9;
 else {
  if(r.ica >= 300 && r.ica <= 400) sO += 0.4;
  if(r.varo >= 30) sO += 0.3; else if(r.varo >= 20) sO += 0.15;
 }
 const side = sC >= sO ? 'casa' : 'ospite';
 return {active:true, coverage:1, direction:'mg13', side, strength:Math.max(sC,sO), sC, sO, m1: side==='casa'?m1c:m1o, m1c, m1o, details:{ich:r.ich, ica:r.ica, varc:r.varc, varo:r.varo}};
}

function signalS5(L, key){
 const r = L.ia.get(key);
 if(!r || !r.stats || !r.stats.length) return {active:false, coverage:0};
 const counts = {'1':0, 'X':0, '2':0};
 r.stats.forEach(s => {
  const dir = String(s.pred).trim().toUpperCase();
  if(counts[dir]!==undefined) counts[dir] += s.aff;
 });
 const winner = Object.keys(counts).sort((a,b)=>counts[b]-counts[a])[0];
 const total = counts['1']+counts['X']+counts['2'];
 const concentration = total > 0 ? counts[winner]/total : 0;
 const strength = clamp((r.avgAff/5) * concentration * 1.4, 0, 1);
 const dirMap = {'1':'casaWin', 'X':'pareggio', '2':'ospiteWin'};
 return {active:true, coverage:1, direction:dirMap[winner]||'neutral', strength, details:{avgAff:r.avgAff, maxAff:r.maxAff, winner, concentration, statsCount:r.stats.length}};
}

function signalS6(L, key){
 const r = L.gz.get(key);
 if(!r || r.gz===null) return {active:false, coverage:0};
 const map = gzMap(r.gz);
 if(!map || map.dir==='neutral') return {active:true, coverage:1, direction:'neutral', strength:0, details:{gz:r.gz, lbl:'Neutrale'}};
 return {active:true, coverage:1, direction:map.dir, strength:map.p, mkt:map.mkt, lbl:map.lbl, details:{gz:r.gz, lbl:map.lbl, mkt:map.mkt, p:map.p}};
}

function signalS7(L, key){
 const r = L.dm.get(key);
 if(!r) return {active:false, coverage:0};
 const np = r.np || 0;
 const npWeight = clamp(np/30, 0, 1);
 const buckets = {
  'over': r.pOV25, 'under': r.pUN35, 'gg': r.pGG, 'ov15': r.pOV15,
  'ov05pt': r.pOV05pt, 'casaSegna': r.pSC, 'ospiteSegna': r.pSO,
  '1': r.p1, 'X': r.pX, '2': r.p2
 };
 let bestDir = 'over', bestVal = 0;
 for(const [d,p] of Object.entries(buckets)){ if(p > bestVal){ bestVal = p; bestDir = d; } }
 const strength = clamp((bestVal/100) * (0.4 + 0.6*npWeight), 0, 1);
 return {active:true, coverage:1, direction:bestDir, strength, np, npWeight, buckets, re: parseREField(r.re), ic:r.ic, rc:r.rc, ro:r.ro, raw:r, details:{np, mge:r.mge, diff:r.diff, ic:r.ic, rc:r.rc, ro:r.ro}};
}

function signalS8(L, key){
 const r = L.qVal.get(key);
 if(!r) return {active:false, coverage:0};
 const isValue = (qReale, qDM, spread) => spread > 0.15 && qReale > 1.01 && qReale < 3 && qDM > 0;
 const v1 = isValue(r.r1, r.dm1, r.spread1);
 const vX = isValue(r.rx, r.dmx, r.spreadX);
 const v2 = isValue(r.r2, r.dm2, r.spread2);
 let dir = 'neutral', strength = 0;
 if(v1 && r.spread1 >= Math.max(v2?r.spread2:0, vX?r.spreadX:0)){ dir='1'; strength = clamp(r.spread1, 0, 1); }
 else if(v2 && r.spread2 >= (vX?r.spreadX:0)){ dir='2'; strength = clamp(r.spread2, 0, 1); }
 else if(vX){ dir='X'; strength = clamp(r.spreadX, 0, 1); }
 return {active:true, coverage:1, direction:dir, strength, v1, vX, v2, np:r.np, details:{r1:r.r1, rx:r.rx, r2:r.r2, dm1:r.dm1, dmx:r.dmx, dm2:r.dm2, spread1:r.spread1, spreadX:r.spreadX, spread2:r.spread2}};
}

function signalS9(L, key){
 const cardArr = L.plCardByMatch.get(key) || [];
 const shotArr = L.plShotByMatch.get(key) || [];
 if(!cardArr.length && !shotArr.length) return {active:false, coverage:0};
 let bestCard = null, bestShot = null;
 cardArr.forEach(p => {
  const score = (p.amm * 0.5) + (p.falli * 0.2) + (p.rit * 0.3);
  if(!bestCard || score > bestCard.score) bestCard = {p, score, type:'card'};
 });
 shotArr.forEach(p => {
  const score = (p.gol * 0.6) + (p.tiriPorta * 0.25) + (p.rit * 0.15);
  if(!bestShot || score > bestShot.score) bestShot = {p, score, type:'shot'};
 });
 let strength = 0, direction = 'neutral';
 if(bestCard && bestCard.score > 1.5){ strength = Math.max(strength, clamp(bestCard.score/3, 0, 1)); direction = 'cartellini'; }
 if(bestShot && bestShot.score > 1.5){ const s = clamp(bestShot.score/3, 0, 1); if(s > strength){ strength = s; direction = 'tiri'; } }
 return {active: bestCard !== null || bestShot !== null, coverage:1, direction, strength, bestCard, bestShot, details:{nCard: cardArr.length, nShot: shotArr.length}};
}

function signalS10(L, key){
 const r = L.diffg.get(key);
 if(!r) return {active:false, coverage:0};
 const dgt = r.dgt, diffC = r.diffC, diffO = r.diffO;
 const significant = dgt !== null && Math.abs(dgt) > DIFF_THR.dgt;
 let direction = 'neutral', strength = 0;
 if(significant){
  if(dgt > 0){ direction = 'under'; strength = clamp(Math.abs(dgt)/3, 0.3, 1); }
  else { direction = 'over'; strength = clamp(Math.abs(dgt)/3, 0.3, 1); }
 }
 const csSig = diffC !== null && Math.abs(diffC) > DIFF_THR.team;
 const osSig = diffO !== null && Math.abs(diffO) > DIFF_THR.team;
 const teamSignals = {
  casaSegna: csSig && diffC < 0,
  noCasaSegna: csSig && diffC > 0,
  ospiteSegna: osSig && diffO < 0,
  noOspiteSegna: osSig && diffO > 0
 };
 let drop = null, dropDir = null;
 if(r.qr && r.qrL && r.qr > 0){
  drop = (r.qr - r.qrL) / r.qr;
  if(drop > DIFF_THR.dropOk) dropDir = 'pro';
  else if(drop < -DIFF_THR.dropOk) dropDir = 'contra';
 }
 return {active:true, coverage:1, direction, strength, significant, dgt, diffC, diffO, teamSignals, drop, dropDir, details:{dgt, dg:r.dg, diffC, diffO, mge:r.mge, mgu5:r.mgu5, qr:r.qr, qrL:r.qrL, qt:r.qt}};
}

function extractSignals(L, key){
 return {
  s1:signalS1(L,key), s2:signalS2(L,key), s3:signalS3(L,key), s4:signalS4(L,key),
  s5:signalS5(L,key), s6:signalS6(L,key), s7:signalS7(L,key), s8:signalS8(L,key),
  s9:signalS9(L,key), s10:signalS10(L,key)
 };
}

/* ==================== ENUMERATE MARKETS ==================== */
function enumerateMarkets(sig, L, key){
 const list = [];
 if(sig.s1.active && sig.s1.strength > 0.3) list.push({mkt:'Ov 0.5 PT', dir:'ov05pt'});
 else if(sig.s7.active && sig.s7.buckets.ov05pt > 50 && sig.s7.np >= 15) list.push({mkt:'Ov 0.5 PT', dir:'ov05pt'});
 if(sig.s2.active && sig.s2.strength > 0.3) list.push({mkt:'GG', dir:'gg'});
 else if(sig.s7.active && sig.s7.buckets.gg > 55) list.push({mkt:'GG', dir:'gg'});
 if(sig.s3.active){
  if(sig.s3.sO > 0.4) list.push({mkt:'Ov 2.5', dir:'over'});
  if(sig.s3.sU > 0.4) list.push({mkt:'U 2.5', dir:'under'});
 } else if(sig.s7.active){
  if(sig.s7.buckets.over > 55) list.push({mkt:'Ov 2.5', dir:'over'});
  if(sig.s7.buckets.under > 60) list.push({mkt:'U 2.5', dir:'under'});
 }
 if(sig.s10.active && sig.s10.significant){
  if(sig.s10.direction === 'over' && !list.find(x=>x.mkt==='Ov 2.5')) list.push({mkt:'Ov 2.5', dir:'over'});
  if(sig.s10.direction === 'under' && !list.find(x=>x.mkt==='U 2.5')) list.push({mkt:'U 2.5', dir:'under'});
 }
 if(sig.s4.active && sig.s4.strength > 0.4){
  if(sig.s4.side === 'casa') list.push({mkt:'MG 1-3 Casa', dir:'mg13', side:'casa'});
  else list.push({mkt:'MG 1-3 Ospite', dir:'mg13', side:'ospite'});
 }
 const dm = L.dm.get(key);
 if(dm && dm.pSC >= 60 && dm.igbc >= 150){
  const teamConfirm = sig.s10.active && sig.s10.teamSignals.casaSegna;
  if(teamConfirm || dm.pSC >= 70) list.push({mkt:'Casa Segna', dir:'casaSegna'});
 }
 if(dm && dm.pSO >= 60 && dm.igbo >= 150){
  const teamConfirm = sig.s10.active && sig.s10.teamSignals.ospiteSegna;
  if(teamConfirm || dm.pSO >= 70) list.push({mkt:'Ospite Segna', dir:'ospiteSegna'});
 }
 if(dm && dm.pOV15 > 60 && dm.pUN35 > 60) list.push({mkt:'MG 2-4', dir:'mg24'});
 if(sig.s8.active && sig.s8.strength > 0.15){
  if(sig.s8.v1) list.push({mkt:'1', dir:'1'});
  if(sig.s8.vX) list.push({mkt:'X', dir:'X'});
  if(sig.s8.v2) list.push({mkt:'2', dir:'2'});
 }
 if(sig.s7.active && sig.s7.re && sig.s7.re.length >= 2){
  const top = sig.s7.re.filter(x => x.perc >= 12);
  if(top.length >= 2) list.push({mkt:'CS Cluster', dir:'cs', cluster: top.slice(0,3)});
 }
 return list;
}

/* ==================== QUOTA OPERATIVA - REGOLE FERREE ====================
   - MG 1-3 Casa  → SEMPRE 1.30 (richiesta utente, non leggere CSV)
   - MG 1-3 Ospite → SEMPRE 1.30
   - MG 2-4       → SEMPRE 1.50
   - Tutti gli altri mercati: SOLO da CSV. Se mancano → null = mercato escluso
   ============================================================== */
const FIXED_ODDS = {
 'MG 1-3 Casa': 1.30,
 'MG 1-3 Ospite': 1.30,
 'MG 2-4': 1.50
};

function operationalOdds(market, sig, L, key){
 // Quote fisse non negoziabili
 if(FIXED_ODDS[market] !== undefined) return FIXED_ODDS[market];

 const dm = L.dm.get(key);
 const dg = L.diffg.get(key);
 const ggov = L.ggov25.get(key);
 const ov = L.ov05pt.get(key);
 const qv = L.qVal.get(key);

 // Helper: ritorna primo valore > 1.01, altrimenti null
 const firstValid = (...vals) => {
  for(const v of vals){ if(v && v > 1.01) return v; }
  return null;
 };

 if(market === 'Ov 0.5 PT'){
  return firstValid(ov ? ov.qrOv05 : null, dm ? dm.qOV05pt : null);
 }
 if(market === 'GG') return firstValid(dm ? dm.qGG : null);
 if(market === 'Ov 2.5'){
  return firstValid(dg ? dg.qrL : null, ggov ? ggov.qov25 : null, dm ? dm.qOV25 : null);
 }
 if(market === 'U 2.5') return firstValid(dm ? dm.qUN35 : null);
 if(market === 'Casa Segna') return firstValid(dm ? dm.qSC : null);
 if(market === 'Ospite Segna') return firstValid(dm ? dm.qSO : null);
 if(market === '1') return firstValid(qv ? qv.r1 : null, dm ? dm.q1 : null);
 if(market === 'X') return firstValid(qv ? qv.rx : null, dm ? dm.qX : null);
 if(market === '2') return firstValid(qv ? qv.r2 : null, dm ? dm.q2 : null);
 if(market === 'CS Cluster') return null;
 return null;
}

/* ==================== CONFIDENCE SCORE ==================== */
const DIR_COMPAT = {
 'ov05pt':      new Set(['ov05pt','over']),
 'gg':          new Set(['gg','over','casaSegna','ospiteSegna']),
 'over':        new Set(['over','gg','ov05pt','ov15']),
 'under':       new Set(['under','noCasaSegna','noOspiteSegna']),
 'casaSegna':   new Set(['casaSegna','gg','over','1']),
 'ospiteSegna': new Set(['ospiteSegna','gg','over','2']),
 'mg13':        new Set(['mg13','under']),
 '1':           new Set(['1','casaWin','casaSegna']),
 'X':           new Set(['X','pareggio']),
 '2':           new Set(['2','ospiteWin','ospiteSegna']),
 'mg24':        new Set(['mg24','over','gg']),
 'cs':          new Set(['cs'])
};

function dirAgreesWith(targetDir, sigDir){
 if(!sigDir || sigDir === 'neutral') return null;
 const set = DIR_COMPAT[targetDir];
 if(!set) return null;
 if(set.has(sigDir)) return +1;
 const opposite = {
  'over':'under', 'under':'over', 'gg':'ng', 'ng':'gg',
  'casaSegna':'noCasaSegna', 'noCasaSegna':'casaSegna',
  'ospiteSegna':'noOspiteSegna', 'noOspiteSegna':'ospiteSegna'
 };
 if(opposite[targetDir] === sigDir) return -1;
 return null;
}

function computeConfidence(target, sig, L, key){
 const targetDir = target.dir;
 const comp = [];
 // M1
 let m1Active = false, m1Score = 0;
 if(targetDir === 'ov05pt' && sig.s1.active){ if(sig.s1.m1) m1Active = true; m1Score = sig.s1.strength; }
 else if(targetDir === 'gg' && sig.s2.active){ if(sig.s2.m1) m1Active = true; m1Score = sig.s2.strength; }
 else if(targetDir === 'over' && sig.s3.active){ if(sig.s3.m1o) m1Active = true; m1Score = sig.s3.sO; }
 else if(targetDir === 'under' && sig.s3.active){ if(sig.s3.m1u) m1Active = true; m1Score = sig.s3.sU; }
 else if(targetDir === 'mg13' && sig.s4.active){
  if(target.side === 'casa' && sig.s4.m1c){ m1Active = true; m1Score = sig.s4.sC; }
  else if(target.side === 'ospite' && sig.s4.m1o){ m1Active = true; m1Score = sig.s4.sO; }
  else m1Score = target.side==='casa' ? sig.s4.sC : sig.s4.sO;
 }
 if(m1Score > 0) comp.push({key:'M1', weight:W.M1, contrib: m1Score*2-1, coverage:1, label: m1Active?'M1 attiva':'M1 borderline'});
 else comp.push({key:'M1', weight:W.M1, contrib: 0, coverage:0});

 // DM
 if(sig.s7.active){
  let perc = 0;
  if(targetDir === 'over') perc = sig.s7.buckets.over;
  else if(targetDir === 'under') perc = sig.s7.buckets.under;
  else if(targetDir === 'gg') perc = sig.s7.buckets.gg;
  else if(targetDir === 'ov05pt') perc = sig.s7.buckets.ov05pt;
  else if(targetDir === 'casaSegna') perc = sig.s7.buckets.casaSegna;
  else if(targetDir === 'ospiteSegna') perc = sig.s7.buckets.ospiteSegna;
  else if(targetDir === '1') perc = sig.s7.buckets['1'];
  else if(targetDir === 'X') perc = sig.s7.buckets['X'];
  else if(targetDir === '2') perc = sig.s7.buckets['2'];
  else if(targetDir === 'mg24') perc = (sig.s7.buckets.ov15 + sig.s7.buckets.under) / 2;
  if(perc > 0){
   const c = clamp((perc - 50) / 50, -1, 1) * sig.s7.npWeight;
   comp.push({key:'DM', weight:W.DM, contrib:c, coverage:1, label:`DM ${perc.toFixed(0)}% NP=${sig.s7.np}`});
  } else comp.push({key:'DM', weight:W.DM, contrib:0, coverage:0});
 } else comp.push({key:'DM', weight:W.DM, contrib:0, coverage:0});

 // GZ
 if(sig.s6.active && sig.s6.direction !== 'neutral'){
  const ag = dirAgreesWith(targetDir, sig.s6.direction);
  if(ag !== null) comp.push({key:'GZ', weight:W.GZ, contrib: ag * sig.s6.strength, coverage:1, label: sig.s6.lbl});
  else comp.push({key:'GZ', weight:W.GZ, contrib: 0, coverage:0.5});
 } else comp.push({key:'GZ', weight:W.GZ, contrib:0, coverage:0});

 // S10
 let dgPenalty = 0;
 if(sig.s10.active){
  if(sig.s10.significant){
   const ag = dirAgreesWith(targetDir, sig.s10.direction);
   if(ag !== null){
    comp.push({key:'DGT', weight:W.DIFFG, contrib: ag * sig.s10.strength, coverage:1, label:`DGT ${sig.s10.dgt.toFixed(2)}`});
    if(ag < 0) dgPenalty = 0.15;
   } else comp.push({key:'DGT', weight:W.DIFFG, contrib:0, coverage:0.5});
  } else {
   if(targetDir === 'casaSegna' && sig.s10.teamSignals.casaSegna){
    comp.push({key:'DiffC', weight:W.DIFFG, contrib: 0.7, coverage:1, label:`DiffC ${sig.s10.diffC?.toFixed(2)}`});
   } else if(targetDir === 'ospiteSegna' && sig.s10.teamSignals.ospiteSegna){
    comp.push({key:'DiffO', weight:W.DIFFG, contrib: 0.7, coverage:1, label:`DiffO ${sig.s10.diffO?.toFixed(2)}`});
   } else comp.push({key:'DGT', weight:W.DIFFG, contrib:0, coverage:0});
  }
 } else comp.push({key:'DGT', weight:W.DIFFG, contrib:0, coverage:0});

 // VAL
 if(sig.s8.active){
  const ag = dirAgreesWith(targetDir, sig.s8.direction);
  if(ag !== null) comp.push({key:'VAL', weight:W.VAL, contrib: ag * sig.s8.strength, coverage:1, label:`Spread ${sig.s8.strength.toFixed(2)}`});
  else comp.push({key:'VAL', weight:W.VAL, contrib:0, coverage:0.3});
 } else comp.push({key:'VAL', weight:W.VAL, contrib:0, coverage:0});

 // IA
 if(sig.s5.active && sig.s5.strength > 0){
  const ag = dirAgreesWith(targetDir, sig.s5.direction);
  if(ag !== null) comp.push({key:'IA', weight:W.IA, contrib: ag * sig.s5.strength, coverage:1, label:`IA ${sig.s5.details.winner}`});
  else comp.push({key:'IA', weight:W.IA, contrib:0, coverage:0.3});
 } else comp.push({key:'IA', weight:W.IA, contrib:0, coverage:0});

 // PL
 if(sig.s9.active) comp.push({key:'PL', weight:W.PL, contrib: 0, coverage:0.5});
 else comp.push({key:'PL', weight:W.PL, contrib:0, coverage:0});

 const W_eff = comp.reduce((s,c) => s + c.weight*c.coverage, 0);
 if(W_eff <= 0) return {confidence:0, components:comp, coverage:0, conflictPenalty:0, capped:false, capReason:''};
 const score_raw = comp.reduce((s,c) => s + c.weight*c.coverage*c.contrib, 0) / W_eff;
 const score_base = 50 + 50 * score_raw;
 const activeContribs = comp.filter(c => c.coverage > 0).map(c => c.contrib);
 const activeWeights = comp.filter(c => c.coverage > 0).map(c => c.weight*c.coverage);
 const sigma = stdW(activeContribs, activeWeights);
 const penalty = CONFLICT_LAMBDA * sigma;
 const W_total = Object.values(W).reduce((s,x) => s+x, 0);
 const cov_ratio = W_eff / W_total;
 const cov_factor = COV_FLOOR + (1 - COV_FLOOR) * cov_ratio;
 let score = score_base * cov_factor - penalty;
 if(dgPenalty > 0) score -= dgPenalty * 100 * 0.4;
 let capped = false, capReason = '';
 if(sig.s10.active && sig.s10.significant){
  const ag = dirAgreesWith(targetDir, sig.s10.direction);
  if(ag === -1 && score > 70){ score = 70; capped = true; capReason = 'DGT contraria'; }
 }
 if(sig.s10.active && sig.s10.dropDir === 'contra' && score > 60){ score = 60; capped = true; capReason = 'Drop quota contrario'; }
 if(cov_ratio < 0.5 && score > 70){ score = 70; capped = true; capReason = 'Coverage <50%'; }
 if(sig.s10.active && sig.s10.dropDir === 'pro') score += 4;
 score = clamp(score, 0, 100);
 return {confidence: Math.round(score), components: comp, coverage: cov_ratio, conflictPenalty: penalty, capped, capReason, score_raw, score_base, cov_factor};
}

function topContributors(components, n=3){
 return components.filter(c => c.coverage > 0 && c.contrib > 0.05)
  .sort((a,b) => (Math.abs(b.contrib)*b.weight) - (Math.abs(a.contrib)*a.weight)).slice(0, n);
}
function topConflicts(components, n=1){
 return components.filter(c => c.coverage > 0 && c.contrib < -0.05)
  .sort((a,b) => (Math.abs(b.contrib)*b.weight) - (Math.abs(a.contrib)*a.weight)).slice(0, n);
}

function buildNarrative(rec){

 const sig = rec.sig;
 const dgt = sig.s10 && sig.s10.dgt;
 const drop = sig.s10 && sig.s10.drop;
 const reasonStr = tops.map(t => t.label || t.key).join('; ') || 'segnali deboli';
 const conflictStr = conflicts.length ? `Attenzione: ${conflicts[0].label || conflicts[0].key} contro` : '';
 const oddsStr = odds ? odds.toFixed(2) : 'N/D';
 const stakeStr = stake !== undefined ? fmtEur(stake) : 'N/D';
 const stakePctStr = stakePct !== undefined ? stakePct.toFixed(1) : '0';

 if(c >= 82 && rec.hasM1){
  return `🏆 Pick TOP · ${match} · ${m} a quota ${oddsStr}. ${reasonStr}. ${conflictStr || 'Nessun segnale contrario significativo.'} Confidence ${c}/100, stake consigliato ${stakePctStr}% (${stakeStr}).`;
 }
 if(rec.dir === 'under' && sig.s10.active && sig.s10.significant && sig.s10.dgt > 0.8){

 }

 }
 if(rec.dir === 'casaSegna' || rec.dir === 'ospiteSegna'){

 }

 return `${match}. ${m} a quota ${oddsStr}. ${reasonStr}.${dropPart} Confidence ${c}/100, stake ${stakePctStr}% (${stakeStr}).`;

/* ==================== KELLY ==================== */
function kellyStake(p, odds, opts={}){
 const fraction = opts.fraction !== undefined ? opts.fraction : S.bankroll.kellyFraction;
 const cap = opts.cap !== undefined ? opts.cap : S.bankroll.capPct;
 const bankroll = opts.bankroll !== undefined ? opts.bankroll : S.bankroll.segregated;
 if(!odds || odds <= 1.01) return {pct:0, eur:0, edge:0, fStar:0};
 const b = odds - 1;
 const pImpl = 1 / odds;
 const alpha = clamp(0.4 + 0.6 * (opts.confidence||50)/100, 0.4, 1.0);
 const pShrunk = alpha * p + (1 - alpha) * pImpl;
 const fStar = (b * pShrunk - (1 - pShrunk)) / b;
 if(fStar <= 0) return {pct:0, eur:0, edge: pShrunk - pImpl, fStar:0, pShrunk};
 let pct = fraction * fStar;
 if(S.bankroll.afterLossActive) pct *= 0.75;
 pct = clamp(pct, 0, cap);
 const eur = round(pct * bankroll, 2);
 const edge = pShrunk - pImpl;
 return {pct, eur, edge, fStar, pShrunk};
}

/* ==================== CORRELATION ==================== */
const CONFLICT_PAIRS = new Set([
 'Ov 2.5|U 2.5', 'U 2.5|Ov 2.5',
 'GG|U 2.5', 'U 2.5|GG',
 'MG 2-4|Ov 2.5', 'Ov 2.5|MG 2-4'
]);
function pairKey(a,b){ return a + '|' + b; }
function sharesTeam(matchA, matchB){
 const sa = (matchA._key || '').split(' - ');
 const sb = (matchB._key || '').split(' - ');
 if(sa.length<2 || sb.length<2) return false;
 return sa[0]===sb[0] || sa[0]===sb[1] || sa[1]===sb[0] || sa[1]===sb[1];
}
function correlationScore(recA, recB){
 if(recA._key === recB._key){
  if(CONFLICT_PAIRS.has(pairKey(recA.market, recB.market))) return 1.0;
  return 0.6;
 }
 let s = 0;
 if(recA.lega && recB.lega && recA.lega === recB.lega) s += 0.30;
 const tA = timeVal(recA.ora), tB = timeVal(recB.ora);
 if(Math.abs(tA - tB) <= 30) s += 0.20;
 if(recA.market === recB.market) s += 0.15;
 if(sharesTeam(recA, recB)) s += 0.50;
 return Math.min(s, 0.99);
}

/* ==================== ALL RECS ==================== */
function buildAllRecs(){
 const L = buildLookups();
 const universe = buildUniverse(L);
 const matches = [];
 for(const m of universe){
  const sig = extractSignals(L, m._key);
  const minCov = (sig.s7.active?1:0) + (sig.s2.active?1:0) + (sig.s10.active?1:0);
  if(minCov === 0) continue;
  const candidates = enumerateMarkets(sig, L, m._key);
  if(!candidates.length) continue;
  const recs = [];
  for(const cand of candidates){
   const odds = operationalOdds(cand.mkt, sig, L, m._key);
   if(cand.mkt === 'CS Cluster'){
    // saltiamo CS dal portfolio standard
    continue;
   }
   if(!odds || odds < 1.20) continue;
   const conf = computeConfidence(cand, sig, L, m._key);
   const pModel = clamp(conf.confidence/100 * 0.85 + 0.05, 0.05, 0.95);
   const kelly = kellyStake(pModel, odds, {confidence: conf.confidence});
   const rec = {
    _key: m._key, match: m.evento,
    ora: m.ora || (L.ggov25.get(m._key)?.ora || ''),
    lega: m.lega || (L.ggov25.get(m._key)?.lega || L.ia.get(m._key)?.lega || ''),
    market: cand.mkt, dir: cand.dir, side: cand.side, cluster: cand.cluster,
    odds, confidence: conf.confidence, coverage: conf.coverage,
    components: conf.components, capped: conf.capped, capReason: conf.capReason,
    pModel, kelly, stake: kelly.eur, stakePct: kelly.pct * 100, edge: kelly.edge * 100,
    sig,
    hasM1: !!(sig.s1.m1 || sig.s2.m1 || (sig.s3.m1o && cand.dir==='over') || (sig.s3.m1u && cand.dir==='under') || (sig.s4.m1c && cand.side==='casa') || (sig.s4.m1o && cand.side==='ospite'))
   };
   rec.narrative = buildNarrative(rec);
   recs.push(rec);
  }
  if(recs.length){
   recs.sort((a,b) => b.confidence - a.confidence);
   matches.push({ match: m, sig, recs, top: recs[0] });
  }
 }
 matches.sort((a,b) => b.top.confidence - a.top.confidence);
 return matches;
}

function genSingoleBilanciate(allMatches, n=8){

// 2) GENERA DOPPIE: quota totale 1.90-2.50
function genDoppie(allMatches, qTotMin=1.90, qTotMax=2.50, n=5){
 const pool = [];
 for(const m of allMatches){
  for(const r of m.recs){
   if(!r.odds || r.odds < 1.30 || r.odds > 2.00) continue;
   if(r.confidence < 55) continue;
   pool.push(r);
  }
 }
 // Per ogni match tieni solo il mercato con miglior confidence
 const dedup = {};
 pool.forEach(r => { if(!dedup[r._key] || dedup[r._key].confidence < r.confidence) dedup[r._key] = r; });
 const cands = Object.values(dedup);
 const out = [];
 for(let i=0; i<cands.length; i++){
  for(let j=i+1; j<cands.length; j++){
   const a = cands[i], b = cands[j];
   const corr = correlationScore(a, b);
   if(corr > 0.35) continue;
   const total = a.odds * b.odds;
   if(total < qTotMin || total > qTotMax) continue;
   const pJoint = a.pModel * b.pModel;
   const ev = pJoint * total - 1;
   const score = (a.confidence + b.confidence)/2 + ev*30;
   out.push({legs:[a,b], totalOdds:total, pJoint, ev, ev_pct: ev*100, corr, score});
  }
 }
 out.sort((x,y) => y.score - x.score);
 return out.slice(0, n);
}

// 3) GENERA TRIS: quota totale 3-5
function genTris(allMatches, qTotMin=3.00, qTotMax=5.00, n=3){
 const pool = [];
 for(const m of allMatches){
  for(const r of m.recs){
   if(!r.odds || r.odds < 1.30 || r.odds > 1.95) continue;
   if(r.confidence < 55) continue;
   pool.push(r);
  }
 }
 const dedup = {};
 pool.forEach(r => { if(!dedup[r._key] || dedup[r._key].confidence < r.confidence) dedup[r._key] = r; });
 const cands = Object.values(dedup).sort((a,b) => b.confidence - a.confidence).slice(0, 14);
 const out = [];
 outer:
 for(let i=0; i<cands.length; i++){
  for(let j=i+1; j<cands.length; j++){
   for(let k=j+1; k<cands.length; k++){
    const a = cands[i], b = cands[j], c = cands[k];
    if(Math.max(correlationScore(a,b), correlationScore(a,c), correlationScore(b,c)) > 0.35) continue;
    const total = a.odds * b.odds * c.odds;
    if(total < qTotMin || total > qTotMax) continue;
    const pJoint = a.pModel * b.pModel * c.pModel;
    const ev = pJoint * total - 1;
    const score = (a.confidence + b.confidence + c.confidence)/3 + ev*20;
    out.push({legs:[a,b,c], totalOdds:total, pJoint, ev, ev_pct: ev*100, score});
    if(out.length > 80) break outer;
   }
  }
 }
 out.sort((x,y) => y.score - x.score);
 return out.slice(0, n);
}

// 4) GENERA MULTIPLA 4-5 leg
function genMultipla(allMatches, nLegs=4, qTotMin=5, qTotMax=15, n=2){
 const pool = [];
 for(const m of allMatches){
  for(const r of m.recs){
   if(!r.odds || r.odds < 1.30 || r.odds > 2.00) continue;
   if(r.confidence < 60) continue;
   pool.push(r);
  }
 }
 const dedup = {};
 pool.forEach(r => { if(!dedup[r._key] || dedup[r._key].confidence < r.confidence) dedup[r._key] = r; });
 const cands = Object.values(dedup).sort((a,b) => b.confidence - a.confidence).slice(0, 12);
 const out = [];
 // Combinatoria semplice
 function combine(start, current){
  if(current.length === nLegs){
   for(let i=0; i<current.length; i++){
    for(let j=i+1; j<current.length; j++){
     if(correlationScore(current[i], current[j]) > 0.35) return;
    }
   }
   const total = current.reduce((s,r) => s * r.odds, 1);
   if(total < qTotMin || total > qTotMax) return;
   const pJoint = current.reduce((s,r) => s * r.pModel, 1);
   const ev = pJoint * total - 1;
   const avgConf = current.reduce((s,r) => s + r.confidence, 0) / current.length;
   const score = avgConf + ev*15;
   out.push({legs: current.slice(), totalOdds: total, pJoint, ev, ev_pct: ev*100, score});
   return;
  }
  if(out.length > 200) return;
  for(let i=start; i<cands.length; i++){
   current.push(cands[i]);
   combine(i+1, current);
   current.pop();
  }
 }
 combine(0, []);
 out.sort((x,y) => y.score - x.score);
 return out.slice(0, n);
}

// 5) GENERA VALUE BETS: edge >= 5%, NP >= 15
function genValueBets(allMatches, n=8){
 const out = [];
 const seen = new Set();
 for(const m of allMatches){
  for(const r of m.recs){
   if(r.confidence < 55) continue;
   if(!r.odds || r.odds < 1.40 || r.odds > 8) continue;
   if(r.edge < 5) continue;
   const np = r.sig?.s7?.np || 0;
   if(np < 15) continue;
   if(seen.has(r._key)) continue;
   seen.add(r._key);
   out.push(r);
  }
 }
 out.sort((a,b) => b.edge - a.edge);
 return out.slice(0, n);
}

 for(const m of allMatches){

   if(r.market !== marketName) continue;
   if(seen.has(r._key)) continue;
   seen.add(r._key);
   out.push(r);
  }
 }
 out.sort((a,b) => b.confidence - a.confidence);
 return out.slice(0, n);
}

function getAllMatches(allMatches){
 const out = [];
 const seen = new Set();
 for(const m of allMatches){

/* ==================== UI HELPERS ==================== */
function gaugeHTML(value, size='lg', label='SCORE'){
 const v = clamp(value || 0, 0, 100);
 const r = size === 'sm' ? 28 : 50;
 const c = 2 * Math.PI * r;
 const off = c * (1 - v/100);
 const cx = size === 'sm' ? 36 : 60;
 const cls = v >= 75 ? 'g-ok' : v >= 60 ? 'g-wa' : 'g-er';
 const W = size === 'sm' ? 72 : 120;
 return `<div class="gauge ${size==='sm'?'sm':''} ${cls}" data-badge="Confidence">
  <svg width="${W}" height="${W}" viewBox="0 0 ${W} ${W}">
   <circle class="bg-ring" cx="${cx}" cy="${cx}" r="${r}"/>
   <circle class="fg-ring" cx="${cx}" cy="${cx}" r="${r}" stroke-dasharray="${c.toFixed(2)}" stroke-dashoffset="${off.toFixed(2)}"/>
  </svg>
  <div class="lbl"><span class="v">${Math.round(v)}</span><span class="t">${escHtml(label)}</span></div>
 </div>`;
}

function dmBadgeFor(rec){
 const np = rec.sig?.s7?.np || 0;
 if(np >= 30) return `<span class="bdg bdg-dm-ok" data-badge="DM" title="DataMining solido - tocca per info">DM ${np}</span>`;
 if(np >= 15) return `<span class="bdg bdg-dm-wa" data-badge="DM" title="DataMining medio - tocca per info">DM ${np}</span>`;
 if(np > 0) return `<span class="bdg bdg-dm-er" data-badge="DM" title="DataMining scarso - tocca per info">DM ${np}</span>`;
 return '';
}

function badgesFor(rec){
 const out = [];
 if(rec.hasM1) out.push(`<span class="bdg bdg-m1" data-badge="M1" title="Regola M1 attiva - tocca per info">🏅 M1</span>`);
 const dm = dmBadgeFor(rec);
 if(dm) out.push(dm);
 if(rec.edge >= 5) out.push(`<span class="bdg bdg-val" data-badge="VALUE" title="Edge positivo - tocca per info">VALUE ${rec.edge.toFixed(1)}%</span>`);
 if(rec.sig?.s10?.dropDir === 'pro') out.push(`<span class="bdg bdg-gz" data-badge="Drop pro" title="Drop quota favorevole - tocca per info">📉 Drop pro</span>`);
 if(rec.sig?.s10?.dropDir === 'contra') out.push(`<span class="bdg bdg-dm-er" data-badge="Drop contra" title="Drop quota contrario - tocca per info">📈 Drop contra</span>`);
 if(rec.sig?.s6?.active && rec.sig.s6.direction !== 'neutral') out.push(`<span class="bdg bdg-gz" data-badge="GZ" title="GZ Index - tocca per info">📡 GZ</span>`);
 if(rec.sig?.s10?.significant) out.push(`<span class="bdg bdg-dm-wa" data-badge="DGT" title="DGT significativo - tocca per info">📉 DGT ${rec.sig.s10.dgt.toFixed(1)}</span>`);
 if(rec.capped) out.push(`<span class="bdg bdg-skip" data-badge="CAP" title="${escHtml(rec.capReason)} - tocca per info">🚨 CAP</span>`);
 return out.join('');
}

function breakdownHTML(rec){
 const tops = topContributors(rec.components, 5);
 const conflicts = topConflicts(rec.components, 2);
 const all = [...tops, ...conflicts];
 if(!all.length) return '<div class="bk-row"><span class="n">Nessun contributo significativo</span></div>';
 const rows = all.map(c => {
  const sign = c.contrib > 0 ? '+' : '';
  const cls = c.contrib > 0 ? 'pos' : (c.contrib < 0 ? 'neg' : 'zero');
  return `<div class="bk-row"><span class="n">${escHtml(c.label || c.key)} <small style="color:#8B95B4">(peso ${(c.weight*100).toFixed(0)}%)</small></span><span class="p ${cls}">${sign}${(c.contrib*100).toFixed(0)}</span></div>`;
 }).join('');
 return `<div class="breakdown">${rows}</div>`;
}

function renderCardCompact(rec){
 return `<div class="card">
  <div class="card-top">
   <div class="card-info">
    <div class="card-league">${escHtml(rec.lega || 'LEGA')} <span class="time">${escHtml(cleanTime(rec.ora) || '--:--')}</span></div>
    <div class="card-match" title="${escHtml(rec.match)}">${escHtml(rec.match)}</div>
   </div>
   <div class="card-conf">${gaugeHTML(rec.confidence, 'sm', '')}</div>
  </div>
  <div class="card-body">
   <div class="card-market">${escHtml(rec.market)}</div>
   <div class="card-stats">

    <div class="s"><span class="lb">Edge</span><span class="vl ${rec.edge>=3?'ok':rec.edge>=0?'warn':'err'}">${rec.edge>=0?'+':''}${rec.edge.toFixed(1)}%</span></div>

function renderCombo(combo, type, idx){
 const tipo = type === 'tris' ? 'Tris' : type === 'multipla' ? `Multipla ${combo.legs.length} leg` : 'Doppia';
 const ico = type === 'tris' ? '🎲' : type === 'multipla' ? '🎰' : '🎯';
 const legs = combo.legs.map(l => `<div class="combo-leg">
  <div class="n">${escHtml(l.match)}<div class="m">${escHtml(l.market)} · ${escHtml(cleanTime(l.ora))} · Conf ${l.confidence}</div></div>
  <div class="o">${l.odds?.toFixed(2) || '-'}</div>
 </div>`).join('');
 const stakeJoint = round(S.bankroll.segregated * 0.02, 2);
 const winJoint = round(stakeJoint * combo.totalOdds, 2);
 return `<div class="combo">
  <div class="combo-hdr">
   <div class="t">${ico} ${tipo} #${idx+1}</div>
   <div class="q">${combo.totalOdds.toFixed(2)}</div>
  </div>
  <div class="combo-legs">${legs}</div>
  <div class="combo-info">
   <div class="k"><span class="lb">P. Joint</span><span class="vl">${(combo.pJoint*100).toFixed(1)}%</span></div>
   <div class="k"><span class="lb">EV</span><span class="vl ${combo.ev>0?'ok':'err'}" style="color:${combo.ev>0?'var(--ok)':'var(--err)'}">${combo.ev>0?'+':''}${combo.ev_pct.toFixed(1)}%</span></div>
   <div class="k"><span class="lb">Stake sug.</span><span class="vl">${fmtEur(stakeJoint)}</span></div>
   <div class="k"><span class="lb">Vincita</span><span class="vl" style="color:var(--ok)">${fmtEur(winJoint)}</span></div>
  </div>
  <div style="margin-top:12px"><button class="mini-btn primary" data-add-combo="${type}|${idx}">+ Aggiungi alla schedina</button></div>
 </div>`;
}

/* ==================== TICKET ACTIONS ==================== */
function findRecBy(key, market){
 if(!S.output) return null;
 for(const m of S.output.allMatches){
  if(m.match._key === key){
   for(const r of m.recs) if(r.market === market) return r;
  }
 }
 return null;
}

function addToTicket(key, market){
 const rec = findRecBy(key, market);
 if(!rec){ showToast('Pick non trovata', 'err'); return; }
 if(S.ticket.legs.length >= 5){ showToast('Max 5 leg', 'err'); return; }
 if(S.ticket.legs.find(l => l._key === key)){ showToast('Match già in schedina', 'err'); return; }
 for(const ex of S.ticket.legs){
  const corr = correlationScore(ex, rec);
  if(corr > 0.35){
   if(!confirm(`Attenzione: correlazione ${(corr*100).toFixed(0)}% con "${ex.match}". Aggiungere comunque?`)) return;
  }
 }
 S.ticket.legs.push({
  _key: rec._key, match: rec.match, market: rec.market, odds: rec.odds,
  ora: rec.ora, lega: rec.lega, dir: rec.dir, side: rec.side,
  pModel: rec.pModel, confidence: rec.confidence
 });
 if(S.ticket.legs.length === 1) S.ticket.stake = Math.max(1, Math.round(rec.stake || 10));
 schedulePersist();
 showToast('Aggiunto alla schedina', 'ok');
 render();
}

function addComboToTicket(type, idx){
 const o = S.output;
 if(!o) return;
 let combo = null;
 if(type === 'doppia') combo = genDoppie(o.allMatches)[idx];
 else if(type === 'tris') combo = genTris(o.allMatches)[idx];
 else if(type === 'multipla'){
  const m4 = genMultipla(o.allMatches, 4, 5, 15, 2);
  const m5 = genMultipla(o.allMatches, 5, 8, 30, 1);
  combo = [...m4, ...m5][idx];
 }
 if(!combo) return;
 S.ticket.legs = combo.legs.map(l => ({
  _key: l._key, match: l.match, market: l.market, odds: l.odds,
  ora: l.ora, lega: l.lega, dir: l.dir, side: l.side,
  pModel: l.pModel, confidence: l.confidence
 }));
 S.ticket.stake = Math.max(1, Math.round(S.bankroll.segregated * 0.02));
 S.ui.tab = 'schedina';
 schedulePersist();
 showToast(`${type==='tris'?'Tris':type==='multipla'?'Multipla':'Doppia'} caricata`, 'ok');
 render();
}

function removeLeg(idx){ S.ticket.legs.splice(idx,1); schedulePersist(); render(); }
function clearTicket(){ if(!S.ticket.legs.length) return; if(!confirm('Svuotare la schedina?')) return; S.ticket.legs = []; S.ticket.stake = 10; schedulePersist(); render(); }

function confirmTicket(){
 if(!S.ticket.legs.length) return;
 const totalOdds = S.ticket.legs.reduce((s,l) => s * (l.odds||1), 1);
 const tipo = S.ticket.legs.length === 1 ? 'Singola' : S.ticket.legs.length === 2 ? 'Doppia' : S.ticket.legs.length === 3 ? 'Tris' : `Multipla x${S.ticket.legs.length}`;
 const entry = {
  id: 'h_' + Date.now() + '_' + Math.random().toString(36).slice(2,7),
  savedAt: new Date().toISOString(),
  tipo, legs: S.ticket.legs.slice(), totalOdds, stake: S.ticket.stake, status:'open', profit: 0
 };
 S.history.unshift(entry);
 S.ticket.legs = []; S.ticket.stake = 10;
 schedulePersist();
 showToast('Pick salvata', 'ok');
 S.ui.tab = 'storico';
 render();
}

function setHistStatus(id, status){
 const item = S.history.find(x => x.id === id);
 if(!item) return;
 item.status = status;
 if(status === 'won') item.profit = item.stake * item.totalOdds - item.stake;
 else if(status === 'lost') item.profit = -item.stake;
 else item.profit = 0;
 recomputeBankrollPL();
 schedulePersist();
 render();
}

function removeHist(id){
 if(!confirm('Eliminare?')) return;
 S.history = S.history.filter(x => x.id !== id);
 recomputeBankrollPL();
 schedulePersist();
 render();
}

function recomputeBankrollPL(){
 const today = new Date().toDateString();
 const startWeek = startOfWeekISO();
 let pld = 0, plw = 0;
 S.history.forEach(h => {
  if(h.status === 'open') return;
  const d = new Date(h.savedAt);
  if(d.toDateString() === today) pld += h.profit || 0;
  if(d.toISOString() >= startWeek) plw += h.profit || 0;
 });
 S.bankroll.pl_day = pld;
 S.bankroll.pl_week = plw;
}

/* ==================== PERSISTENZA ==================== */
let saveTimer = null;
function schedulePersist(){ clearTimeout(saveTimer); saveTimer = setTimeout(persistState, 400); }
function persistState(){
 try {
  const toSave = {
   version: VERSION, savedAt: new Date().toISOString(),
   bankroll: S.bankroll, ticket: S.ticket, history: S.history,
   ui: { tab: S.ui.tab, uploadOpen: S.ui.uploadOpen, view: S.ui.view, market: S.ui.market }
  };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(toSave));
 } catch(e){ console.warn('Persist failed', e); }
}
function loadState(){
 try {
  const raw = localStorage.getItem(STORAGE_KEY);
  if(!raw) return;
  const obj = JSON.parse(raw);
  if(!obj || obj.version !== VERSION) return;
  if(obj.bankroll) Object.assign(S.bankroll, obj.bankroll);
  if(obj.ticket) Object.assign(S.ticket, obj.ticket);
  if(Array.isArray(obj.history)) S.history = obj.history;
  if(obj.ui) Object.assign(S.ui, obj.ui);
  recomputeBankrollPL();
 } catch(e){ console.warn('Load failed', e); }
}

/* ==================== EXPORT PDF ==================== */
function exportFullPDF(){
 if(!window.jspdf || !window.jspdf.jsPDF){ showToast('PDF non pronta','err'); return; }
 if(!S.output){ showToast('Nessun calcolo','err'); return; }
 const { jsPDF } = window.jspdf;
 const doc = new jsPDF({unit:'mm', format:'a4'});
 const o = S.output;
 doc.setFillColor(29,36,56); doc.rect(0,0,210,24,'F');
 doc.setTextColor(255,255,255); doc.setFont('helvetica','bold'); doc.setFontSize(15);
 doc.text('Match Analyzer Pro - Fase 5', 14, 12);
 doc.setFontSize(9); doc.setTextColor(200,208,228);
 doc.text(`${new Date().toLocaleDateString('it-IT')} - ${o.matchesCount} match`, 14, 18);
 let y = 30;
 const singole = genSingoleBilanciate(o.allMatches, 15);
 if(singole.length){
  doc.setTextColor(30,30,30); doc.setFontSize(11); doc.setFont('helvetica','bold');
  doc.text('Singole bilanciate (1.65-1.80)', 14, y); y += 5;
  doc.autoTable({
   startY: y,
   head: [['#','Match','Mercato','Quota','Conf','Edge%','Stake']],
   body: singole.map((r,i) => [i+1, r.match, r.market, r.odds?.toFixed(2), r.confidence, r.edge.toFixed(1), r.stake.toFixed(2)]),
   theme:'grid', styles:{fontSize:8, cellPadding:2.5}, headStyles:{fillColor:[59,123,255]}, margin:{left:14,right:14}
  });
  y = doc.lastAutoTable.finalY + 8;
 }
 const doppie = genDoppie(o.allMatches);
 if(doppie.length){
  if(y > 230){ doc.addPage(); y = 14; }
  doc.setFontSize(11); doc.setFont('helvetica','bold');
  doc.text('Doppie (1.90-2.50)', 14, y); y += 5;
  doppie.forEach((d,i) => {
   doc.autoTable({
    startY: y,
    head: [['Doppia #'+(i+1), 'Match', 'Mercato', 'Quota']],
    body: [...d.legs.map(l => ['Leg', l.match, l.market, l.odds?.toFixed(2)]), ['TOTALE', '', `EV ${d.ev_pct.toFixed(1)}%`, d.totalOdds.toFixed(2)]],
    theme:'grid', styles:{fontSize:8, cellPadding:2.5}, headStyles:{fillColor:[192,132,252]}, margin:{left:14,right:14}
   });
   y = doc.lastAutoTable.finalY + 5;
   if(y > 260){ doc.addPage(); y = 14; }
  });
 }
 for(let p=1; p<=doc.internal.getNumberOfPages(); p++){
  doc.setPage(p);
  doc.setFontSize(8); doc.setTextColor(120,120,120);
  doc.text(`Pagina ${p} - MAP F5`, 14, 290);
 }
 doc.save(`MAP_F5_${new Date().toISOString().slice(0,10)}.pdf`);
 showToast('PDF generato', 'ok');
}

function exportTicketPDF(){
 if(!window.jspdf || !window.jspdf.jsPDF){ showToast('PDF non pronta','err'); return; }
 if(!S.ticket.legs.length){ showToast('Schedina vuota','err'); return; }
 const { jsPDF } = window.jspdf;
 const doc = new jsPDF({unit:'mm', format:'a5'});
 const t = S.ticket;
 const totalOdds = t.legs.reduce((s,l) => s * (l.odds||1), 1);
 const win = t.stake * totalOdds;
 doc.setFillColor(76,224,135); doc.rect(0,0,148,16,'F');

 doc.text('SCHEDINA - MAP F5', 10, 10);
 doc.setTextColor(30,30,30); doc.setFontSize(9);
 doc.autoTable({
  startY: 22,
  head: [['#','Match','Mercato','Quota']],
  body: t.legs.map((l,i) => [i+1, l.match, l.market, l.odds?.toFixed(2)]),
  theme:'grid', styles:{fontSize:8,cellPadding:3}, headStyles:{fillColor:[59,123,255]}, margin:{left:10,right:10}
 });

 doc.setFontSize(10); doc.setFont('helvetica','bold');
