/* ==================== UPLOAD HANDLERS ==================== */
async function handleFileUpload(input){
 const key = input.dataset.target;
 const file = input.files && input.files[0];
 if(!key || !file){ setUploadStatus('File o target mancante', 'err'); return; }
 setUploadStatus(`Lettura ${file.name}…`);
 try {
  const text = typeof file.text === 'function' ? await file.text() : await new Promise((res,rej) => {
   const fr = new FileReader();
   fr.onload = () => res(String(fr.result || ''));
   fr.onerror = () => rej(fr.error);
   fr.readAsText(file);
  });
  if(!text.trim()) throw new Error('File vuoto');
  parseAndStore(key, text);
  const n = (S.datasets[key]||[]).length;
  setUploadStatus(`✅ ${file.name} caricato in ${key}: ${n} righe`, 'ok');
  runDecisionEngine();
  render();
 } catch(e){
  console.error(e);
  setUploadStatus(`❌ Errore su ${file.name}: ${e.message}`, 'err');
 } finally {
  input.value = '';
 }
}

function clearDataset(key){
 if(!confirm(`Reset del dataset ${key}?`)) return;
 S.datasets[key] = [];
 setUploadStatus(`Dataset ${key} resettato`);
 runDecisionEngine();
 render();
}

/* ==================== EVENT WIRING ==================== */
function bindEvents(){
 // Tab nav
 document.getElementById('navTabs').addEventListener('click', e => {
  const btn = e.target.closest('.nav-btn');
  if(!btn) return;
  S.ui.tab = btn.dataset.tab;
  schedulePersist();
  render();
 });

 // Upload toggle
 document.getElementById('uploadTg').addEventListener('click', () => {
  S.ui.uploadOpen = !S.ui.uploadOpen;
  const body = document.getElementById('uploadBody');
  const tg = document.getElementById('uploadTg');
  if(S.ui.uploadOpen){ body.classList.add('open'); tg.classList.add('open'); }
  else { body.classList.remove('open'); tg.classList.remove('open'); }
  schedulePersist();
 });

 // File input change (delegato)
 document.body.addEventListener('change', e => {
  const t = e.target;
  if(t.tagName === 'INPUT' && t.type === 'file' && t.dataset.target){
   handleFileUpload(t);
  }
  if(t.id === 'afterLossSel'){
   S.bankroll.afterLossActive = t.value === 'true';
   schedulePersist();
   runDecisionEngine();
   render();
  }
 });

 // Click delegato globale
 document.body.addEventListener('click', e => {
  const tgt = e.target;
  // Pick file
  const pick = tgt.closest('[data-pick]');
  if(pick){
   const inp = document.querySelector(`input[type=file][data-target="${pick.dataset.pick}"]`);
   if(inp) inp.click();
   return;
  }
  // Clear dataset
  const clr = tgt.closest('[data-clear]');
  if(clr){ clearDataset(clr.dataset.clear); return; }
  // Add to ticket
  const add = tgt.closest('[data-add]');
  if(add){
   const [k,m] = add.dataset.add.split('|');
   addToTicket(k, m);
   return;
  }
  // Add combo
  const addCombo = tgt.closest('[data-add-combo]');
  if(addCombo){
   const [type,idx] = addCombo.dataset.addCombo.split('|');
   addComboToTicket(type, parseInt(idx));
   return;
  }
  // Remove leg
  const rml = tgt.closest('[data-rm-leg]');
  if(rml){ removeLeg(parseInt(rml.dataset.rmLeg)); return; }
  // History status
  const hs = tgt.closest('[data-set-status]');
  if(hs){ const [id,st] = hs.dataset.setStatus.split('|'); setHistStatus(id, st); return; }
  const hd = tgt.closest('[data-rm-hist]');
  if(hd){ removeHist(hd.dataset.rmHist); return; }
  // Bottoni specifici
  if(tgt.id === 'kellyApply'){
   if(S.ticket.legs.length === 1){
    const rec = findRecBy(S.ticket.legs[0]._key, S.ticket.legs[0].market);
    if(rec){ S.ticket.stake = Math.max(1, Math.round(rec.stake)); render(); }
   } else if(S.ticket.legs.length > 1){
    const totalOdds = S.ticket.legs.reduce((s,l) => s * l.odds, 1);
    const pJoint = S.ticket.legs.reduce((s,l) => s * (l.pModel || 0.5), 1);
    const k = kellyStake(pJoint, totalOdds, {confidence: Math.min(...S.ticket.legs.map(l=>l.confidence||60))});
    S.ticket.stake = Math.max(1, Math.round(k.eur));
    render();
   }
   return;
  }
  if(tgt.id === 'confirmTicket'){ confirmTicket(); return; }
  if(tgt.id === 'clearTicket'){ clearTicket(); return; }
  if(tgt.id === 'exportTicketPDF'){ exportTicketPDF(); return; }
  if(tgt.id === 'exportFullPDF'){ exportFullPDF(); return; }
  if(tgt.id === 'exportJSON'){ exportJSON(); return; }
  if(tgt.id === 'recomputeBtn'){ runDecisionEngine(); render(); showToast('Ricalcolato', 'ok'); return; }
  if(tgt.id === 'bkSave'){
   const tot = parseFloat(document.getElementById('bkTotal').value) || 1000;
   const seg = parseFloat(document.getElementById('bkSeg').value) || tot;
   S.bankroll.total = tot;
   S.bankroll.segregated = seg;
   schedulePersist();
   runDecisionEngine();
   render();
   showToast('Configurazione salvata', 'ok');
   return;
  }
  if(tgt.id === 'bkResetWeek'){
   if(!confirm('Reset P/L settimanale?')) return;
   S.bankroll.startWeek = startOfWeekISO();
   S.bankroll.pl_week = 0;
   schedulePersist(); render(); return;
  }
  if(tgt.id === 'bkResetAll'){
   if(!confirm('ATTENZIONE: reset completo bankroll e P/L. Procedere?')) return;
   S.bankroll.pl_day = 0; S.bankroll.pl_week = 0;
   S.bankroll.afterLossActive = false;
   schedulePersist(); render(); return;
  }
 });

 // Input range / number live
 document.body.addEventListener('input', e => {
  if(e.target.id === 'kellyFrac'){
   const v = parseFloat(e.target.value);
   document.getElementById('kellyFracOut').textContent = v.toFixed(2);
   S.bankroll.kellyFraction = v;
   schedulePersist();
   runDecisionEngine();
  }
  if(e.target.id === 'capPct'){
   const v = parseFloat(e.target.value);
   document.getElementById('capPctOut').textContent = (v*100).toFixed(1)+'%';
   S.bankroll.capPct = v;
   schedulePersist();
   runDecisionEngine();
  }
  if(e.target.id === 'stakeInp'){
   S.ticket.stake = parseFloat(e.target.value) || 0;
   schedulePersist();
   const totalOdds = S.ticket.legs.reduce((s,l) => s * (l.odds||1), 1);
   const win = S.ticket.stake * totalOdds;
   const profit = win - S.ticket.stake;
   const wEls = document.querySelectorAll('.ticket-total .v');
   if(wEls[0]) wEls[0].textContent = fmtEur(win);
   if(wEls[1]) wEls[1].textContent = fmtEur(profit);
  }
  if(e.target.id === 'histSearch'){
   S.ui.q = e.target.value;
   const rows = document.querySelectorAll('.hist-row');
   const q = normMatchKey(e.target.value);
   rows.forEach(r => {
    const txt = normMatchKey(r.textContent);
    r.style.display = (!q || txt.includes(q)) ? '' : 'none';
   });
  }
 });

 // Select change
 document.body.addEventListener('change', e => {
  if(e.target.id === 'histStat'){
   S.ui.histFilter = e.target.value;
   schedulePersist();
   render();
  }
 });

 // Bus subscriptions
 bus.on('csv:loaded', () => render());
 bus.on('data:recomputed', () => {
  if(S.ui.tab === 'oggi') renderOggi();
 });
}

 loadState();
 bindEvents();
 render();
 // Apri pannello upload all'inizio se nessun dato
 const hasData = DATASETS.some(d => (S.datasets[d.key]||[]).length > 0);
 if(!hasData && !S.ui.uploadOpen){
  setTimeout(() => {
   document.getElementById('uploadTg').click();
  }, 200);
 }
 console.log('Match Analyzer Pro · Fase 5 Smart Advisor · pronto');
}

global.MAP = {init, S, bus, runDecisionEngine, render};

// Avvio quando DOM è pronto
if(document.readyState === 'loading'){
 document.addEventListener('DOMContentLoaded', init);
} else {
 init();
}

})(window);
