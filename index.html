<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0B0F17">
<title>Match Analyzer Pro – Fase 5 · Smart Advisor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
/* ==================== DESIGN TOKENS ==================== */
*{margin:0;padding:0;box-sizing:border-box}
:root{
 --bg0:#0B0F17;--bg1:#121826;--bg2:#1B2336;--bg3:#252D42;
 --brd1:#2A3448;--brd2:#3A4560;
 --fg1:#E6EAF2;--fg2:#9AA4B8;--fg3:#6B7490;
 --ok:#4ade80;--ok2:#16A34A;--ok-bg:rgba(74,222,128,.1);
 --warn:#fbbf24;--warn2:#D97706;--warn-bg:rgba(251,191,36,.1);
 --err:#f87171;--err2:#DC2626;--err-bg:rgba(248,113,113,.1);
 --info:#60a5fa;--info-bg:rgba(96,165,250,.1);
 --cta:#2563EB;--cta-h:#1D4ED8;
 --gold:#FFD700;--gold-bg:rgba(255,215,0,.12);
 --mag:#c084fc;--mag-bg:rgba(192,132,252,.12);
 --cyn:#22d3ee;--cyn-bg:rgba(34,211,238,.1);
 --S:'DM Sans',system-ui,sans-serif;
 --M:'IBM Plex Mono',ui-monospace,monospace;
 --rs:8px;--rm:12px;--rl:18px;--rxl:24px;
 --sh1:0 1px 2px rgba(0,0,0,.3),0 6px 18px rgba(0,0,0,.22);
 --sh2:0 2px 4px rgba(0,0,0,.4),0 12px 36px rgba(0,0,0,.35);
}
html{font-size:15px;background:var(--bg0)}
body{background:var(--bg0);color:var(--fg1);font-family:var(--S);min-height:100vh;min-height:100dvh;-webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);line-height:1.5}
button,input,select,textarea{font:inherit;color:inherit}
button{border:none;background:none;cursor:pointer}

/* ==================== LAYOUT ==================== */
.app{max-width:920px;margin:0 auto;padding:14px 14px 120px;min-height:100vh;min-height:100dvh}
.hdr{padding:14px 0 10px;margin-bottom:10px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap}
.hdr-l h1{font-size:1.4rem;font-weight:700;color:#fff;letter-spacing:-.5px;line-height:1.2}
.hdr-l h1 span{color:var(--ok)}
.hdr-l .sub{font:500 .78rem var(--S);color:var(--fg3);margin-top:2px}
.hdr-r{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.bk-mini{padding:8px 12px;background:var(--bg1);border:1px solid var(--brd1);border-radius:10px;font:600 .85rem var(--M);color:var(--fg1)}
.bk-mini .lbl{font:500 .65rem var(--S);color:var(--fg3);text-transform:uppercase;letter-spacing:.5px;display:block}
.bk-mini.pos{color:var(--ok)}
.bk-mini.neg{color:var(--err)}

/* ==================== TAB NAV ==================== */
.nav{display:flex;gap:4px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;scrollbar-width:none;background:var(--bg1);border-radius:12px;padding:4px;border:1px solid var(--brd1)}
.nav::-webkit-scrollbar{display:none}
.nav-btn{padding:10px 16px;border-radius:9px;font:600 .85rem var(--S);color:var(--fg2);white-space:nowrap;transition:all .15s;flex-shrink:0;display:flex;align-items:center;gap:6px}
.nav-btn:hover{color:var(--fg1);background:var(--bg2)}
.nav-btn.active{background:var(--bg3);color:#fff;box-shadow:inset 0 1px 0 rgba(255,255,255,.05)}
.nav-btn .ico{font-size:1rem}

/* ==================== PANEL UPLOAD ==================== */
.panel{background:var(--bg1);border:1px solid var(--brd1);border-radius:var(--rm);padding:14px;margin-bottom:14px}
.panel-tg{display:flex;align-items:center;justify-content:space-between;padding:4px 0;cursor:pointer;user-select:none}
.panel-tg h3{font-size:1rem;font-weight:600;color:var(--fg1);display:flex;align-items:center;gap:8px}
.panel-tg h3 .n{font:500 .75rem var(--M);color:var(--fg3);padding:2px 8px;background:var(--bg2);border-radius:6px}
.panel-tg .arrow{color:var(--fg3);font-size:1.1rem;transition:transform .2s}
.panel-tg.open .arrow{transform:rotate(180deg)}
.panel-body{max-height:0;overflow:hidden;transition:max-height .3s ease}
.panel-body.open{max-height:2000px;padding-top:12px}
.up-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}
.up-card{position:relative;padding:12px;border:1.5px dashed var(--brd2);border-radius:var(--rs);background:rgba(255,255,255,.01);display:flex;flex-direction:column;gap:6px;min-height:110px;transition:all .15s}
.up-card:hover{border-color:var(--ok2);background:rgba(74,222,128,.03)}
.up-card.loaded{border-style:solid;border-color:var(--ok2);background:rgba(74,222,128,.04)}
.up-lbl{font:700 .8rem var(--M);color:#fff;display:flex;align-items:center;gap:6px}
.up-lbl .tag-num{font:600 .68rem var(--M);color:var(--fg3);padding:1px 6px;background:var(--bg2);border-radius:4px}
.up-meta{font:500 .78rem var(--S);color:var(--fg2);line-height:1.45;flex:1}
.up-meta small{display:block;color:var(--fg3);font-size:.72rem;margin-top:2px}
.up-count{color:var(--ok);font-weight:700}
.up-actions{display:flex;gap:6px;align-items:center}
.up-btn{padding:6px 10px;background:var(--bg2);border:1px solid var(--brd1);border-radius:6px;color:var(--fg1);font:600 .72rem var(--M);cursor:pointer;transition:all .15s}
.up-btn:hover{border-color:var(--ok2);color:var(--ok)}
.up-btn.clear{color:var(--err);border-color:rgba(248,113,113,.3)}
.up-btn.clear:hover{background:var(--err-bg)}
.up-card input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;z-index:1}
.up-card .up-actions{position:relative;z-index:2}
.up-note{margin-top:10px;padding:8px 10px;background:var(--bg0);border-radius:6px;color:var(--fg3);font:500 .75rem var(--S);line-height:1.5}
.up-status{margin-top:8px;padding:8px 10px;border-radius:6px;font:500 .8rem var(--S)}
.up-status.ok{background:var(--ok-bg);color:var(--ok)}
.up-status.err{background:var(--err-bg);color:var(--err)}

/* ==================== HERO BET OF THE DAY ==================== */
.hero{background:linear-gradient(145deg,var(--bg1) 0%,var(--bg2) 100%);border:1px solid var(--brd1);border-left:4px solid var(--ok);border-radius:var(--rxl);padding:22px 20px;margin-bottom:16px;position:relative;overflow:hidden;box-shadow:var(--sh2)}
.hero::before{content:"";position:absolute;top:-80px;right:-60px;width:200px;height:200px;background:radial-gradient(circle,rgba(74,222,128,.12) 0%,transparent 70%);pointer-events:none}
.hero-hdr{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.hero-tag{padding:4px 10px;background:var(--gold-bg);color:var(--gold);border:1px solid rgba(255,215,0,.3);border-radius:6px;font:800 .72rem var(--M);letter-spacing:1px;text-transform:uppercase;display:inline-flex;align-items:center;gap:6px}
.hero-league{font:500 .78rem var(--S);color:var(--fg3);margin-left:auto}
.hero-title{font:700 1.25rem var(--S);color:#fff;line-height:1.3;margin-bottom:4px}
.hero-sub{font:500 .85rem var(--S);color:var(--fg2);margin-bottom:14px}
.hero-grid{display:grid;grid-template-columns:auto 1fr;gap:18px;align-items:center;margin-bottom:16px}
.hero-gauge{flex-shrink:0}
.hero-pick{display:flex;flex-direction:column;gap:8px}
.hero-market{font:800 1.1rem var(--S);color:#fff}
.hero-odds{display:flex;flex-wrap:wrap;gap:14px;align-items:baseline}
.hero-odds .it{display:flex;flex-direction:column}
.hero-odds .lb{font:500 .68rem var(--S);color:var(--fg3);text-transform:uppercase;letter-spacing:.5px}
.hero-odds .vl{font:700 1.05rem var(--M);color:#fff}
.hero-odds .vl.ok{color:var(--ok)}
.hero-odds .vl.info{color:var(--info)}
.hero-narr{padding:12px 14px;background:rgba(0,0,0,.2);border-radius:var(--rm);color:var(--fg1);font:400 .88rem var(--S);line-height:1.55;margin-bottom:14px;border-left:2px solid var(--ok)}
.hero-cta{display:flex;gap:8px;flex-wrap:wrap}
.btn{padding:10px 16px;border-radius:10px;font:600 .88rem var(--S);transition:all .15s;display:inline-flex;align-items:center;gap:6px;cursor:pointer;border:1px solid transparent}
.btn-primary{background:var(--cta);color:#fff;border-color:var(--cta)}
.btn-primary:hover{background:var(--cta-h)}
.btn-ghost{background:transparent;color:var(--fg1);border-color:var(--brd1)}
.btn-ghost:hover{border-color:var(--brd2);background:var(--bg2)}
.btn-ok{background:var(--ok-bg);color:var(--ok);border-color:rgba(74,222,128,.25)}
.btn-ok:hover{background:rgba(74,222,128,.18)}

/* ==================== GAUGE SVG ==================== */
.gauge{position:relative;width:120px;height:120px}
.gauge.sm{width:72px;height:72px}
.gauge svg{transform:rotate(-90deg)}
.gauge .bg-ring{fill:none;stroke:var(--bg3);stroke-width:10}
.gauge .fg-ring{fill:none;stroke:var(--ok);stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset .6s ease,stroke .3s}
.gauge.sm .bg-ring,.gauge.sm .fg-ring{stroke-width:7}
.gauge .lbl{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.gauge .lbl .v{font:800 1.4rem var(--M);color:#fff;line-height:1}
.gauge.sm .lbl .v{font-size:1rem}
.gauge .lbl .t{font:500 .6rem var(--S);color:var(--fg3);text-transform:uppercase;letter-spacing:.6px;margin-top:2px}
.gauge.sm .lbl .t{font-size:.5rem}
.gauge.g-ok .fg-ring{stroke:var(--ok)}
.gauge.g-wa .fg-ring{stroke:var(--warn)}
.gauge.g-er .fg-ring{stroke:var(--err)}

/* ==================== CARD STANDARD ==================== */
.sec{display:flex;align-items:center;gap:10px;margin:20px 0 10px;padding-bottom:8px;border-bottom:1px solid var(--brd1)}
.sec h2{font:700 1rem var(--S);color:#fff;display:flex;align-items:center;gap:8px}
.sec .ct{font:500 .78rem var(--S);color:var(--fg3);margin-left:auto}
.sec .ico{font-size:1.05rem}

.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:10px}
.card{background:var(--bg1);border:1px solid var(--brd1);border-radius:var(--rm);padding:13px;transition:all .15s;position:relative;cursor:pointer}
.card:hover{border-color:var(--brd2);background:var(--bg2);transform:translateY(-1px);box-shadow:var(--sh1)}
.card-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
.card-info{flex:1;min-width:0}
.card-league{font:500 .7rem var(--S);color:var(--fg3);margin-bottom:2px;text-transform:uppercase;letter-spacing:.4px}
.card-match{font:600 .95rem var(--S);color:#fff;line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:2px}
.card-time{font:500 .75rem var(--M);color:var(--fg3)}
.card-body{padding:8px 0}
.card-market{font:700 .95rem var(--S);color:#fff;margin-bottom:6px}
.card-stats{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:6px}
.card-stats .s{display:flex;flex-direction:column}
.card-stats .lb{font:500 .62rem var(--S);color:var(--fg3);text-transform:uppercase;letter-spacing:.4px}
.card-stats .vl{font:700 .88rem var(--M);color:var(--fg1)}
.card-stats .vl.ok{color:var(--ok)}
.card-stats .vl.warn{color:var(--warn)}
.card-stats .vl.err{color:var(--err)}
.card-badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.card-foot{display:flex;align-items:center;justify-content:space-between;gap:8px;padding-top:8px;border-top:1px solid var(--brd1);margin-top:8px}
.card-foot-l{display:flex;align-items:center;gap:8px}

/* Badge */
.bdg{padding:3px 8px;border-radius:5px;font:700 .7rem var(--M);display:inline-flex;align-items:center;gap:4px;white-space:nowrap}
.bdg-m1{background:var(--gold-bg);color:var(--gold);border:1px solid rgba(255,215,0,.3)}
.bdg-dm-ok{background:var(--ok-bg);color:var(--ok);border:1px solid rgba(74,222,128,.3)}
.bdg-dm-wa{background:var(--warn-bg);color:var(--warn);border:1px solid rgba(251,191,36,.3)}
.bdg-dm-er{background:var(--err-bg);color:var(--err);border:1px solid rgba(248,113,113,.3)}
.bdg-val{background:var(--mag-bg);color:var(--mag);border:1px solid rgba(192,132,252,.3)}
.bdg-gz{background:var(--info-bg);color:var(--info);border:1px solid rgba(96,165,250,.3)}
.bdg-neu{background:rgba(255,255,255,.04);color:var(--fg2);border:1px solid var(--brd1)}
.bdg-ok{background:var(--ok-bg);color:var(--ok);border:1px solid rgba(74,222,128,.3)}
.bdg-skip{background:var(--err-bg);color:var(--err);border:1px solid rgba(248,113,113,.3)}

.mini-btn{padding:5px 9px;background:var(--bg2);border:1px solid var(--brd1);border-radius:6px;color:var(--fg2);font:600 .7rem var(--M);cursor:pointer;display:inline-flex;align-items:center;gap:4px}
.mini-btn:hover{border-color:var(--ok2);color:var(--ok)}
.mini-btn.primary{background:var(--cta);border-color:var(--cta);color:#fff}
.mini-btn.primary:hover{background:var(--cta-h)}
.mini-btn.ok{background:var(--ok-bg);color:var(--ok);border-color:rgba(74,222,128,.25)}

/* Gauge compatto nella card */
.card-conf{display:flex;align-items:center;gap:10px}

/* Narrative expandable */
details.narr{background:var(--bg0);border:1px solid var(--brd1);border-radius:var(--rs);padding:0;margin-top:8px}
details.narr summary{padding:8px 12px;cursor:pointer;font:600 .78rem var(--S);color:var(--fg2);list-style:none;display:flex;align-items:center;gap:6px;user-select:none}
details.narr summary::-webkit-details-marker{display:none}
details.narr summary:hover{color:var(--fg1)}
details.narr summary::before{content:"▸";transition:transform .15s;color:var(--fg3)}
details.narr[open] summary::before{transform:rotate(90deg)}
details.narr[open] summary{color:var(--fg1);border-bottom:1px solid var(--brd1)}
details.narr .narr-body{padding:10px 12px;font:400 .84rem var(--S);color:var(--fg1);line-height:1.6}
details.narr .breakdown{margin-top:8px;border-top:1px dashed var(--brd1);padding-top:8px}
details.narr .bk-row{display:flex;justify-content:space-between;gap:10px;padding:4px 0;font:500 .78rem var(--S)}
details.narr .bk-row .n{color:var(--fg2)}
details.narr .bk-row .p{font:700 .78rem var(--M)}
details.narr .bk-row .p.pos{color:var(--ok)}
details.narr .bk-row .p.neg{color:var(--err)}
details.narr .bk-row .p.zero{color:var(--fg3)}

/* ==================== EMPTY / STATUS ==================== */
.empty{text-align:center;padding:40px 20px;color:var(--fg3);background:var(--bg1);border:1px dashed var(--brd1);border-radius:var(--rm)}
.empty .ico{font-size:2.4rem;margin-bottom:10px;opacity:.45}
.empty p{font:500 .92rem var(--S);line-height:1.6;margin:0 auto;max-width:46ch}
.empty p.title{font-weight:700;color:var(--fg1);margin-bottom:6px}

.info-box{padding:12px 14px;background:var(--info-bg);color:var(--info);border:1px solid rgba(96,165,250,.25);border-radius:var(--rm);font:500 .85rem var(--S);line-height:1.5;margin-bottom:10px}
.warn-box{padding:12px 14px;background:var(--warn-bg);color:var(--warn);border:1px solid rgba(251,191,36,.3);border-radius:var(--rm);font:500 .85rem var(--S);line-height:1.5;margin-bottom:10px}
.err-box{padding:12px 14px;background:var(--err-bg);color:var(--err);border:1px solid rgba(248,113,113,.3);border-radius:var(--rm);font:500 .85rem var(--S);line-height:1.5;margin-bottom:10px}

/* ==================== SCHEDINA ==================== */
.ticket{background:var(--bg1);border:1px solid var(--brd1);border-radius:var(--rm);padding:14px;margin-bottom:10px}
.ticket-hdr{display:flex;align-items:center;justify-content:space-between;padding-bottom:10px;border-bottom:1px solid var(--brd1);margin-bottom:10px;gap:10px;flex-wrap:wrap}
.ticket-hdr h3{font:700 1rem var(--S);color:#fff}
.ticket-hdr .meta{font:500 .75rem var(--S);color:var(--fg3)}
.ticket-leg{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px dashed var(--brd1)}
.ticket-leg:last-child{border-bottom:none}
.ticket-leg .info{flex:1;min-width:0}
.ticket-leg .info .m{font:600 .88rem var(--S);color:#fff}
.ticket-leg .info .s{font:500 .78rem var(--S);color:var(--fg2);margin-top:2px}
.ticket-leg .odds{font:700 .9rem var(--M);color:var(--ok);min-width:50px;text-align:right}
.ticket-leg .del{width:30px;height:30px;border-radius:6px;background:var(--bg2);color:var(--err);display:flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid var(--brd1)}
.ticket-leg .del:hover{border-color:var(--err);background:var(--err-bg)}
.ticket-total{display:flex;justify-content:space-between;align-items:center;padding-top:10px;border-top:1px solid var(--brd1);margin-top:10px;gap:10px;flex-wrap:wrap}
.ticket-total .t{font:500 .82rem var(--S);color:var(--fg2)}
.ticket-total .v{font:800 1.15rem var(--M);color:var(--ok)}
.stake-ctrl{display:flex;gap:6px;align-items:center;flex-wrap:wrap;padding:10px 0}
.stake-ctrl input[type=number]{width:90px;padding:8px 10px;background:var(--bg0);border:1px solid var(--brd1);border-radius:6px;color:#fff;font:600 .88rem var(--M);outline:none}
.stake-ctrl input:focus{border-color:var(--ok)}
.stake-ctrl .lb{font:500 .8rem var(--S);color:var(--fg2)}

/* ==================== BANKROLL ==================== */
.bk-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:14px}
.bk-card{background:var(--bg1);border:1px solid var(--brd1);border-radius:var(--rm);padding:12px}
.bk-card .lbl{font:500 .7rem var(--S);color:var(--fg3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.bk-card .vl{font:800 1.35rem var(--M);color:#fff}
.bk-card .vl.pos{color:var(--ok)}
.bk-card .vl.neg{color:var(--err)}
.bk-card .sub{font:500 .72rem var(--S);color:var(--fg3);margin-top:4px}
.bk-ctrl{background:var(--bg1);border:1px solid var(--brd1);border-radius:var(--rm);padding:14px;margin-bottom:14px}
.bk-ctrl h3{font:700 .95rem var(--S);color:#fff;margin-bottom:10px}
.bk-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
.bk-row label{font:500 .82rem var(--S);color:var(--fg2);min-width:120px}
.bk-row input,.bk-row select{padding:8px 10px;background:var(--bg0);border:1px solid var(--brd1);border-radius:6px;color:#fff;font:600 .85rem var(--M);outline:none}
.bk-row input:focus,.bk-row select:focus{border-color:var(--ok)}
.bk-row input[type=range]{flex:1;min-width:140px}
.bk-row .out{font:700 .88rem var(--M);color:var(--ok);min-width:50px;text-align:right}
.lookup{width:100%;border-collapse:collapse;margin-top:10px;font-size:.8rem}
.lookup th,.lookup td{padding:8px 6px;text-align:center;border:1px solid var(--brd1)}
.lookup th{background:var(--bg2);color:var(--fg2);font-weight:700;font-family:var(--M);font-size:.75rem}
.lookup td{color:var(--fg1);font-family:var(--M);font-weight:600}
.lookup td.hl{background:var(--ok-bg);color:var(--ok)}

/* ==================== STORICO ==================== */
.hist-row{background:var(--bg1);border:1px solid var(--brd1);border-radius:var(--rm);padding:12px;margin-bottom:8px}
.hist-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;flex-wrap:wrap}
.hist-info .n{font:600 .9rem var(--S);color:#fff}
.hist-info .s{font:500 .76rem var(--S);color:var(--fg2);margin-top:2px}
.hist-actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}

/* ==================== STRUMENTI ==================== */
.str-sec{background:var(--bg1);border:1px solid var(--brd1);border-radius:var(--rm);padding:14px;margin-bottom:14px}
.str-sec h3{font:700 .95rem var(--S);color:#fff;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.str-sec p{font:500 .85rem var(--S);color:var(--fg2);line-height:1.55;margin-bottom:8px}

 {key:'ov05pt', label:'Ov 0.5 PT', hint:'IND / Delta / Diff / COv05'},

};

// Default stato
const defaultState = () => ({
 version: VERSION,
 savedAt: new Date().toISOString(),
 datasets: {},         // parsed rows per dataset (non persistito su LS)
 output: null,         // risultati Decision Engine (ricalcolato)

 },

 ui: {
  tab: 'oggi',
  uploadOpen: false,

  q: ''
 }
});

let S = defaultState();

/* ==================== PUB/SUB ==================== */
const bus = (() => {
 const subs = {};
 return {
  on(ev, fn){ (subs[ev] = subs[ev] || []).push(fn); },
  emit(ev, payload){ (subs[ev] || []).forEach(fn => { try { fn(payload); } catch(e){ console.error(e); } }); }
 };
})();

/* ==================== HELPER FUNCTIONS ==================== */
function escHtml(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}

function startOfWeekISO(){
 const d = new Date();
 const dow = (d.getDay() + 6) % 7; // lun=0 ... dom=6
 d.setDate(d.getDate() - dow);
 d.setHours(0,0,0,0);
 return d.toISOString();
}

function clamp(v,mn,mx){return Math.max(mn, Math.min(mx, v));}
function round(v,d=2){const p=Math.pow(10,d);return Math.round(v*p)/p;}
function fmtN(v,d=2){if(v===null||v===undefined||Number.isNaN(v))return 'N/D';return Number(v).toFixed(d);}
function fmtPct(v,d=1){if(v===null||v===undefined||Number.isNaN(v))return 'N/D';return (Number(v)*100).toFixed(d)+'%';}
function fmtEur(v){if(v===null||v===undefined||Number.isNaN(v))return '€ -';return '€ '+Number(v).toFixed(2).replace('.',',');}

function normMatchKey(s){
 if(!s) return '';
 return String(s)
  .toLowerCase()
  .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
  .replace(/\s+vs\s+|\s+v\s+/g,' - ')
  .replace(/\s+[-–—]\s+/g,' - ')
  .replace(/[^a-z0-9\- ]/g,' ')
  .replace(/\s+/g,' ')
  .trim();
}

function timeVal(ora){
 if(!ora) return 9999;
 const m = String(ora).match(/(\d{1,2}):(\d{2})/);
 if(!m) return 9999;
 return parseInt(m[1])*60 + parseInt(m[2]);
}

function cleanTime(ora){
 if(!ora) return '';
 const m = String(ora).match(/(\d{1,2}:\d{2})/);
 return m ? m[1] : String(ora);
}

function sortTime(a,b){return timeVal(a.ora)-timeVal(b.ora);}

function parseItalianNumber(s){
 if(s===null||s===undefined) return null;
 let t = String(s).trim().replace(/^"|"$/g,'');
 if(t==='' || t==='-' || t==='N/D' || t==='ND') return null;
 t = t.replace('%','').replace(/\s/g,'');
 // Se ci sono sia . che ,  → . = migliaia, , = decimale
 if(t.indexOf('.')>=0 && t.indexOf(',')>=0){
  t = t.replace(/\./g,'').replace(',','.');
 } else if(t.indexOf(',')>=0 && t.indexOf('.')<0){
  t = t.replace(',','.');
 }
 const n = parseFloat(t);
 return isNaN(n) ? null : n;
}

function pfOr0(s){ const n = parseItalianNumber(s); return n===null ? 0 : n; }
function piOr0(s){ const n = parseItalianNumber(s); return n===null ? 0 : Math.round(n); }

function std(arr){
 if(!arr.length) return 0;
 const m = arr.reduce((s,x)=>s+x,0)/arr.length;
 const v = arr.reduce((s,x)=>s+(x-m)*(x-m),0)/arr.length;
 return Math.sqrt(v);
}

function stdW(vals, weights){
 const W = weights.reduce((s,x)=>s+x,0);
 if(W<=0) return 0;
 const m = vals.reduce((s,x,i)=>s+x*weights[i],0)/W;
 const v = vals.reduce((s,x,i)=>s+weights[i]*(x-m)*(x-m),0)/W;
 return Math.sqrt(v);
}

function showToast(msg, type=''){
 const wrap = document.getElementById('toastWrap');
 if(!wrap) return;
 const t = document.createElement('div');
 t.className = 'toast ' + type;
 t.textContent = msg;
 wrap.appendChild(t);
 setTimeout(()=>{ t.style.opacity='0'; t.style.transform='translate(-50%,10px)'; setTimeout(()=>t.remove(),220); }, 2600);
}

function setUploadStatus(msg, type=''){
 const el = document.getElementById('upStatus');
 if(!el) return;
 if(!msg){ el.style.display='none'; return; }
 el.style.display = 'block';
 el.className = 'up-status ' + type;
 el.textContent = msg;
}

/* ==================== CSV PARSER ENGINE ==================== */
function detectDelimiter(firstLine){
 const candidates = [';',',','\t','|'];
 let best = ',', bestCount = 0;
 for(const d of candidates){
  let c = 0, inQ = false;
  for(let i=0;i<firstLine.length;i++){
   const ch = firstLine[i];
   if(ch === '"') inQ = !inQ;
   else if(ch === d && !inQ) c++;
  }
  if(c > bestCount){ bestCount = c; best = d; }
 }
 return best;
}

function splitCsvLine(line, sep){
 const out = [];
 let cur = '', inQ = false;
 for(let i=0;i<line.length;i++){
  const ch = line[i];
  if(ch === '"'){
   if(inQ && line[i+1]==='"'){ cur += '"'; i++; }
   else inQ = !inQ;
  } else if(ch === sep && !inQ){
   out.push(cur); cur='';
  } else cur += ch;
 }
 out.push(cur);
 return out.map(x => x.replace(/^"|"$/g,'').trim());
}

function parseCsvLines(text){
 return text.replace(/^\uFEFF/,'').replace(/\r\n?/g,'\n').trim().split('\n').filter(l=>l.trim()!=='');
}

function buildHeaderIndex(headerArr){
 const idx = {};
 headerArr.forEach((h,i) => { idx[h.trim()] = i; });
 return idx;
}

function gCell(row, idx, name){
 const i = idx[name];
 if(i === undefined) return '';
 return (row[i]===undefined||row[i]===null) ? '' : String(row[i]).trim();
}

/* ==================== PARSER SPECIFICI PER I 10 CSV ==================== */

// 1. Ov 0.5 PT
function parseOv05pt(text){
 const L = parseCsvLines(text); if(L.length<2) return [];
 const sep = detectDelimiter(L[0]);
 const hdr = splitCsvLine(L[0], sep);
 const ix = buildHeaderIndex(hdr);
 const rows = [];
 for(let i=1;i<L.length;i++){
  const f = splitCsvLine(L[i], sep);
  if(f.length < 3) continue;
  const evento = gCell(f,ix,'EVENTO');
  if(!evento) continue;
  const u5raw = gCell(f,ix,'U5[C|O]');
  const u5ctraw = gCell(f,ix,'U5CT[C|O]');
  const splitBar = v => {
   if(!v) return [0,0];
   const p = v.split('|').map(x=>parseInt(x)||0);
   return [p[0]||0, p[1]||0];
  };
  rows.push({
   ora: cleanTime(gCell(f,ix,'ORA')),
   evento,
   rpt: gCell(f,ix,'Rpt'),
   ind: piOr0(gCell(f,ix,'IND')) || 999,
   qrOv05: pfOr0(gCell(f,ix,'QROv0.5pt')) || pfOr0(gCell(f,ix,'QrOv0.5pt')),
   delta: pfOr0(gCell(f,ix,'Delta')),
   u5: splitBar(u5raw),
   u5ct: splitBar(u5ctraw),
   diff: pfOr0(gCell(f,ix,'Diff')),
   mge: pfOr0(gCell(f,ix,'MGE')),
   cov05: pfOr0(gCell(f,ix,'COv0.5%')),
   oov05: pfOr0(gCell(f,ix,'OOv0.5%')),
   qrGG: pfOr0(gCell(f,ix,'QrGG')),
   qrO25: pfOr0(gCell(f,ix,'QrO25')),
   _key: normMatchKey(evento)
  });
 }
 return rows;
}

// 2. GG + Ov/Un 2.5
function parseGGov25(text){
 const L = parseCsvLines(text); if(L.length<2) return [];
 const sep = detectDelimiter(L[0]);
 const hdr = splitCsvLine(L[0], sep);
 const ix = buildHeaderIndex(hdr);
 const rows = [];
 for(let i=1;i<L.length;i++){
  const f = splitCsvLine(L[i], sep);
  if(f.length < 3) continue;
  let oraRaw = gCell(f,ix,'ORA') || gCell(f,ix,'DATA EV.');
  const tm = String(oraRaw).match(/(\d{1,2}:\d{2})/);
  const dt = String(oraRaw).match(/(\d{2}-\d{2})/);
  const ora = (dt ? dt[1].replace('-','/')+' ' : '') + (tm ? tm[1] : '');
  let evento = gCell(f,ix,'EVENTO');
  if(evento) evento = evento.split(/\s{3,}/)[0] || evento;
  if(!evento) continue;
  rows.push({
   ora: ora.trim(),
   evento,
   nazione: gCell(f,ix,'NAZIONE'),
   lega: gCell(f,ix,'LEGA') || gCell(f,ix,'NAZIONE'),
   rpt: gCell(f,ix,'RIS.'),
   igbc: piOr0(gCell(f,ix,'IGBc')),
   igbo: piOr0(gCell(f,ix,'IGBo')),
   igbt: piOr0(gCell(f,ix,'IGBt')),
   mge:  pfOr0(gCell(f,ix,'MGE')),
   diff: pfOr0(gCell(f,ix,'Diff')),
   pgg:  pfOr0(gCell(f,ix,'PGG')),
   s12:  piOr0(gCell(f,ix,'S1-S2')),
   qov25: pfOr0(gCell(f,ix,'qOv2.5')),
   _key: normMatchKey(evento)
  });
 }
 return rows;
}

// 3. MG 1-3
function parseMG13(text){
 const L = parseCsvLines(text); if(L.length<2) return [];
 const sep = detectDelimiter(L[0]);
 const hdr = splitCsvLine(L[0], sep);
 const ix = buildHeaderIndex(hdr);
 const rows = [];
 for(let i=1;i<L.length;i++){
  const f = splitCsvLine(L[i], sep);
  if(f.length < 3) continue;
  const evento = gCell(f,ix,'EVENTO');
  if(!evento) continue;
  rows.push({
   ora: cleanTime(gCell(f,ix,'ORA')),
   evento,
   rpt: gCell(f,ix,'R'),
   ich: piOr0(gCell(f,ix,'ICH')),
   varc: pfOr0(gCell(f,ix,'VarC')),
   vu5c: pfOr0(gCell(f,ix,'VU5C')),
   ritc: piOr0(gCell(f,ix,'RitC')),
   mgfc: pfOr0(gCell(f,ix,'MGFC')),
   mgso: pfOr0(gCell(f,ix,'MGSO')),
   q1: pfOr0(gCell(f,ix,'Q1')),
   qo25: pfOr0(gCell(f,ix,'QO25')),
   q2: pfOr0(gCell(f,ix,'Q2')),
   ica: piOr0(gCell(f,ix,'ICA')),
   varo: pfOr0(gCell(f,ix,'VarO')),
   vu5o: pfOr0(gCell(f,ix,'VU5O')),
   rito: piOr0(gCell(f,ix,'RitO')),
   mgfo: pfOr0(gCell(f,ix,'MGFO')),
   mgsc: pfOr0(gCell(f,ix,'MGSC')),
   _key: normMatchKey(evento)
  });
 }
 return rows;
}

// 4. Stats IA
function parseIA(text){
 const L = parseCsvLines(text); if(L.length<2) return [];
 const sep = detectDelimiter(L[0]);
 const hdr = splitCsvLine(L[0], sep);
 const ix = buildHeaderIndex(hdr);
 const rows = [];
 for(let i=1;i<L.length;i++){
  const f = splitCsvLine(L[i], sep);
  if(f.length < 3) continue;
  let oraRaw = gCell(f,ix,'DATA EV.') || gCell(f,ix,'ORA');
  const tm = String(oraRaw).match(/(\d{1,2}:\d{2})/);
  const dt = String(oraRaw).match(/(\d{2}-\d{2})/);
  const ora = (dt ? dt[1].replace('-','/')+' ' : '') + (tm ? tm[1] : '');
  const evento = gCell(f,ix,'EVENTO');
  if(!evento) continue;
  const stats = [];
  const cats = [
   ['TT','Tiri Totali','TT1X2','TTaff'],
   ['TIP','Tiri in Porta','TIP1X2','TIPaff'],
   ['COR','Corner','Cor1X2','CorAff'],
   ['FAL','Falli','Fal1X2','FalAff'],
   ['FG','Fuorigioco','FG1X2','FGaff']
  ];
  cats.forEach(([k,lbl,kp,ka]) => {
   const pred = gCell(f,ix,kp);
   const aff = pfOr0(gCell(f,ix,ka));
   if(pred) stats.push({key:k, label:lbl, pred, aff});
  });
  const affArr = stats.map(s=>s.aff);
  const maxAff = affArr.length ? Math.max(...affArr) : 0;
  const avgAff = affArr.length ? affArr.reduce((s,x)=>s+x,0)/affArr.length : 0;
  rows.push({
   ora: ora.trim(),
   evento,
   nazione: gCell(f,ix,'NAZIONE'),
   lega: gCell(f,ix,'LEGA'),
   rpt: gCell(f,ix,'RIS.'),
   stats, maxAff, avgAff,
   highCount: stats.filter(s=>s.aff>=2.5).length,
   _key: normMatchKey(evento)
  });
 }
 return rows;
}

// 5. Giocatori Cartellini
function parsePlCard(text){
 const L = parseCsvLines(text); if(L.length<2) return [];
 const sep = detectDelimiter(L[0]);
 const hdr = splitCsvLine(L[0], sep);
 const ix = buildHeaderIndex(hdr);
 const rows = [];
 for(let i=1;i<L.length;i++){
  const f = splitCsvLine(L[i], sep);
  if(f.length < 3) continue;
  const oraRaw = gCell(f,ix,'Ora');
  const tm = String(oraRaw).match(/(\d{1,2}:\d{2})/);
  const dt = String(oraRaw).match(/(\d{2}-\d{2})/);
  const ora = (dt ? dt[1].replace('-','/')+' ' : '') + (tm ? tm[1] : '');
  const nome = gCell(f,ix,'Nome');
  const partita = gCell(f,ix,'Partita');
  if(!nome) continue;
  rows.push({
   ora: ora.trim(),
   lega: gCell(f,ix,'Campionato'),
   partita, nome,
   squadra: gCell(f,ix,'Squadra'),
   pos: gCell(f,ix,'Pos.'),

// 9. DataMining Plus - con header duplicati per % e quota
function parseDM(text){
 const L = parseCsvLines(text); if(L.length<2) return [];
 const sep = detectDelimiter(L[0]);
 const hdr = splitCsvLine(L[0], sep);
 // Trova le posizioni usando pattern: il nome del mercato compare 2 volte
 // 1a occorrenza = %, 2a occorrenza = quota (o mercato+1 = quota)
 const findPair = (name) => {
  const first = hdr.indexOf(name);
  if(first<0) return [-1,-1];
  return [first, first+1];
 };
 // Indici dinamici (come nel codice originale Fase 4)
 const iOra = hdr.indexOf('Ora');
 const iMatch = hdr.indexOf('Match');
 const iR = hdr.indexOf('R');
 const iRpt = hdr.indexOf('Rpt');
 const iNP = hdr.indexOf('NP');
 const i1Perc = hdr.findIndex((h,i) => h === '1' && i > 5);
 const i1Quota = i1Perc + 1;
 const iXPerc = i1Quota + 1;
 const iXQuota = iXPerc + 1;
 const i2Perc = iXQuota + 1;
 const i2Quota = i2Perc + 1;
 const iMGE = hdr.indexOf('MGE');
 const iDIFF = hdr.indexOf('DIFF');
 const iGGPerc = hdr.findIndex((h,i) => h === 'GG' && i > iDIFF);
 const iGGQuota = iGGPerc + 1;
 const [iOV15P, iOV15Q] = findPair('OV15');
 const [iOV25P, iOV25Q] = findPair('OV25');
 const [iUN35P, iUN35Q] = findPair('UN35');
 const [iOV05ptP, iOV05ptQ] = findPair('OV0.5pt');
 const iIC = hdr.indexOf('IC');
 const iRC = hdr.indexOf('RC');
 const iRO = hdr.indexOf('RO');
 // SC e SO appaiono 2 volte: una prima e una dopo IGB
 const iSCP = hdr.indexOf('SC');
 const iIGBC = hdr.indexOf('IGBC');
 const iSCQ = iIGBC + 1;   // subito dopo IGBC
 const iSOP = hdr.indexOf('SO');
 const iIGBO = hdr.indexOf('IGBO');
 const iSOQ = iIGBO + 1;
 const iRE = hdr.indexOf('RE');

 const rows = [];
 for(let i=1;i<L.length;i++){
  const f = splitCsvLine(L[i], sep);
  if(f.length < 5) continue;
  const match = f[iMatch] ? f[iMatch].replace(/^"|"$/g,'').trim() : '';
  if(!match) continue;
  rows.push({
   ora: cleanTime(f[iOra]||''),
   match,
   r: f[iR]||'',
   rpt: f[iRpt]||'',
   np: piOr0(f[iNP]),
   p1: pfOr0(f[i1Perc]),       q1: pfOr0(f[i1Quota]),
   pX: pfOr0(f[iXPerc]),       qX: pfOr0(f[iXQuota]),
   p2: pfOr0(f[i2Perc]),       q2: pfOr0(f[i2Quota]),
   mge: pfOr0(f[iMGE]),
   diff: pfOr0(f[iDIFF]),
   pGG: pfOr0(f[iGGPerc]),     qGG: pfOr0(f[iGGQuota]),
   pOV15: pfOr0(f[iOV15P]),    qOV15: pfOr0(f[iOV15Q]),
   pOV25: pfOr0(f[iOV25P]),    qOV25: pfOr0(f[iOV25Q]),
   pUN35: pfOr0(f[iUN35P]),    qUN35: pfOr0(f[iUN35Q]),
   pOV05pt: pfOr0(f[iOV05ptP]), qOV05pt: pfOr0(f[iOV05ptQ]),
   ic: piOr0(f[iIC]),
   rc: piOr0(f[iRC]),
   ro: piOr0(f[iRO]),
   pSC: pfOr0(f[iSCP]),        qSC: pfOr0(f[iSCQ]), igbc: piOr0(f[iIGBC]),
   pSO: pfOr0(f[iSOP]),        qSO: pfOr0(f[iSOQ]), igbo: piOr0(f[iIGBO]),
   re: iRE>=0 ? (f[iRE]||'') : '',
   _key: normMatchKey(match)
  });
 }
 return rows;
}

// Parse campo RE stringa → array scores ordinati
function parseREField(reStr){
 if(!reStr) return [];
 const parts = reStr.split(/\s{2,}/).filter(s=>s.includes('%'));
 const items = parts.map(s => {
  const mm = s.match(/(\d+\s*-\s*\d+)\s*:\s*([\d.,]+)/);
  if(!mm) return null;
  return { score: mm[1].replace(/\s/g,''), perc: parseItalianNumber(mm[2]) };
 }).filter(x => x && x.perc!==null);
 return items.sort((a,b) => b.perc - a.perc);
}

/* ==================== UNIFICAZIONE MATCH (FEATURE LAYER) ==================== */
function unifyMatches(){
const map = new Map();
const ensure = (key, evento, ora, lega) => {
if(!key) return null;
if(!map.has(key)){
map.set(key, {
key, evento: evento||’’, ora: ora||’’, lega: lega||’’,
ov05pt:null, ggov25:null, mg13:null, ia:null, qVal:null,
gz:null, dm:null, diffg:null, plCard:[], plShot:[]
});
}
const m = map.get(key);
if(!m.lega && lega) m.lega = lega;
if(!m.ora && ora) m.ora = ora;
if(!m.evento && evento) m.evento = evento;
return m;
};
const ds = S.datasets;
(ds.ov05pt||[]).forEach(r => { const m=ensure(r._key,r.evento,r.ora,’’); if(m && !m.ov05pt) m.ov05pt=r; });
(ds.ggov25||[]).forEach(r => { const m=ensure(r._key,r.evento,r.ora,r.lega); if(m && !m.ggov25) m.ggov25=r; });
(ds.mg13||[]).forEach(r =>   { const m=ensure(r._key,r.evento,r.ora,’’); if(m && !m.mg13) m.mg13=r; });
(ds.ia||[]).forEach(r =>     { const m=ensure(r._key,r.evento,r.ora,r.lega); if(m && !m.ia) m.ia=r; });
(ds.qVal||[]).forEach(r =>   { const m=ensure(r._key,r.match,r.ora,’’); if(m && !m.qVal) m.qVal=r; });
(ds.gz||[]).forEach(r =>     { const m=ensure(r._key,r.evento,r.ora,r.lega); if(m && !m.gz) m.gz=r; });
(ds.dm||[]).forEach(r =>     { const m=ensure(r._key,r.match,r.ora,’’); if(m && !m.dm) m.dm=r; });
(ds.diffg||[]).forEach(r =>  { const m=ensure(r._key,r.evento,r.ora,’’); if(m && !m.diffg) m.diffg=r; });
(ds.plCard||[]).forEach(r => { const m=ensure(r._key,r.partita,r.ora,r.lega); if(m) m.plCard.push(r); });
(ds.plShot||[]).forEach(r => { const m=ensure(r._key,r.partita,r.ora,r.lega); if(m) m.plShot.push(r); });
return Array.from(map.values());
}

/* ==================== REGOLE M1 SIGILLATE ==================== */
function rule_ov05pt_M1(r){
if(!r) return false;
return r.ind < M1_THR.ov05pt.ind && r.delta < M1_THR.ov05pt.delta && r.diff < M1_THR.ov05pt.diff;
}
function rule_gg_M1(r){
if(!r) return false;
return r.igbc >= M1_THR.gg.igbc && r.igbo >= M1_THR.gg.igbo &&
r.s12 < M1_THR.gg.s12 && r.pgg >= M1_THR.gg.pgg;
}
function rule_o25_M1(r){
if(!r) return false;
return r.igbt >= M1_THR.o25.igbt && r.mge >= M1_THR.o25.mge && r.diff <= M1_THR.o25.diff;
}
function rule_u25_M1(r){
if(!r) return false;
return r.diff > M1_THR.u25.diffMin && r.mge > M1_THR.u25.mgeLow && r.mge < M1_THR.u25.mgeHi;
}
function rule_mg13c_M1(r){
if(!r) return false;
return r.ich >= M1_THR.mg13c.ichLo && r.ich <= M1_THR.mg13c.ichHi && r.varc >= M1_THR.mg13c.varc;
}
function rule_mg13o_M1(r){
if(!r) return false;
return r.ica >= M1_THR.mg13o.icaLo && r.ica <= M1_THR.mg13o.icaHi && r.varo >= M1_THR.mg13o.varo;
}

// GZ probability mapping (regola sigillata da Fase 4)
function gzProbMap(gz){
if(gz===null||gz===undefined) return {label:‘N/D’, desc:‘Dato GZ mancante’, type:‘nd’, strength:0, market:null};
if(gz < -1800) return {label:‘U2.5 64%’,  desc:‘Under 2.5 al 64%’,  type:‘under’, strength:0.64, market:‘U25’};
if(gz < -1200) return {label:‘U3.5 81%’,  desc:‘Under 3.5 all 81%’, type:‘under’, strength:0.81, market:‘U35’};
if(gz > 5000)  return {label:‘Ov2.5 64%’, desc:‘Over 2.5 al 64%’,   type:‘over’,  strength:0.64, market:‘O25’};
if(gz > 1000)  return {label:‘Ov1.5 80%’, desc:‘Over 1.5 all 80%’,  type:‘over’,  strength:0.80, market:‘O15’};
if(gz > -200 && gz < 200) return {label:‘Ov0.5 95%’, desc:‘Over 0.5 al 95%’, type:‘over’, strength:0.95, market:‘OV05’};
return {label:‘Neutro’, desc:‘Nessuna indicazione forte da GZ’, type:‘neutral’, strength:0, market:null};
}

/* ==================== SIGNAL LAYER (10 segnali) ==================== */
/* Output: { active, value, direction, strength, coverage, details, market }
value ∈ [0,1] - intensità del segnale per la direzione indicata
direction ∈ {‘over’,‘under’,‘gg’,‘ng’,‘homeS’,‘awayS’,‘homeW’,‘awayW’,‘neutral’}
strength ∈ [0,1] - forza del segnale (per UI)
coverage ∈ {0,1} - se il dato esiste
*/

// S1 - M1 Ov 0.5 PT (regola sigillata)
function signal_S1_ov05pt(m){
const r = m.ov05pt;
if(!r) return {active:false, coverage:0};
const m1 = rule_ov05pt_M1(r);
// distance-from-threshold per softening
let val = m1 ? 1.0 : 0;
if(!m1){
let p = 0;
if(r.ind < 320) p += 0.3;
if(r.delta < -10) p += 0.25;
if(r.diff < 0) p += 0.2;
val = p;
}
return {
active:true, coverage:1, value:val, strength:val,
direction:‘over’, market:‘OV05’,
m1, details:`IND ${r.ind}, Δ ${fmtN(r.delta,1)}%, Diff ${fmtN(r.diff,2)}, MGE ${fmtN(r.mge,2)}`
};
}

// S2 - M1 GG
function signal_S2_gg(m){
const r = m.ggov25;
if(!r) return {active:false, coverage:0};
const m1 = rule_gg_M1(r);
let val = m1 ? 1.0 : 0;
if(!m1){
let p = 0;
if(r.igbc >= 100) p += 0.2;
if(r.igbo >= 100) p += 0.2;
if(r.s12 < 200) p += 0.15;
if(r.pgg >= 50) p += 0.15;
val = p;
}
return {
active:true, coverage:1, value:val, strength:val,
direction:‘gg’, market:‘GG’,
m1, details:`IGBc ${r.igbc}, IGBo ${r.igbo}, S1-S2 ${r.s12}, PGG ${fmtN(r.pgg,1)}%`
};
}

// S3 - M1 Ov/Un 2.5 - bidirezionale, sceglie il lato dominante
function signal_S3_o25(m){

return {

// S4 - M1 MG 1-3 (entrambi i lati)
function signal_S4_mg13(m){
const r = m.mg13;
if(!r) return {active:false, coverage:0};
const m1c = rule_mg13c_M1(r);
const m1o = rule_mg13o_M1(r);
const valC = m1c ? 1 : (r.ich>0 && r.ich<=400 && r.varc>=20 ? 0.5 : 0);
const valO = m1o ? 1 : (r.ica>0 && r.ica<=400 && r.varo>=20 ? 0.5 : 0);
const valBest = Math.max(valC, valO);
const sideBest = valC >= valO ? ‘casa’ : ‘ospite’;
return {
active:true, coverage:1, value:valBest, strength:valBest,
direction: sideBest===‘casa’ ? ‘mg13c’ : ‘mg13o’,
market: sideBest===‘casa’ ? ‘MG13C’ : ‘MG13O’,
m1c, m1o, side:sideBest,
details:`ICH ${r.ich} (VarC ${fmtN(r.varc,0)}%) · ICA ${r.ica} (VarO ${fmtN(r.varo,0)}%)`
};
}

// S5 - Stats IA convergenza
function signal_S5_ia(m){
const r = m.ia;
if(!r || !r.stats || !r.stats.length) return {active:false, coverage:0};
const affs = r.stats.map(s=>s.aff);
const avg = r.avgAff;
const max = r.maxAff;
const sd = std(affs);
// Convergenza: aff alta + bassa dev std → segnale solido
const val = clamp((avg/5) * (1 - sd/3), 0, 1);
const strongest = r.stats.slice().sort((a,b)=>b.aff-a.aff)[0];
return {
active:true, coverage:1, value:val, strength:val,
direction:‘support’, market:null,
details:`Max aff ${fmtN(max,1)} su ${strongest?strongest.label:'-'}, avg ${fmtN(avg,2)}`
};
}

// S6 - GZ Probability
function signal_S6_gz(m){
const r = m.gz;
if(!r || r.gz===null) return {active:false, coverage:0};
const p = gzProbMap(r.gz);
if(p.type === ‘nd’ || p.type === ‘neutral’) return {active:false, coverage:0, raw:r.gz};
return {
active:true, coverage:1, value:p.strength, strength:p.strength,
direction:p.type, market:p.market,
details:`GZ ${r.gz>0?'+':''}${r.gz} → ${p.label}`,
prob:p
};
}

// S7 - DataMining esteso (% mercato + NP + bonus RE + IC/RC/RO)
function signal_S7_dm(m){
const r = m.dm;
if(!r) return {active:false, coverage:0};
const npF = clamp(r.np / 30, 0, 1);     // NP=30 → peso pieno
// Direzione dominante per Over/Under/GG: prendiamo il valore medio
const ov25 = (r.pOV25||0)/100;
const un35 = (r.pUN35||0)/100;
const gg = (r.pGG||0)/100;
const ov15 = (r.pOV15||0)/100;
const ov05pt = (r.pOV05pt||0)/100;
// Per il signal “S7 generico” usiamo la massima tra le percentuali alte
const candidates = [
{dir:‘over’, val:ov25, mkt:‘O25’},
{dir:‘under’, val:un35, mkt:‘U25’},
{dir:‘gg’, val:gg, mkt:‘GG’},
{dir:‘over’, val:ov15, mkt:‘O15’},
{dir:‘over’, val:ov05pt, mkt:‘OV05’}
];
candidates.sort((a,b)=>b.val-a.val);
const top = candidates[0];
// Bonus RE: se almeno un risultato esatto > 12%
const reItems = parseREField(r.re);
const reBonus = reItems.length && reItems[0].perc > 12 ? 0.05 : 0;
const val = clamp(top.val * npF + reBonus, 0, 1);
return {
active:true, coverage:1, value:val, strength:top.val,
direction:top.dir, market:top.mkt,
details:`NP ${r.np} · ${top.mkt} ${fmtN(top.val*100,0)}% · MGE ${fmtN(r.mge,2)} · DIFF ${fmtN(r.diff,2)}`,
raw:r, npFactor:npF, reItems
};
}

// S8 - Value 1X2 con drop quota
function signal_S8_val(m){
const q = m.qVal;
if(!q) return {active:false, coverage:0};
// Valuta i 3 esiti, ritorna quello con spread max
const candidates = [];
const checkSign = (lbl, real, dm, spread, market) => {
if(spread > 0.15 && real > 1.01 && real < 3 && dm > 0){
const edge = (1/dm) - (1/real); // edge stimato
candidates.push({lbl, real, dm, spread, edge, market});
}
};
checkSign(‘1’, q.r1, q.dm1, q.spread1, ‘1’);
checkSign(‘X’, q.rx, q.dmx, q.spreadX, ‘X’);
checkSign(‘2’, q.r2, q.dm2, q.spread2, ‘2’);
if(!candidates.length) return {active:false, coverage:0, raw:q};
candidates.sort((a,b)=>b.spread-a.spread);
const top = candidates[0];
const val = clamp(top.spread / 0.6, 0, 1); // spread 0.6 = max
const dirMap = {‘1’:‘homeW’,‘X’:‘draw’,‘2’:‘awayW’};
return {
active:true, coverage:1, value:val, strength:val,
direction:dirMap[top.lbl], market:top.market,
details:`${top.lbl} value: real ${fmtN(top.real,2)} vs DM ${fmtN(top.dm,2)} (spread ${fmtN(top.spread,2)})`,
edge:top.edge, raw:q, candidate:top
};
}

// S9 - Profilo giocatori (ritardi alti pro-mercato)
function signal_S9_pl(m){
const cards = m.plCard||[], shots = m.plShot||[];
if(!cards.length && !shots.length) return {active:false, coverage:0};
// Ritardo medio + max
const allRit = […cards.map(p=>p.rit||0), …shots.map(p=>p.rit||0)];
const maxRit = allRit.length ? Math.max(…allRit) : 0;
const val = clamp(maxRit / 8, 0, 1); // rit=8 → val 1
const det = [];
if(cards.length){
const top = cards.slice().sort((a,b)=>b.rit-a.rit)[0];
if(top && top.rit>=3) det.push(`${top.nome} amm: rit ${top.rit}`);
}
if(shots.length){
const top = shots.slice().sort((a,b)=>b.rit-a.rit)[0];
if(top && top.rit>=3) det.push(`${top.nome} gol: rit ${top.rit}`);
}
return {
active: maxRit>=3, coverage:1, value:val, strength:val,
direction:‘players’, market:null,
details: det.join(’ · ’) || `${cards.length} card / ${shots.length} shot`
};
}

// S10 - DIFFERENZIALI GOL (mean-reversion CORRETTA)
function signal_S10_diffg(m){
const r = m.diffg;
if(!r || r.dgt===null) return {active:false, coverage:0};
const dgt = r.dgt;
// LOGICA MEAN-REVERSION:
// DGT positivo grande = sovrafrequenza (squadre stanno segnando SOPRA media) → pro-UNDER
// DGT negativo grande = sottofrequenza (squadre stanno segnando SOTTO media) → pro-OVER
let dir = ‘neutral’;
let val = 0;
if(Math.abs(dgt) >= DIFF_THR.dgt){
dir = dgt > 0 ? ‘under’ : ‘over’;
val = clamp(Math.abs(dgt) / 2.5, 0, 1); // |DGT|=2.5 → val pieno
}
// Drop quota market movement
let drop = null, dropDir = null;
if(r.qr && r.qrL && r.qr > 0){
drop = (r.qr - r.qrL) / r.qr;
if(drop > DIFF_THR.dropOk) dropDir = ‘down’;      // quota scesa = mercato conferma
else if(drop < -DIFF_THR.dropOk) dropDir = ‘up’;  // quota salita = mercato sfiducia
}
return {
active: val > 0 || dropDir !== null, coverage:1,
value:val, strength:val,
direction:dir,
market: dir===‘over’ ? ‘O25’ : (dir===‘under’ ? ‘U25’ : null),
details: `DGT ${fmtN(dgt,2)} (${dgt>0?'sovrafrequenza→Under':'sottofrequenza→Over'})` +
(drop!==null ? ` · Drop ${fmtN(drop*100,1)}%` : ‘’),
dgt, dg:r.dg, mge:r.mge, mgu5:r.mgu5,
diffC:r.diffC, diffO:r.diffO,
qt:r.qt, qr:r.qr, qrL:r.qrL,
drop, dropDir
};
}

// Differenziali team-specific (sub-segnali)
function team_diffC_pro(m){
// CASA SEGNA: DiffC < -0.3 (sotto media → pro-Casa-Segna mean-reversion)
const r = m.diffg;
if(!r || r.diffC===null) return null;
if(r.diffC < -DIFF_THR.team) return {active:true, dir:‘homeS’, val:clamp(-r.diffC/1, 0, 1), val2:r.diffC};
if(r.diffC > DIFF_THR.team)  return {active:true, dir:‘noHomeS’, val:clamp(r.diffC/1, 0, 1), val2:r.diffC};
return null;
}
function team_diffO_pro(m){
// OSPITE SEGNA
const r = m.diffg;
if(!r || r.diffO===null) return null;
if(r.diffO < -DIFF_THR.team) return {active:true, dir:‘awayS’, val:clamp(-r.diffO/1, 0, 1), val2:r.diffO};
if(r.diffO > DIFF_THR.team)  return {active:true, dir:‘noAwayS’, val:clamp(r.diffO/1, 0, 1), val2:r.diffO};
return null;
}

/* ==================== CONFIDENCE SCORE ==================== */
/* Formula:

1. weighted average direzionato (segnali pro=+1, contro=-1, neutri=0)
1. conflict penalty = LAMBDA * std_pesata dei segnali
1. coverage factor = COV_FLOOR + (1-COV_FLOOR) * coverage_ratio
1. hard caps condizionali
   */
   function computeConfidence(m, candidate, sigs){
   const dir = candidate.dir;
   const mkt = candidate.mkt;
   // Direzioni “pro” del mercato target
   const proDirsByMkt = {
   ‘OV05’: [‘over’],
   ‘OV15’: [‘over’],
   ‘O25’:  [‘over’],
   ‘GG’:   [‘gg’,‘over’],
   ‘U25’:  [‘under’],
   ‘MG24’: [‘under’,‘mg24’],
   ‘MG13C’:[‘mg13c’],
   ‘MG13O’:[‘mg13o’],
   ‘CASASEGNA’:[‘homeS’],
   ‘OSPITESEGNA’:[‘awayS’],
   ‘1’:    [‘homeW’],
   ‘X’:    [‘draw’],
   ‘2’:    [‘awayW’]
   };
   const proDirs = proDirsByMkt[mkt] || [dir];

const items = [];
Object.entries(sigs).forEach(([k,s]) => {
if(!s || !s.active || !s.coverage) return;
// direzione: +1 se s.direction è in proDirs, -1 se opposta, 0 altrimenti
let d = 0;
if(proDirs.includes(s.direction)) d = +1;
else {
// direzioni opposte note
const opposites = {
‘over’:[‘under’], ‘under’:[‘over’],
‘gg’:[‘ng’], ‘ng’:[‘gg’],
‘homeS’:[‘noHomeS’], ‘awayS’:[‘noAwayS’],
‘mg13c’:[‘mg13o’], ‘mg13o’:[‘mg13c’]
};
if((opposites[proDirs[0]]||[]).includes(s.direction)) d = -1;
else d = 0; // neutro / supporto
}
// Per “support” (S5) e “players” (S9), valore = +0.5 se attivo (non polarizzato)
if(s.direction === ‘support’ || s.direction === ‘players’) d = 0.5;
items.push({key:k, weight:s.weight, value:s.value, dir:d, signal:s});
});

if(!items.length) return {confidence:0, score:0, sigCount:0, items:[], penalty:0, covRatio:0};

// Weighted score in [-1, +1]
const totW = items.reduce((s,x)=>s+x.weight, 0);
const wScore = items.reduce((s,x)=>s + x.weight * x.value * x.dir, 0) / totW;

// Conflict penalty
const dirs = items.map(x => x.value * x.dir);
const sd = stdW(dirs, items.map(x => x.weight));

// Coverage ratio
const W_TOT = W.M1 + W.DM + W.GZ + W.DIFFG + W.VAL + W.IA + W.PL;
const covRatio = clamp(totW / W_TOT, 0, 1);
const covFactor = COV_FLOOR + (1 - COV_FLOOR) * covRatio;

// Score base 0..100
let scoreBase = 50 + 50 * wScore;          // -1→0, +1→100
const penalty = CONFLICT_LAMBDA * sd;       // tipicamente 0..5
let score = scoreBase * covFactor - penalty;

// Hard caps
// (a) Drop quota contrario: cap 60
const s10 = sigs.S10;
if(s10 && s10.dropDir === ‘up’){ score = Math.min(score, 60); }
// (b) Coverage < 0.5: cap 70
if(covRatio < 0.5){ score = Math.min(score, 70); }
// (c) DGT contraria significativa: cap 70
if(s10 && s10.active && Math.abs(s10.dgt||0) >= DIFF_THR.dgt){
const dgtPro = s10.direction;
const opp = (dgtPro === ‘over’ && (dir === ‘under’ || mkt === ‘U25’ || mkt === ‘MG24’))
|| (dgtPro === ‘under’ && (dir === ‘over’ || mkt === ‘OV05’ || mkt === ‘O25’ || mkt === ‘GG’ || mkt === ‘OV15’));
if(opp){ score = Math.min(score, 60); }
}
// (d) Pochi segnali (< 3 attivi) e score > 80: cap 75
if(items.length < 3 && score > 75) score = 75;

score = clamp(score, 0, 100);
return {
confidence: Math.round(score),
score, sigCount: items.length, items, penalty: round(penalty,2),
covRatio: round(covRatio,2), wScore: round(wScore,2), sd: round(sd,2)
};
}

/* ==================== QUOTA OPERATIVA + EDGE + KELLY ==================== */
function getOperativeOdds(m, candidate){
const mkt = candidate.mkt;
// Priorità: QrL (last) → Qr → quota DM specifica → null
const dg = m.diffg;
const dm = m.dm;
// Per O25/U25: usiamo la quota più appropriata
const lookup = {
‘O25’:  () => (dg && dg.qrL) || (dm && dm.qOV25) || (m.ggov25 && m.ggov25.qov25),
‘U25’:  () => (dm && dm.qUN35) || null,
‘OV05’: () => (dm && dm.qOV05pt) || (m.ov05pt && m.ov05pt.qrOv05),
‘OV15’: () => (dm && dm.qOV15) || null,
‘GG’:   () => (dm && dm.qGG) || (m.ov05pt && m.ov05pt.qrGG) || null,
‘1’:    () => (m.qVal && m.qVal.r1) || (dm && dm.q1),
‘X’:    () => (m.qVal && m.qVal.rx) || (dm && dm.qX),
‘2’:    () => (m.qVal && m.qVal.r2) || (dm && dm.q2),
‘CASASEGNA’: () => (dm && dm.qSC) || null,
‘OSPITESEGNA’:() => (dm && dm.qSO) || null,
‘MG24’: () => 1.50,   // quota target per MG 2-4
‘MG13C’:() => (m.mg13 && m.mg13.qo25) || null,  // proxy
‘MG13O’:() => (m.mg13 && m.mg13.qo25) || null
};
const fn = lookup[mkt];
const q = fn ? fn() : null;
return (q && q > 1.01) ? q : null;
}

function probFromConfidence(confidence, oddsImplied){
// Shrinkage: p = α * p_model + (1-α) * p_implied
// p_model derivata dal Confidence (50→imp.implied, 100→max boost)
const conf = confidence / 100;
// probabilità “modello” interpolata: a 50 confidenza coincide con quota implicita
// a 100 confidenza si discosta di +30% relativo
const pImp = oddsImplied;
const pModel = pImp + (conf - 0.5) * 0.4 * pImp;
const alpha = 0.4 + 0.6 * conf;  // confidence alta = più peso al modello
const p = alpha * pModel + (1 - alpha) * pImp;
return clamp(p, 0.01, 0.99);
}

function computeEdge(p, odds){
if(!odds || odds <= 1) return 0;
const pImp = 1 / odds;
return p - pImp;
}

function kellyStake(p, odds, bankroll, fraction, capPct){
const b = odds - 1;
if(b <= 0) return {stake:0, frac:0, fStar:0};
const fStar = (b * p - (1 - p)) / b;
if(fStar <= 0) return {stake:0, frac:0, fStar};
const frac = clamp(fraction * fStar, 0, capPct);
return {stake: round(frac * bankroll, 2), frac: round(frac,4), fStar: round(fStar,4)};
}

/* ==================== ANTI-SCOMMESSA: 10 FILTRI ==================== */
function applyTenFilters(rec, ctx){
const reasons = [];
const c = rec.confidence;
const cov = rec.covRatio;
const dm = ctx.match.dm;
const odds = rec.odds;
// 1. Confidence < 60
if(c < 60) reasons.push(‘confidence < 60’);
// 2. NP DataMining < 15
if(dm && dm.np < 15 && rec.sigKeys.includes(‘S7’)) reasons.push(‘NP DataMining < 15’);
// 3. Coverage < 50%
if(cov < 0.5) reasons.push(‘coverage < 50%’);
// 4. Conflitto maggiore (sd > 0.4)
if(rec.sd > 0.4) reasons.push(‘segnali divergenti (σ > 0.4)’);
// 5. Drop quota contrario
if(rec.dropDir === ‘up’) reasons.push(‘drop quota contrario’);
// 6. Quota fuori range
if(odds && (odds < 1.20 || odds > 15)) reasons.push(‘quota fuori range operativo’);
// 7. DGT contraria sopra cap
if(rec.dgtContrary) reasons.push(‘DGT contraria sopra soglia’);
// 8. Stop-loss giornaliero
if(S.bankroll.pl_day <= -S.bankroll.total * 0.10) reasons.push(‘stop-loss giornaliero raggiunto (-10%)’);
// 9. Stop-loss settimanale
if(S.bankroll.pl_week <= -S.bankroll.total * 0.20) reasons.push(‘stop-loss settimanale raggiunto (-20%)’);
// 10. Edge ≤ 0
if(rec.edge !== undefined && rec.edge <= 0) reasons.push(‘edge ≤ 0’);
return {pass: reasons.length === 0, reasons};
}

/* ==================== TEMPLATE NARRATIVI A-G ==================== */
function topContributions(items, n=3){
// Ordina per |weight * value * dir| desc
const sorted = items.slice().sort((a,b) => {
const ax = Math.abs(a.weight * a.value * (a.dir||0));
const bx = Math.abs(b.weight * b.value * (b.dir||0));
return bx - ax;
});
return sorted.slice(0, n);
}

function topConflict(items){
// Trova il segnale con dir negativo più impattante
const negs = items.filter(x => x.dir < 0 && x.value > 0.3);
if(!negs.length) return null;
negs.sort((a,b) => (b.weight*b.value) - (a.weight*a.value));
return negs[0];
}

function signalDescription(item){
const s = item.signal;
if(!s) return ‘’;
const det = s.details || ‘’;
const tag = ({
‘S1’:‘M1 Ov 0.5 PT’, ‘S2’:‘M1 GG’, ‘S3’:‘M1 Ov/U 2.5’, ‘S4’:‘M1 MG 1-3’,
‘S5’:‘Stats IA’, ‘S6’:‘GZ Index’, ‘S7’:‘DataMining’, ‘S8’:‘Value 1X2’,
‘S9’:‘Giocatori’, ‘S10’:‘Differenziali Gol’, ‘S10t’:‘Differenziali team’
})[item.key] || item.key;
return `${tag}: ${det}`;
}

function buildExplanation(m, candidate, conf, kelly, edge){
// Sceglie template in base a contesto
const ctx = {
match: m.evento, market: candidate.label, odds: kelly.odds,
confidence: conf.confidence, edge,
topSigs: topContributions(conf.items, 3),
conflict: topConflict(conf.items),
signals: conf.items
};
// Selezione template
// After-loss → G (gestito in render layer)
// Skip Day → F (gestito in advisor layer)
// BET OF THE DAY → A (conf>=85)
// Under con DGT → B
// Casa/Ospite Segna → C
// Value puro → D
// Correct Score cluster → E
if(conf.confidence >= 85){
return tplA(ctx);
}
const s10 = conf.items.find(x => x.key === ‘S10’);
if((candidate.mkt === ‘U25’ || candidate.dir === ‘under’) && s10 && s10.signal.dgt > 0.8){
return tplB(ctx);
}
if(candidate.mkt === ‘CASASEGNA’ || candidate.mkt === ‘OSPITESEGNA’){
return tplC(ctx);
}
const s8 = conf.items.find(x => x.key === ‘S8’);
if(s8 && (candidate.mkt === ‘1’ || candidate.mkt === ‘X’ || candidate.mkt === ‘2’)){
return tplD(ctx);
}
// Default: narrativa generica
return tplDefault(ctx);
}

function tplA(ctx){
const sigs = ctx.topSigs.map(signalDescription).filter(Boolean).slice(0,3).join(’ · ‘);
const conflictTxt = ctx.conflict ? ` Attenzione: ${signalDescription(ctx.conflict)}.` : ’ Nessun conflitto rilevante.’;
return `★ BET OF THE DAY ★ ${ctx.match}: ${ctx.topSigs.length} segnali concordi sul mercato ${ctx.market}. ${sigs}.${conflictTxt} Confidence ${ctx.confidence}/100, edge ${fmtN((ctx.edge||0)*100,1)}%.`;
}
function tplB(ctx){
const s10 = ctx.signals.find(x=>x.key===‘S10’);
const dgt = s10 && s10.signal ? s10.signal.dgt : 0;
const sigs = ctx.topSigs.map(signalDescription).filter(Boolean).slice(0,2).join(’ · ‘);
return `${ctx.match}: ${ctx.market} a quota ${fmtN(ctx.odds,2)}. Le squadre stanno segnando sopra la media consolidata (DGT ${fmtN(dgt,2)}): la regressione alla media suggerisce meno gol del trend recente. ${sigs}. Confidence ${ctx.confidence}/100.`;
}
function tplC(ctx){
const sigs = ctx.topSigs.map(signalDescription).filter(Boolean).slice(0,2).join(’ · ‘);
return `${ctx.match}: ${ctx.market} a quota ${fmtN(ctx.odds,2)}. Differenziale offensivo squadra in sottofrequenza, atteso ritorno alla media. ${sigs}. Confidence ${ctx.confidence}/100.`;
}
function tplD(ctx){
const sigs = ctx.topSigs.map(signalDescription).filter(Boolean).slice(0,2).join(’ · ‘);
return `${ctx.match}: ${ctx.market} a quota ${fmtN(ctx.odds,2)}. Edge stimato ${fmtN((ctx.edge||0)*100,1)}% rispetto al mercato. ${sigs}. Confidence ${ctx.confidence}/100.`;
}
function tplDefault(ctx){
const sigs = ctx.topSigs.map(signalDescription).filter(Boolean).slice(0,3).join(’ · ’);
const conflictTxt = ctx.conflict ? ` Caveat: ${signalDescription(ctx.conflict)}.` : ‘’;
return `${ctx.match}: ${ctx.market} a quota ${fmtN(ctx.odds,2)}. ${sigs}.${conflictTxt} Confidence ${ctx.confidence}/100.`;
}

/* ==================== DECISION ENGINE ORCHESTRATOR ==================== */
function buildRecommendations(matches){
const all = [];
matches.forEach(m => {
const candidates = enumerateCandidates(m);
candidates.forEach(cand => {
const sigs = selectRelevantSignals(m, cand);
const conf = computeConfidence(m, cand, sigs);
const odds = getOperativeOdds(m, cand);
if(!odds || conf.confidence < 30) return;
const pImp = 1 / odds;
const p = probFromConfidence(conf.confidence, pImp);
const edge = computeEdge(p, odds);
const kelly = kellyStake(p, odds, S.bankroll.segregated, S.bankroll.kellyFraction, S.bankroll.capPct);
// Verifica DGT contrary
const s10 = sigs.S10;
let dgtContrary = false;
if(s10 && s10.active && Math.abs(s10.dgt||0) >= DIFF_THR.dgt){
const dgtPro = s10.direction;
if((dgtPro === ‘over’ && (cand.dir === ‘under’ || cand.mkt === ‘U25’ || cand.mkt === ‘MG24’))
|| (dgtPro === ‘under’ && (cand.dir === ‘over’ || cand.mkt === ‘OV05’ || cand.mkt === ‘O25’ || cand.mkt === ‘GG’ || cand.mkt === ‘OV15’))){
dgtContrary = true;
}
}
const rec = {
matchKey: m.key,
match: m.evento,
ora: m.ora,
lega: m.lega,
candidate: cand,
market: cand.mkt,
marketLabel: cand.label,
confidence: conf.confidence,
score: conf.score,
odds, pImp, p, edge,
kelly,
sigKeys: Object.keys(sigs),
sigCount: conf.sigCount,
items: conf.items,
sigs,
covRatio: conf.covRatio,
sd: conf.sd,
penalty: conf.penalty,
dropDir: s10 ? s10.dropDir : null,
dgtContrary,
explanation: buildExplanation(m, cand, conf, {odds}, edge),
matchObj: m
};
const filt = applyTenFilters(rec, {match:m});
rec.filterPass = filt.pass;
rec.filterReasons = filt.reasons;
all.push(rec);
});
});
return all;
}

function pickBestRecommendation(recs, matchKey){
const matchRecs = recs.filter(r => r.matchKey === matchKey);
if(!matchRecs.length) return null;
const filtered = matchRecs.filter(r => r.filterPass);
const pool = filtered.length ? filtered : matchRecs;
pool.sort((a,b) => b.confidence - a.confidence);
return pool[0];
}

/* ==================== PORTFOLIO ENGINE ==================== */

// Singole 1.70-1.99
function buildTopSingles(recs, n=5){
const pool = recs.filter(r =>
r.filterPass &&
r.odds >= 1.70 && r.odds <= 1.99 &&
r.confidence >= 65
);
// Filtro favorite trap: se quota implicata >> p_model e DGT contraria
const filtered = pool.filter(r => {
if(r.dgtContrary && r.dropDir === ‘up’) return false;
return true;
});
// Una pick per match
const seenMatch = new Set();
const out = [];
filtered.sort((a,b) => b.confidence - a.confidence);
for(const r of filtered){
if(seenMatch.has(r.matchKey)) continue;
seenMatch.add(r.matchKey);
out.push(r);
if(out.length >= n) break;
}
return out;
}

// Value Bets: edge > 5%, NP >= 15
function buildValueBets(recs, n=5){
const pool = recs.filter(r =>
r.filterPass &&
r.edge > 0.05 &&
r.confidence >= 60 &&
r.matchObj.dm && r.matchObj.dm.np >= 15
);
const seenMatch = new Set();
const out = [];
pool.sort((a,b) => b.edge - a.edge);
for(const r of pool){
if(seenMatch.has(r.matchKey)) continue;
seenMatch.add(r.matchKey);
out.push(r);
if(out.length >= n) break;
}
return out;
}

// Correlation Score
function correlationScore(a, b){
if(a.matchKey === b.matchKey){
// Stesso match: mercati conflittuali = 1.00 (escluso)
const conflictPairs = [
[‘O25’,‘U25’], [‘OV15’,‘U25’], [‘GG’,‘MG13C’], [‘GG’,‘MG13O’]
];
for(const [x,y] of conflictPairs){
if((a.market===x && b.market===y) || (a.market===y && b.market===x)) return 1.00;
}
return 0.60;  // stesso match compatibile
}
let s = 0;
if(a.lega && b.lega && a.lega === b.lega) s += 0.30;
const ta = timeVal(a.ora), tb = timeVal(b.ora);
if(Math.abs(ta - tb) <= 30) s += 0.20;
if(a.market === b.market) s += 0.15;
// Stessa squadra (verifica grezza tramite sotto-stringhe)
const partsA = String(a.match).split(/[-–]/).map(x=>x.trim().toLowerCase());
const partsB = String(b.match).split(/[-–]/).map(x=>x.trim().toLowerCase());
const shared = partsA.some(x => x && partsB.includes(x));
if(shared) s += 0.50;
return Math.min(s, 0.99);
}

// Smart Double: 2.00-2.50, anti-correlazione
function buildSmartDouble(recs){
const pool = recs.filter(r =>
r.filterPass &&
r.odds >= 1.45 && r.odds <= 1.85 &&
r.confidence >= 65
);
if(pool.length < 2) return null;
pool.sort((a,b) => b.confidence - a.confidence);
// Top 12 candidati per coppie
const top = pool.slice(0, 12);
let best = null;
for(let i=0;i<top.length;i++){
for(let j=i+1;j<top.length;j++){
const a = top[i], b = top[j];
const corr = correlationScore(a,b);
if(corr > 0.35) continue;
const totOdds = a.odds * b.odds;
if(totOdds < 2.00 || totOdds > 2.50) continue;
const pJoint = a.p * b.p;
const evJoint = pJoint * totOdds - 1;
const score = evJoint * (a.confidence + b.confidence) / 2;
if(!best || score > best.score){
best = {legs:[a,b], totOdds, pJoint, evJoint, score, corr};
}
}
}
return best;
}

// Smart Triple: 3.00-5.00, anti-correlation
function buildSmartTriple(recs){
const pool = recs.filter(r =>
r.filterPass &&
r.odds >= 1.40 && r.odds <= 1.85 &&
r.confidence >= 65
);
if(pool.length < 3) return null;
pool.sort((a,b) => b.confidence - a.confidence);
const top = pool.slice(0, 14);
let best = null;
for(let i=0;i<top.length;i++){
for(let j=i+1;j<top.length;j++){
for(let k=j+1;k<top.length;k++){
const a = top[i], b = top[j], c = top[k];
if(correlationScore(a,b) > 0.35) continue;
if(correlationScore(a,c) > 0.35) continue;
if(correlationScore(b,c) > 0.35) continue;
const totOdds = a.odds * b.odds * c.odds;
if(totOdds < 3.00 || totOdds > 5.00) continue;
const pJoint = a.p * b.p * c.p;
if(pJoint < 0.25 || pJoint > 0.40) continue;
const evJoint = pJoint * totOdds - 1;
const score = evJoint * (a.confidence + b.confidence + c.confidence) / 3;
if(!best || score > best.score){
best = {legs:[a,b,c], totOdds, pJoint, evJoint, score};
}
}
}
}
return best;
}

// Pick BET OF THE DAY: Confidence più alta in fascia 1.70-1.99
function buildHero(recs){
const pool = recs.filter(r =>
r.filterPass &&
r.odds >= 1.70 && r.odds <= 1.99 &&
r.confidence >= 65
);
if(!pool.length){
// Fallback: la pick con confidence più alta in qualsiasi fascia
const fallback = recs.filter(r => r.filterPass);
if(!fallback.length) return null;
fallback.sort((a,b) => b.confidence - a.confidence);
return fallback[0];
}
pool.sort((a,b) => b.confidence - a.confidence);
return pool[0];
}

// Mercati secondari (Casa/Ospite Segna, MG 2-4, Correct Score) - estrazione dedicata
function buildSecondaryMarkets(recs){
const cs = recs.filter(r => r.filterPass &&
[‘CASASEGNA’,‘OSPITESEGNA’,‘MG24’].includes(r.market) &&
r.confidence >= 60
);
cs.sort((a,b) => b.confidence - a.confidence);
// Una per match
const seen = new Set();
return cs.filter(r => {
const k = r.matchKey + ‘|’ + r.market;
if(seen.has(k)) return false;
seen.add(k); return true;
}).slice(0, 6);
}

// Correct Score cluster da campo RE
function buildCorrectScoreClusters(matches){
const out = [];
matches.forEach(m => {
const dm = m.dm;
if(!dm || !dm.re) return;
const items = parseREField(dm.re);
if(items.length < 2) return;
// Almeno 2 risultati con prob > 12% = candidate cluster
const top = items.filter(x => x.perc > 10).slice(0, 4);
if(top.length < 2) return;
const cumP = top.reduce((s,x)=>s+x.perc, 0) / 100;
if(cumP < 0.25) return;  // soglia minima cluster
out.push({
matchKey: m.key,
match: m.evento,
ora: m.ora,
lega: m.lega,
scores: top,
cumP: round(cumP, 3),
// quota media stimata = 1 / (cumP * margine)
estQ: round(1 / (cumP * 0.92), 2),
np: dm.np
});
});
out.sort((a,b) => b.cumP - a.cumP);
return out.slice(0, 4);
}

/* ==================== RUN DECISION ENGINE ==================== */
function runDecisionEngine(){
const matches = unifyMatches();
if(!matches.length){
S.output = null;
return;
}
const recs = buildRecommendations(matches);
const hero = buildHero(recs);
// Top singole esclude la hero
const topSingles = buildTopSingles(recs, 4).filter(r => !hero || r !== hero).slice(0, 3);
const valueBets = buildValueBets(recs, 5);
const smartDouble = buildSmartDouble(recs);
const smartTriple = buildSmartTriple(recs);
const secondary = buildSecondaryMarkets(recs);
const csClusters = buildCorrectScoreClusters(matches);
// Skip-day check: pochi pick di qualità
const qualityPicks = recs.filter(r => r.filterPass && r.confidence >= 70).length;
const skipDay = qualityPicks < 2;
S.output = {
matches, recs, hero, topSingles, valueBets,
smartDouble, smartTriple, secondary, csClusters,
skipDay, qualityPicks,
computedAt: new Date().toISOString()
};
bus.emit(‘data:recomputed’, S.output);
}
