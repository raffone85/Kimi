<!DOCTYPE html>

<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0B0F17">
<title>Match Analyzer Pro – Fase 5 · Smart Advisor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
/* ==================== DESIGN TOKENS ==================== */
*{margin:0;padding:0;box-sizing:border-box}
:root{
 --bg0:#0B0F17;--bg1:#121826;--bg2:#1B2336;--bg3:#252D42;
 --brd1:#2A3448;--brd2:#3A4560;
 --fg1:#E6EAF2;--fg2:#9AA4B8;--fg3:#6B7490;
 --ok:#4ade80;--ok2:#16A34A;--ok-bg:rgba(74,222,128,.1);
 --warn:#fbbf24;--warn2:#D97706;--warn-bg:rgba(251,191,36,.1);
 --err:#f87171;--err2:#DC2626;--err-bg:rgba(248,113,113,.1);
 --info:#60a5fa;--info-bg:rgba(96,165,250,.1);
 --cta:#2563EB;--cta-h:#1D4ED8;
 --gold:#FFD700;--gold-bg:rgba(255,215,0,.12);
 --mag:#c084fc;--mag-bg:rgba(192,132,252,.12);
 --cyn:#22d3ee;--cyn-bg:rgba(34,211,238,.1);
 --S:'DM Sans',system-ui,sans-serif;
 --M:'IBM Plex Mono',ui-monospace,monospace;
 --rs:8px;--rm:12px;--rl:18px;--rxl:24px;
 --sh1:0 1px 2px rgba(0,0,0,.3),0 6px 18px rgba(0,0,0,.22);
 --sh2:0 2px 4px rgba(0,0,0,.4),0 12px 36px rgba(0,0,0,.35);
}
html{font-size:15px;background:var(--bg0)}
body{background:var(--bg0);color:var(--fg1);font-family:var(--S);min-height:100vh;min-height:100dvh;-webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);line-height:1.5}
button,input,select,textarea{font:inherit;color:inherit}
button{border:none;background:none;cursor:pointer}

/* ==================== LAYOUT ==================== */
.app{max-width:920px;margin:0 auto;padding:14px 14px 120px;min-height:100vh;min-height:100dvh}
.hdr{padding:14px 0 10px;margin-bottom:10px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap}
.hdr-l h1{font-size:1.4rem;font-weight:700;color:#fff;letter-spacing:-.5px;line-height:1.2}
.hdr-l h1 span{color:var(–ok)}
.hdr-l .sub{font:500 .78rem var(–S);color:var(–fg3);margin-top:2px}
.hdr-r{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.bk-mini{padding:8px 12px;background:var(–bg1);border:1px solid var(–brd1);border-radius:10px;font:600 .85rem var(–M);color:var(–fg1)}
.bk-mini .lbl{font:500 .65rem var(–S);color:var(–fg3);text-transform:uppercase;letter-spacing:.5px;display:block}
.bk-mini.pos{color:var(–ok)}
.bk-mini.neg{color:var(–err)}

/* ==================== TAB NAV ==================== */
.nav{display:flex;gap:4px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;scrollbar-width:none;background:var(–bg1);border-radius:12px;padding:4px;border:1px solid var(–brd1)}
.nav::-webkit-scrollbar{display:none}
.nav-btn{padding:10px 16px;border-radius:9px;font:600 .85rem var(–S);color:var(–fg2);white-space:nowrap;transition:all .15s;flex-shrink:0;display:flex;align-items:center;gap:6px}
.nav-btn:hover{color:var(–fg1);background:var(–bg2)}
.nav-btn.active{background:var(–bg3);color:#fff;box-shadow:inset 0 1px 0 rgba(255,255,255,.05)}
.nav-btn .ico{font-size:1rem}

/* ==================== PANEL UPLOAD ==================== */
.panel{background:var(–bg1);border:1px solid var(–brd1);border-radius:var(–rm);padding:14px;margin-bottom:14px}
.panel-tg{display:flex;align-items:center;justify-content:space-between;padding:4px 0;cursor:pointer;user-select:none}
.panel-tg h3{font-size:1rem;font-weight:600;color:var(–fg1);display:flex;align-items:center;gap:8px}
.panel-tg h3 .n{font:500 .75rem var(–M);color:var(–fg3);padding:2px 8px;background:var(–bg2);border-radius:6px}
.panel-tg .arrow{color:var(–fg3);font-size:1.1rem;transition:transform .2s}
.panel-tg.open .arrow{transform:rotate(180deg)}
.panel-body{max-height:0;overflow:hidden;transition:max-height .3s ease}
.panel-body.open{max-height:2000px;padding-top:12px}
.up-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}
.up-card{position:relative;padding:12px;border:1.5px dashed var(–brd2);border-radius:var(–rs);background:rgba(255,255,255,.01);display:flex;flex-direction:column;gap:6px;min-height:110px;transition:all .15s}
.up-card:hover{border-color:var(–ok2);background:rgba(74,222,128,.03)}
.up-card.loaded{border-style:solid;border-color:var(–ok2);background:rgba(74,222,128,.04)}
.up-lbl{font:700 .8rem var(–M);color:#fff;display:flex;align-items:center;gap:6px}
.up-lbl .tag-num{font:600 .68rem var(–M);color:var(–fg3);padding:1px 6px;background:var(–bg2);border-radius:4px}
.up-meta{font:500 .78rem var(–S);color:var(–fg2);line-height:1.45;flex:1}
.up-meta small{display:block;color:var(–fg3);font-size:.72rem;margin-top:2px}
.up-count{color:var(–ok);font-weight:700}
.up-actions{display:flex;gap:6px;align-items:center}
.up-btn{padding:6px 10px;background:var(–bg2);border:1px solid var(–brd1);border-radius:6px;color:var(–fg1);font:600 .72rem var(–M);cursor:pointer;transition:all .15s}
.up-btn:hover{border-color:var(–ok2);color:var(–ok)}
.up-btn.clear{color:var(–err);border-color:rgba(248,113,113,.3)}
.up-btn.clear:hover{background:var(–err-bg)}
.up-card input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;z-index:1}
.up-card .up-actions{position:relative;z-index:2}
.up-note{margin-top:10px;padding:8px 10px;background:var(–bg0);border-radius:6px;color:var(–fg3);font:500 .75rem var(–S);line-height:1.5}
.up-status{margin-top:8px;padding:8px 10px;border-radius:6px;font:500 .8rem var(–S)}
.up-status.ok{background:var(–ok-bg);color:var(–ok)}
.up-status.err{background:var(–err-bg);color:var(–err)}

/* ==================== HERO BET OF THE DAY ==================== */
.hero{background:linear-gradient(145deg,var(–bg1) 0%,var(–bg2) 100%);border:1px solid var(–brd1);border-left:4px solid var(–ok);border-radius:var(–rxl);padding:22px 20px;margin-bottom:16px;position:relative;overflow:hidden;box-shadow:var(–sh2)}
.hero::before{content:””;position:absolute;top:-80px;right:-60px;width:200px;height:200px;background:radial-gradient(circle,rgba(74,222,128,.12) 0%,transparent 70%);pointer-events:none}
.hero-hdr{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.hero-tag{padding:4px 10px;background:var(–gold-bg);color:var(–gold);border:1px solid rgba(255,215,0,.3);border-radius:6px;font:800 .72rem var(–M);letter-spacing:1px;text-transform:uppercase;display:inline-flex;align-items:center;gap:6px}
.hero-league{font:500 .78rem var(–S);color:var(–fg3);margin-left:auto}
.hero-title{font:700 1.25rem var(–S);color:#fff;line-height:1.3;margin-bottom:4px}
.hero-sub{font:500 .85rem var(–S);color:var(–fg2);margin-bottom:14px}
.hero-grid{display:grid;grid-template-columns:auto 1fr;gap:18px;align-items:center;margin-bottom:16px}
.hero-gauge{flex-shrink:0}
.hero-pick{display:flex;flex-direction:column;gap:8px}
.hero-market{font:800 1.1rem var(–S);color:#fff}
.hero-odds{display:flex;flex-wrap:wrap;gap:14px;align-items:baseline}
.hero-odds .it{display:flex;flex-direction:column}
.hero-odds .lb{font:500 .68rem var(–S);color:var(–fg3);text-transform:uppercase;letter-spacing:.5px}
.hero-odds .vl{font:700 1.05rem var(–M);color:#fff}
.hero-odds .vl.ok{color:var(–ok)}
.hero-odds .vl.info{color:var(–info)}
.hero-narr{padding:12px 14px;background:rgba(0,0,0,.2);border-radius:var(–rm);color:var(–fg1);font:400 .88rem var(–S);line-height:1.55;margin-bottom:14px;border-left:2px solid var(–ok)}
.hero-cta{display:flex;gap:8px;flex-wrap:wrap}
.btn{padding:10px 16px;border-radius:10px;font:600 .88rem var(–S);transition:all .15s;display:inline-flex;align-items:center;gap:6px;cursor:pointer;border:1px solid transparent}
.btn-primary{background:var(–cta);color:#fff;border-color:var(–cta)}
.btn-primary:hover{background:var(–cta-h)}
.btn-ghost{background:transparent;color:var(–fg1);border-color:var(–brd1)}
.btn-ghost:hover{border-color:var(–brd2);background:var(–bg2)}
.btn-ok{background:var(–ok-bg);color:var(–ok);border-color:rgba(74,222,128,.25)}
.btn-ok:hover{background:rgba(74,222,128,.18)}

/* ==================== GAUGE SVG ==================== */
.gauge{position:relative;width:120px;height:120px}
.gauge.sm{width:72px;height:72px}
.gauge svg{transform:rotate(-90deg)}
.gauge .bg-ring{fill:none;stroke:var(–bg3);stroke-width:10}
.gauge .fg-ring{fill:none;stroke:var(–ok);stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset .6s ease,stroke .3s}
.gauge.sm .bg-ring,.gauge.sm .fg-ring{stroke-width:7}
.gauge .lbl{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.gauge .lbl .v{font:800 1.4rem var(–M);color:#fff;line-height:1}
.gauge.sm .lbl .v{font-size:1rem}
.gauge .lbl .t{font:500 .6rem var(–S);color:var(–fg3);text-transform:uppercase;letter-spacing:.6px;margin-top:2px}
.gauge.sm .lbl .t{font-size:.5rem}
.gauge.g-ok .fg-ring{stroke:var(–ok)}
.gauge.g-wa .fg-ring{stroke:var(–warn)}
.gauge.g-er .fg-ring{stroke:var(–err)}

/* ==================== CARD STANDARD ==================== */
.sec{display:flex;align-items:center;gap:10px;margin:20px 0 10px;padding-bottom:8px;border-bottom:1px solid var(–brd1)}
.sec h2{font:700 1rem var(–S);color:#fff;display:flex;align-items:center;gap:8px}
.sec .ct{font:500 .78rem var(–S);color:var(–fg3);margin-left:auto}
.sec .ico{font-size:1.05rem}

.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:10px}
.card{background:var(–bg1);border:1px solid var(–brd1);border-radius:var(–rm);padding:13px;transition:all .15s;position:relative;cursor:pointer}
.card:hover{border-color:var(–brd2);background:var(–bg2);transform:translateY(-1px);box-shadow:var(–sh1)}
.card-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
.card-info{flex:1;min-width:0}
.card-league{font:500 .7rem var(–S);color:var(–fg3);margin-bottom:2px;text-transform:uppercase;letter-spacing:.4px}
.card-match{font:600 .95rem var(–S);color:#fff;line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:2px}
.card-time{font:500 .75rem var(–M);color:var(–fg3)}
.card-body{padding:8px 0}
.card-market{font:700 .95rem var(–S);color:#fff;margin-bottom:6px}
.card-stats{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:6px}
.card-stats .s{display:flex;flex-direction:column}
.card-stats .lb{font:500 .62rem var(–S);color:var(–fg3);text-transform:uppercase;letter-spacing:.4px}
.card-stats .vl{font:700 .88rem var(–M);color:var(–fg1)}
.card-stats .vl.ok{color:var(–ok)}
.card-stats .vl.warn{color:var(–warn)}
.card-stats .vl.err{color:var(–err)}
.card-badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.card-foot{display:flex;align-items:center;justify-content:space-between;gap:8px;padding-top:8px;border-top:1px solid var(–brd1);margin-top:8px}
.card-foot-l{display:flex;align-items:center;gap:8px}

/* Badge */
.bdg{padding:3px 8px;border-radius:5px;font:700 .7rem var(–M);display:inline-flex;align-items:center;gap:4px;white-space:nowrap}
.bdg-m1{background:var(–gold-bg);color:var(–gold);border:1px solid rgba(255,215,0,.3)}
.bdg-dm-ok{background:var(–ok-bg);color:var(–ok);border:1px solid rgba(74,222,128,.3)}
.bdg-dm-wa{background:var(–warn-bg);color:var(–warn);border:1px solid rgba(251,191,36,.3)}
.bdg-dm-er{background:var(–err-bg);color:var(–err);border:1px solid rgba(248,113,113,.3)}
.bdg-val{background:var(–mag-bg);color:var(–mag);border:1px solid rgba(192,132,252,.3)}
.bdg-gz{background:var(–info-bg);color:var(–info);border:1px solid rgba(96,165,250,.3)}
.bdg-neu{background:rgba(255,255,255,.04);color:var(–fg2);border:1px solid var(–brd1)}
.bdg-ok{background:var(–ok-bg);color:var(–ok);border:1px solid rgba(74,222,128,.3)}
.bdg-skip{background:var(–err-bg);color:var(–err);border:1px solid rgba(248,113,113,.3)}

.mini-btn{padding:5px 9px;background:var(–bg2);border:1px solid var(–brd1);border-radius:6px;color:var(–fg2);font:600 .7rem var(–M);cursor:pointer;display:inline-flex;align-items:center;gap:4px}
.mini-btn:hover{border-color:var(–ok2);color:var(–ok)}
.mini-btn.primary{background:var(–cta);border-color:var(–cta);color:#fff}
.mini-btn.primary:hover{background:var(–cta-h)}
.mini-btn.ok{background:var(–ok-bg);color:var(–ok);border-color:rgba(74,222,128,.25)}

/* Gauge compatto nella card */
.card-conf{display:flex;align-items:center;gap:10px}

/* Narrative expandable */
details.narr{background:var(–bg0);border:1px solid var(–brd1);border-radius:var(–rs);padding:0;margin-top:8px}
details.narr summary{padding:8px 12px;cursor:pointer;font:600 .78rem var(–S);color:var(–fg2);list-style:none;display:flex;align-items:center;gap:6px;user-select:none}
details.narr summary::-webkit-details-marker{display:none}
details.narr summary:hover{color:var(–fg1)}
details.narr summary::before{content:“▸”;transition:transform .15s;color:var(–fg3)}
details.narr[open] summary::before{transform:rotate(90deg)}
details.narr[open] summary{color:var(–fg1);border-bottom:1px solid var(–brd1)}
details.narr .narr-body{padding:10px 12px;font:400 .84rem var(–S);color:var(–fg1);line-height:1.6}
details.narr .breakdown{margin-top:8px;border-top:1px dashed var(–brd1);padding-top:8px}
details.narr .bk-row{display:flex;justify-content:space-between;gap:10px;padding:4px 0;font:500 .78rem var(–S)}
details.narr .bk-row .n{color:var(–fg2)}
details.narr .bk-row .p{font:700 .78rem var(–M)}
details.narr .bk-row .p.pos{color:var(–ok)}
details.narr .bk-row .p.neg{color:var(–err)}
details.narr .bk-row .p.zero{color:var(–fg3)}

/* ==================== EMPTY / STATUS ==================== */
.empty{text-align:center;padding:40px 20px;color:var(–fg3);background:var(–bg1);border:1px dashed var(–brd1);border-radius:var(–rm)}
.empty .ico{font-size:2.4rem;margin-bottom:10px;opacity:.45}
.empty p{font:500 .92rem var(–S);line-height:1.6;margin:0 auto;max-width:46ch}
.empty p.title{font-weight:700;color:var(–fg1);margin-bottom:6px}

.info-box{padding:12px 14px;background:var(–info-bg);color:var(–info);border:1px solid rgba(96,165,250,.25);border-radius:var(–rm);font:500 .85rem var(–S);line-height:1.5;margin-bottom:10px}
.warn-box{padding:12px 14px;background:var(–warn-bg);color:var(–warn);border:1px solid rgba(251,191,36,.3);border-radius:var(–rm);font:500 .85rem var(–S);line-height:1.5;margin-bottom:10px}
.err-box{padding:12px 14px;background:var(–err-bg);color:var(–err);border:1px solid rgba(248,113,113,.3);border-radius:var(–rm);font:500 .85rem var(–S);line-height:1.5;margin-bottom:10px}

/* ==================== SCHEDINA ==================== */
.ticket{background:var(–bg1);border:1px solid var(–brd1);border-radius:var(–rm);padding:14px;margin-bottom:10px}
.ticket-hdr{display:flex;align-items:center;justify-content:space-between;padding-bottom:10px;border-bottom:1px solid var(–brd1);margin-bottom:10px;gap:10px;flex-wrap:wrap}
.ticket-hdr h3{font:700 1rem var(–S);color:#fff}
.ticket-hdr .meta{font:500 .75rem var(–S);color:var(–fg3)}
.ticket-leg{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px dashed var(–brd1)}
.ticket-leg:last-child{border-bottom:none}
.ticket-leg .info{flex:1;min-width:0}
.ticket-leg .info .m{font:600 .88rem var(–S);color:#fff}
.ticket-leg .info .s{font:500 .78rem var(–S);color:var(–fg2);margin-top:2px}
.ticket-leg .odds{font:700 .9rem var(–M);color:var(–ok);min-width:50px;text-align:right}
.ticket-leg .del{width:30px;height:30px;border-radius:6px;background:var(–bg2);color:var(–err);display:flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid var(–brd1)}
.ticket-leg .del:hover{border-color:var(–err);background:var(–err-bg)}
.ticket-total{display:flex;justify-content:space-between;align-items:center;padding-top:10px;border-top:1px solid var(–brd1);margin-top:10px;gap:10px;flex-wrap:wrap}
.ticket-total .t{font:500 .82rem var(–S);color:var(–fg2)}
.ticket-total .v{font:800 1.15rem var(–M);color:var(–ok)}
.stake-ctrl{display:flex;gap:6px;align-items:center;flex-wrap:wrap;padding:10px 0}
.stake-ctrl input[type=number]{width:90px;padding:8px 10px;background:var(–bg0);border:1px solid var(–brd1);border-radius:6px;color:#fff;font:600 .88rem var(–M);outline:none}
.stake-ctrl input:focus{border-color:var(–ok)}
.stake-ctrl .lb{font:500 .8rem var(–S);color:var(–fg2)}

/* ==================== BANKROLL ==================== */
.bk-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:14px}
.bk-card{background:var(–bg1);border:1px solid var(–brd1);border-radius:var(–rm);padding:12px}
.bk-card .lbl{font:500 .7rem var(–S);color:var(–fg3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.bk-card .vl{font:800 1.35rem var(–M);color:#fff}
.bk-card .vl.pos{color:var(–ok)}
.bk-card .vl.neg{color:var(–err)}
.bk-card .sub{font:500 .72rem var(–S);color:var(–fg3);margin-top:4px}
.bk-ctrl{background:var(–bg1);border:1px solid var(–brd1);border-radius:var(–rm);padding:14px;margin-bottom:14px}
.bk-ctrl h3{font:700 .95rem var(–S);color:#fff;margin-bottom:10px}
.bk-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
.bk-row label{font:500 .82rem var(–S);color:var(–fg2);min-width:120px}
.bk-row input,.bk-row select{padding:8px 10px;background:var(–bg0);border:1px solid var(–brd1);border-radius:6px;color:#fff;font:600 .85rem var(–M);outline:none}
.bk-row input:focus,.bk-row select:focus{border-color:var(–ok)}
.bk-row input[type=range]{flex:1;min-width:140px}
.bk-row .out{font:700 .88rem var(–M);color:var(–ok);min-width:50px;text-align:right}
.lookup{width:100%;border-collapse:collapse;margin-top:10px;font-size:.8rem}
.lookup th,.lookup td{padding:8px 6px;text-align:center;border:1px solid var(–brd1)}
.lookup th{background:var(–bg2);color:var(–fg2);font-weight:700;font-family:var(–M);font-size:.75rem}
.lookup td{color:var(–fg1);font-family:var(–M);font-weight:600}
.lookup td.hl{background:var(–ok-bg);color:var(–ok)}

/* ==================== STORICO ==================== */
.hist-row{background:var(–bg1);border:1px solid var(–brd1);border-radius:var(–rm);padding:12px;margin-bottom:8px}
.hist-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;flex-wrap:wrap}
.hist-info .n{font:600 .9rem var(–S);color:#fff}
.hist-info .s{font:500 .76rem var(–S);color:var(–fg2);margin-top:2px}
.hist-actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}

/* ==================== STRUMENTI ==================== */
.str-sec{background:var(–bg1);border:1px solid var(–brd1);border-radius:var(–rm);padding:14px;margin-bottom:14px}
.str-sec h3{font:700 .95rem var(–S);color:#fff;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.str-sec p{font:500 .85rem var(–S);color:var(–fg2);line-height:1.55;margin-bottom:8px}

 {key:'ov05pt', label:'Ov 0.5 PT', hint:'IND / Delta / Diff / COv05'},

};

// Default stato
const defaultState = () => ({
 version: VERSION,

 },

 ui: {
  tab: 'oggi',
  uploadOpen: false,

  q: ''
 }
});

let S = defaultState();

/* ==================== PUB/SUB ==================== */
const bus = (() => {
 const subs = {};
 return {
  on(ev, fn){ (subs[ev] = subs[ev] || []).push(fn); },
  emit(ev, payload){ (subs[ev] || []).forEach(fn => { try { fn(payload); } catch(e){ console.error(e); } }); }
 };
})();

/* ==================== HELPER FUNCTIONS ==================== */
function escHtml(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}

function startOfWeekISO(){
 const d = new Date();
 const dow = (d.getDay() + 6) % 7; // lun=0 ... dom=6
 d.setDate(d.getDate() - dow);
 d.setHours(0,0,0,0);
 return d.toISOString();
}

function clamp(v,mn,mx){return Math.max(mn, Math.min(mx, v));}
function round(v,d=2){const p=Math.pow(10,d);return Math.round(v*p)/p;}
function fmtN(v,d=2){if(v===null||v===undefined||Number.isNaN(v))return 'N/D';return Number(v).toFixed(d);}
function fmtPct(v,d=1){if(v===null||v===undefined||Number.isNaN(v))return 'N/D';return (Number(v)*100).toFixed(d)+'%';}
function fmtEur(v){if(v===null||v===undefined||Number.isNaN(v))return '€ -';return '€ '+Number(v).toFixed(2).replace('.',',');}

function normMatchKey(s){
 if(!s) return '';
 return String(s)
  .toLowerCase()
  .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
  .replace(/\s+vs\s+|\s+v\s+/g,' - ')
  .replace(/\s+[-–—]\s+/g,' - ')
  .replace(/[^a-z0-9\- ]/g,' ')
  .replace(/\s+/g,' ')
  .trim();
}

function timeVal(ora){
 if(!ora) return 9999;
 const m = String(ora).match(/(\d{1,2}):(\d{2})/);
 if(!m) return 9999;
 return parseInt(m[1])*60 + parseInt(m[2]);
}

function cleanTime(ora){
 if(!ora) return '';
 const m = String(ora).match(/(\d{1,2}:\d{2})/);
 return m ? m[1] : String(ora);
}

function sortTime(a,b){return timeVal(a.ora)-timeVal(b.ora);}

function parseItalianNumber(s){
 if(s===null||s===undefined) return null;
 let t = String(s).trim().replace(/^"|"$/g,'');
 if(t==='' || t==='-' || t==='N/D' || t==='ND') return null;
 t = t.replace('%','').replace(/\s/g,'');
 // Se ci sono sia . che ,  → . = migliaia, , = decimale
 if(t.indexOf('.')>=0 && t.indexOf(',')>=0){
  t = t.replace(/\./g,'').replace(',','.');
 } else if(t.indexOf(',')>=0 && t.indexOf('.')<0){
  t = t.replace(',','.');
 }
 const n = parseFloat(t);
 return isNaN(n) ? null : n;
}

function pfOr0(s){ const n = parseItalianNumber(s); return n===null ? 0 : n; }
function piOr0(s){ const n = parseItalianNumber(s); return n===null ? 0 : Math.round(n); }

function std(arr){
 if(!arr.length) return 0;
 const m = arr.reduce((s,x)=>s+x,0)/arr.length;
 const v = arr.reduce((s,x)=>s+(x-m)*(x-m),0)/arr.length;
 return Math.sqrt(v);
}

function stdW(vals, weights){
 const W = weights.reduce((s,x)=>s+x,0);
 if(W<=0) return 0;
 const m = vals.reduce((s,x,i)=>s+x*weights[i],0)/W;
 const v = vals.reduce((s,x,i)=>s+weights[i]*(x-m)*(x-m),0)/W;
 return Math.sqrt(v);
}

function showToast(msg, type=''){
 const wrap = document.getElementById('toastWrap');
 if(!wrap) return;
 const t = document.createElement('div');
 t.className = 'toast ' + type;
 t.textContent = msg;
 wrap.appendChild(t);
 setTimeout(()=>{ t.style.opacity='0'; t.style.transform='translate(-50%,10px)'; setTimeout(()=>t.remove(),220); }, 2600);
}

function setUploadStatus(msg, type=''){
 const el = document.getElementById('upStatus');
 if(!el) return;
 if(!msg){ el.style.display='none'; return; }
 el.style.display = 'block';
 el.className = 'up-status ' + type;
 el.textContent = msg;
}

/* ==================== CSV PARSER ENGINE ==================== */
function detectDelimiter(firstLine){
 const candidates = [';',',','\t','|'];
 let best = ',', bestCount = 0;
 for(const d of candidates){
  let c = 0, inQ = false;
  for(let i=0;i<firstLine.length;i++){
   const ch = firstLine[i];
   if(ch === '"') inQ = !inQ;
   else if(ch === d && !inQ) c++;
  }
  if(c > bestCount){ bestCount = c; best = d; }
 }
 return best;
}

function splitCsvLine(line, sep){
 const out = [];
 let cur = '', inQ = false;
 for(let i=0;i<line.length;i++){
  const ch = line[i];
  if(ch === '"'){
   if(inQ && line[i+1]==='"'){ cur += '"'; i++; }
   else inQ = !inQ;
  } else if(ch === sep && !inQ){
   out.push(cur); cur='';
  } else cur += ch;
 }
 out.push(cur);
 return out.map(x => x.replace(/^"|"$/g,'').trim());
}

function parseCsvLines(text){
 return text.replace(/^\uFEFF/,'').replace(/\r\n?/g,'\n').trim().split('\n').filter(l=>l.trim()!=='');
}

function buildHeaderIndex(headerArr){
 const idx = {};
 headerArr.forEach((h,i) => { idx[h.trim()] = i; });
 return idx;
}

function gCell(row, idx, name){
 const i = idx[name];
 if(i === undefined) return '';
 return (row[i]===undefined||row[i]===null) ? '' : String(row[i]).trim();
}

/* ==================== PARSER SPECIFICI PER I 10 CSV ==================== */

// 1. Ov 0.5 PT
function parseOv05pt(text){
 const L = parseCsvLines(text); if(L.length<2) return [];
 const sep = detectDelimiter(L[0]);
 const hdr = splitCsvLine(L[0], sep);
 const ix = buildHeaderIndex(hdr);
 const rows = [];
 for(let i=1;i<L.length;i++){
  const f = splitCsvLine(L[i], sep);
  if(f.length < 3) continue;
  const evento = gCell(f,ix,'EVENTO');
  if(!evento) continue;
  const u5raw = gCell(f,ix,'U5[C|O]');
  const u5ctraw = gCell(f,ix,'U5CT[C|O]');
  const splitBar = v => {
   if(!v) return [0,0];
   const p = v.split('|').map(x=>parseInt(x)||0);
   return [p[0]||0, p[1]||0];
  };
  rows.push({
   ora: cleanTime(gCell(f,ix,'ORA')),
   evento,
   rpt: gCell(f,ix,'Rpt'),
   ind: piOr0(gCell(f,ix,'IND')) || 999,
   qrOv05: pfOr0(gCell(f,ix,'QROv0.5pt')) || pfOr0(gCell(f,ix,'QrOv0.5pt')),
   delta: pfOr0(gCell(f,ix,'Delta')),
   u5: splitBar(u5raw),
   u5ct: splitBar(u5ctraw),
   diff: pfOr0(gCell(f,ix,'Diff')),
   mge: pfOr0(gCell(f,ix,'MGE')),
   cov05: pfOr0(gCell(f,ix,'COv0.5%')),
   oov05: pfOr0(gCell(f,ix,'OOv0.5%')),
   qrGG: pfOr0(gCell(f,ix,'QrGG')),
   qrO25: pfOr0(gCell(f,ix,'QrO25')),
   _key: normMatchKey(evento)
  });
 }
 return rows;
}

// 2. GG + Ov/Un 2.5
function parseGGov25(text){
 const L = parseCsvLines(text); if(L.length<2) return [];
 const sep = detectDelimiter(L[0]);
 const hdr = splitCsvLine(L[0], sep);
 const ix = buildHeaderIndex(hdr);
 const rows = [];
 for(let i=1;i<L.length;i++){
  const f = splitCsvLine(L[i], sep);
  if(f.length < 3) continue;
  let oraRaw = gCell(f,ix,'ORA') || gCell(f,ix,'DATA EV.');
  const tm = String(oraRaw).match(/(\d{1,2}:\d{2})/);
  const dt = String(oraRaw).match(/(\d{2}-\d{2})/);
  const ora = (dt ? dt[1].replace('-','/')+' ' : '') + (tm ? tm[1] : '');
  let evento = gCell(f,ix,'EVENTO');
  if(evento) evento = evento.split(/\s{3,}/)[0] || evento;
  if(!evento) continue;
  rows.push({
   ora: ora.trim(),
   evento,
   nazione: gCell(f,ix,'NAZIONE'),
   lega: gCell(f,ix,'LEGA') || gCell(f,ix,'NAZIONE'),
   rpt: gCell(f,ix,'RIS.'),
   igbc: piOr0(gCell(f,ix,'IGBc')),
   igbo: piOr0(gCell(f,ix,'IGBo')),
   igbt: piOr0(gCell(f,ix,'IGBt')),
   mge:  pfOr0(gCell(f,ix,'MGE')),
   diff: pfOr0(gCell(f,ix,'Diff')),
   pgg:  pfOr0(gCell(f,ix,'PGG')),
   s12:  piOr0(gCell(f,ix,'S1-S2')),
   qov25: pfOr0(gCell(f,ix,'qOv2.5')),
   _key: normMatchKey(evento)
  });
 }
 return rows;
}

// 3. MG 1-3
function parseMG13(text){
 const L = parseCsvLines(text); if(L.length<2) return [];
 const sep = detectDelimiter(L[0]);
 const hdr = splitCsvLine(L[0], sep);
 const ix = buildHeaderIndex(hdr);
 const rows = [];
 for(let i=1;i<L.length;i++){
  const f = splitCsvLine(L[i], sep);
  if(f.length < 3) continue;
  const evento = gCell(f,ix,'EVENTO');
  if(!evento) continue;
  rows.push({
   ora: cleanTime(gCell(f,ix,'ORA')),
   evento,
   rpt: gCell(f,ix,'R'),
   ich: piOr0(gCell(f,ix,'ICH')),
   varc: pfOr0(gCell(f,ix,'VarC')),
   vu5c: pfOr0(gCell(f,ix,'VU5C')),
   ritc: piOr0(gCell(f,ix,'RitC')),
   mgfc: pfOr0(gCell(f,ix,'MGFC')),
   mgso: pfOr0(gCell(f,ix,'MGSO')),
   q1: pfOr0(gCell(f,ix,'Q1')),
   qo25: pfOr0(gCell(f,ix,'QO25')),
   q2: pfOr0(gCell(f,ix,'Q2')),
   ica: piOr0(gCell(f,ix,'ICA')),
   varo: pfOr0(gCell(f,ix,'VarO')),
   vu5o: pfOr0(gCell(f,ix,'VU5O')),
   rito: piOr0(gCell(f,ix,'RitO')),
   mgfo: pfOr0(gCell(f,ix,'MGFO')),
   mgsc: pfOr0(gCell(f,ix,'MGSC')),
   _key: normMatchKey(evento)
  });
 }
 return rows;
}

// 4. Stats IA
function parseIA(text){
 const L = parseCsvLines(text); if(L.length<2) return [];
 const sep = detectDelimiter(L[0]);
 const hdr = splitCsvLine(L[0], sep);
 const ix = buildHeaderIndex(hdr);
 const rows = [];
 for(let i=1;i<L.length;i++){
  const f = splitCsvLine(L[i], sep);
  if(f.length < 3) continue;
  let oraRaw = gCell(f,ix,'DATA EV.') || gCell(f,ix,'ORA');
  const tm = String(oraRaw).match(/(\d{1,2}:\d{2})/);
  const dt = String(oraRaw).match(/(\d{2}-\d{2})/);
  const ora = (dt ? dt[1].replace('-','/')+' ' : '') + (tm ? tm[1] : '');
  const evento = gCell(f,ix,'EVENTO');
  if(!evento) continue;
  const stats = [];
  const cats = [
   ['TT','Tiri Totali','TT1X2','TTaff'],
   ['TIP','Tiri in Porta','TIP1X2','TIPaff'],
   ['COR','Corner','Cor1X2','CorAff'],
   ['FAL','Falli','Fal1X2','FalAff'],
   ['FG','Fuorigioco','FG1X2','FGaff']
  ];
  cats.forEach(([k,lbl,kp,ka]) => {
   const pred = gCell(f,ix,kp);
   const aff = pfOr0(gCell(f,ix,ka));
   if(pred) stats.push({key:k, label:lbl, pred, aff});
  });
  const affArr = stats.map(s=>s.aff);
  const maxAff = affArr.length ? Math.max(...affArr) : 0;
  const avgAff = affArr.length ? affArr.reduce((s,x)=>s+x,0)/affArr.length : 0;
  rows.push({
   ora: ora.trim(),
   evento,
   nazione: gCell(f,ix,'NAZIONE'),
   lega: gCell(f,ix,'LEGA'),
   rpt: gCell(f,ix,'RIS.'),
   stats, maxAff, avgAff,
   highCount: stats.filter(s=>s.aff>=2.5).length,
   _key: normMatchKey(evento)
  });
 }
 return rows;
}

// 5. Giocatori Cartellini
function parsePlCard(text){
 const L = parseCsvLines(text); if(L.length<2) return [];
 const sep = detectDelimiter(L[0]);
 const hdr = splitCsvLine(L[0], sep);
 const ix = buildHeaderIndex(hdr);
 const rows = [];
 for(let i=1;i<L.length;i++){
  const f = splitCsvLine(L[i], sep);
  if(f.length < 3) continue;
  const oraRaw = gCell(f,ix,'Ora');
  const tm = String(oraRaw).match(/(\d{1,2}:\d{2})/);
  const dt = String(oraRaw).match(/(\d{2}-\d{2})/);
  const ora = (dt ? dt[1].replace('-','/')+' ' : '') + (tm ? tm[1] : '');
  const nome = gCell(f,ix,'Nome');
  const partita = gCell(f,ix,'Partita');
  if(!nome) continue;
  rows.push({
   ora: ora.trim(),
   lega: gCell(f,ix,'Campionato'),
   partita, nome,
   squadra: gCell(f,ix,'Squadra'),
   pos: gCell(f,ix,'Pos.'),

// 9. DataMining Plus - con header duplicati per % e quota
function parseDM(text){
 const L = parseCsvLines(text); if(L.length<2) return [];
 const sep = detectDelimiter(L[0]);
 const hdr = splitCsvLine(L[0], sep);
 // Trova le posizioni usando pattern: il nome del mercato compare 2 volte
 // 1a occorrenza = %, 2a occorrenza = quota (o mercato+1 = quota)
 const findPair = (name) => {
  const first = hdr.indexOf(name);
  if(first<0) return [-1,-1];
  return [first, first+1];
 };
 // Indici dinamici (come nel codice originale Fase 4)
 const iOra = hdr.indexOf('Ora');
 const iMatch = hdr.indexOf('Match');
 const iR = hdr.indexOf('R');
 const iRpt = hdr.indexOf('Rpt');
 const iNP = hdr.indexOf('NP');
 const i1Perc = hdr.findIndex((h,i) => h === '1' && i > 5);
 const i1Quota = i1Perc + 1;
 const iXPerc = i1Quota + 1;
 const iXQuota = iXPerc + 1;
 const i2Perc = iXQuota + 1;
 const i2Quota = i2Perc + 1;
 const iMGE = hdr.indexOf('MGE');
 const iDIFF = hdr.indexOf('DIFF');
 const iGGPerc = hdr.findIndex((h,i) => h === 'GG' && i > iDIFF);
 const iGGQuota = iGGPerc + 1;
 const [iOV15P, iOV15Q] = findPair('OV15');
 const [iOV25P, iOV25Q] = findPair('OV25');
 const [iUN35P, iUN35Q] = findPair('UN35');
 const [iOV05ptP, iOV05ptQ] = findPair('OV0.5pt');
 const iIC = hdr.indexOf('IC');
 const iRC = hdr.indexOf('RC');
 const iRO = hdr.indexOf('RO');
 // SC e SO appaiono 2 volte: una prima e una dopo IGB
 const iSCP = hdr.indexOf('SC');
 const iIGBC = hdr.indexOf('IGBC');
 const iSCQ = iIGBC + 1;   // subito dopo IGBC
 const iSOP = hdr.indexOf('SO');
 const iIGBO = hdr.indexOf('IGBO');
 const iSOQ = iIGBO + 1;
 const iRE = hdr.indexOf('RE');

 const rows = [];
 for(let i=1;i<L.length;i++){
  const f = splitCsvLine(L[i], sep);
  if(f.length < 5) continue;
  const match = f[iMatch] ? f[iMatch].replace(/^"|"$/g,'').trim() : '';
  if(!match) continue;
  rows.push({
   ora: cleanTime(f[iOra]||''),
   match,
   r: f[iR]||'',
   rpt: f[iRpt]||'',
   np: piOr0(f[iNP]),
   p1: pfOr0(f[i1Perc]),       q1: pfOr0(f[i1Quota]),
   pX: pfOr0(f[iXPerc]),       qX: pfOr0(f[iXQuota]),
   p2: pfOr0(f[i2Perc]),       q2: pfOr0(f[i2Quota]),
   mge: pfOr0(f[iMGE]),
   diff: pfOr0(f[iDIFF]),
   pGG: pfOr0(f[iGGPerc]),     qGG: pfOr0(f[iGGQuota]),
   pOV15: pfOr0(f[iOV15P]),    qOV15: pfOr0(f[iOV15Q]),
   pOV25: pfOr0(f[iOV25P]),    qOV25: pfOr0(f[iOV25Q]),
   pUN35: pfOr0(f[iUN35P]),    qUN35: pfOr0(f[iUN35Q]),
   pOV05pt: pfOr0(f[iOV05ptP]), qOV05pt: pfOr0(f[iOV05ptQ]),
   ic: piOr0(f[iIC]),
   rc: piOr0(f[iRC]),
   ro: piOr0(f[iRO]),
   pSC: pfOr0(f[iSCP]),        qSC: pfOr0(f[iSCQ]), igbc: piOr0(f[iIGBC]),
   pSO: pfOr0(f[iSOP]),        qSO: pfOr0(f[iSOQ]), igbo: piOr0(f[iIGBO]),
   re: iRE>=0 ? (f[iRE]||'') : '',
   _key: normMatchKey(match)
  });
 }
 return rows;
}

// Parse campo RE stringa → array scores ordinati
function parseREField(reStr){
 if(!reStr) return [];
 const parts = reStr.split(/\s{2,}/).filter(s=>s.includes('%'));
 const items = parts.map(s => {
  const mm = s.match(/(\d+\s*-\s*\d+)\s*:\s*([\d.,]+)/);
  if(!mm) return null;
  return { score: mm[1].replace(/\s/g,''), perc: parseItalianNumber(mm[2]) };
 }).filter(x => x && x.perc!==null);
 return items.sort((a,b) => b.perc - a.perc);
}

/* ==================================================================
   SIGNAL LAYER - 10 SEGNALI NORMALIZZATI
   Ogni segnale ritorna: { active, direction, strength, coverage, details }
   - direction: 'over', 'under', 'gg', 'ng', 'casaSegna', 'ospiteSegna',
                'ov05pt', 'mg13', '1', 'X', '2', 'mg24', 'casaWin', 'ospiteWin'
   - strength: [0,1] forza del segnale a favore della direction
   - coverage: 0/1 dato disponibile
   ================================================================== */

// ----- Lookup helpers per accesso veloce ai dataset -----
function buildLookups(){
 const L = {
  ov05pt: new Map(), ggov25: new Map(), mg13: new Map(), ia: new Map(),
  qVal: new Map(), gz: new Map(), dm: new Map(), diffg: new Map(),
  plCardByMatch: new Map(), plShotByMatch: new Map()
 };
 (S.datasets.ov05pt||[]).forEach(r => L.ov05pt.set(r._key, r));
 (S.datasets.ggov25||[]).forEach(r => L.ggov25.set(r._key, r));
 (S.datasets.mg13||[]).forEach(r => L.mg13.set(r._key, r));
 (S.datasets.ia||[]).forEach(r => L.ia.set(r._key, r));
 (S.datasets.qVal||[]).forEach(r => L.qVal.set(r._key, r));
 (S.datasets.gz||[]).forEach(r => L.gz.set(r._key, r));
 (S.datasets.dm||[]).forEach(r => L.dm.set(r._key, r));
 (S.datasets.diffg||[]).forEach(r => L.diffg.set(r._key, r));
 (S.datasets.plCard||[]).forEach(r => {
  if(!L.plCardByMatch.has(r._key)) L.plCardByMatch.set(r._key, []);
  L.plCardByMatch.get(r._key).push(r);
 });
 (S.datasets.plShot||[]).forEach(r => {
  if(!L.plShotByMatch.has(r._key)) L.plShotByMatch.set(r._key, []);
  L.plShotByMatch.get(r._key).push(r);
 });
 return L;
}

// ----- Universe di match: union di tutte le chiavi -----
function buildUniverse(L){
 const map = new Map();
 const upsert = (key, info) => {
  if(!key) return;
  if(!map.has(key)){
   map.set(key, { _key:key, evento:info.evento||'', ora:info.ora||'', lega:info.lega||'' });
  } else {
   const cur = map.get(key);
   if(!cur.lega && info.lega) cur.lega = info.lega;
   if(!cur.ora && info.ora) cur.ora = info.ora;
   if(!cur.evento && info.evento) cur.evento = info.evento;
  }
 };
 L.ggov25.forEach((r,k) => upsert(k,{evento:r.evento, ora:r.ora, lega:r.lega}));
 L.dm.forEach((r,k) => upsert(k,{evento:r.match, ora:r.ora}));
 L.gz.forEach((r,k) => upsert(k,{evento:r.evento, ora:r.ora, lega:r.lega}));
 L.diffg.forEach((r,k) => upsert(k,{evento:r.evento, ora:r.ora}));
 L.ov05pt.forEach((r,k) => upsert(k,{evento:r.evento, ora:r.ora}));
 L.mg13.forEach((r,k) => upsert(k,{evento:r.evento, ora:r.ora}));
 L.ia.forEach((r,k) => upsert(k,{evento:r.evento, ora:r.ora, lega:r.lega}));
 L.qVal.forEach((r,k) => upsert(k,{evento:r.match, ora:r.ora}));
 return Array.from(map.values());
}

/* ==================== REGOLE M1 SIGILLATE ==================== */
function isM1_ov05pt(r){ return r && r.ind < M1_THR.ov05pt.ind && r.delta < M1_THR.ov05pt.delta && r.diff < M1_THR.ov05pt.diff; }
function isM1_gg(r){ return r && r.igbc>=M1_THR.gg.igbc && r.igbo>=M1_THR.gg.igbo && r.s12<M1_THR.gg.s12 && r.pgg>=M1_THR.gg.pgg; }
function isM1_o25(r){ return r && r.igbt>=M1_THR.o25.igbt && r.mge>=M1_THR.o25.mge && r.diff<=M1_THR.o25.diff; }
function isM1_u25(r){ return r && r.diff>M1_THR.u25.diffMin && r.mge>M1_THR.u25.mgeLow && r.mge<M1_THR.u25.mgeHi; }
function isM1_mg13c(r){ return r && r.ich>=M1_THR.mg13c.ichLo && r.ich<=M1_THR.mg13c.ichHi && r.varc>=M1_THR.mg13c.varc; }
function isM1_mg13o(r){ return r && r.ica>=M1_THR.mg13o.icaLo && r.ica<=M1_THR.mg13o.icaHi && r.varo>=M1_THR.mg13o.varo; }

/* ==================== GZ PROBABILITY MAPPING ==================== */
function gzMap(gz){
 if(gz===null||gz===undefined) return null;
 if(gz < -1800) return {dir:'under', mkt:'U2.5', p:0.64, lbl:'U2.5 64%'};
 if(gz < -1200) return {dir:'under', mkt:'U3.5', p:0.81, lbl:'U3.5 81%'};
 if(gz > 5000)  return {dir:'over',  mkt:'O2.5', p:0.64, lbl:'Ov2.5 64%'};
 if(gz > 1000)  return {dir:'over',  mkt:'O1.5', p:0.80, lbl:'Ov1.5 80%'};
 if(gz > -200 && gz < 200) return {dir:'over', mkt:'O0.5', p:0.95, lbl:'Ov0.5 95%'};
 return {dir:'neutral', mkt:'-', p:0.5, lbl:'Neutrale'};
}

/* ==================== SIGNAL FUNCTIONS ==================== */

// S1 Ov 0.5 PT
function signalS1(L, key){
 const r = L.ov05pt.get(key);
 if(!r) return {active:false, coverage:0};
 const m1 = isM1_ov05pt(r);
 let strength = 0;
 if(m1) strength = 0.9;
 else {
  let s = 0;
  if(r.ind < 320) s += 0.35;
  else if(r.ind < 340) s += 0.2;
  if(r.delta <= -20) s += 0.35;
  else if(r.delta <= -5) s += 0.2;
  if(r.diff < 0) s += 0.2;
  strength = s;
 }
 return {
  active:true, coverage:1,
  direction:'ov05pt',
  strength: clamp(strength, 0, 1),
  m1,
  details: {ind:r.ind, delta:r.delta, diff:r.diff, mge:r.mge}
 };
}

// S2 GG
function signalS2(L, key){
 const r = L.ggov25.get(key);
 if(!r) return {active:false, coverage:0};
 const m1 = isM1_gg(r);
 let strength = 0;
 if(m1) strength = 0.9;
 else {
  let s = 0;
  if(r.igbc >= 150) s += 0.25; else if(r.igbc >= 100) s += 0.12;
  if(r.igbo >= 150) s += 0.25; else if(r.igbo >= 100) s += 0.12;
  if(r.s12 < 150) s += 0.2; else if(r.s12 < 250) s += 0.1;
  if(r.pgg >= 55) s += 0.2; else if(r.pgg >= 45) s += 0.1;
  strength = s;
 }
 return {
  active:true, coverage:1,
  direction:'gg',
  strength: clamp(strength, 0, 1),
  m1,
  details: {igbc:r.igbc, igbo:r.igbo, s12:r.s12, pgg:r.pgg}
 };
}

// S3 Ov 2.5 / U 2.5
function signalS3(L, key){
 const r = L.ggov25.get(key);
 if(!r) return {active:false, coverage:0};
 const m1o = isM1_o25(r), m1u = isM1_u25(r);
 let sO = 0, sU = 0;
 if(m1o) sO = 0.9;
 else {
  if(r.igbt >= 300) sO += 0.35; else if(r.igbt >= 250) sO += 0.18;
  if(r.mge >= 3) sO += 0.3; else if(r.mge >= 2.5) sO += 0.15;
  if(r.diff <= 0) sO += 0.2;
 }
 if(m1u) sU = 0.9;
 else {
  if(r.diff > 1.5) sU += 0.35; else if(r.diff > 1) sU += 0.2;
  if(r.mge > 0 && r.mge < 2.5) sU += 0.3;
  else if(r.mge < 3 && r.mge > 0) sU += 0.15;
  if(r.igbt < 250) sU += 0.15;
 }
 sO = clamp(sO,0,1); sU = clamp(sU,0,1);
 const dir = sO >= sU ? 'over' : 'under';
 const strength = Math.max(sO, sU);
 return {
  active: true, coverage: 1,
  direction: dir,
  strength,
  sO, sU,
  m1: dir==='over' ? m1o : m1u,
  m1o, m1u,
  details: {igbt:r.igbt, mge:r.mge, diff:r.diff, pgg:r.pgg, qov25:r.qov25}
 };
}

// S4 MG 1-3
function signalS4(L, key){
 const r = L.mg13.get(key);
 if(!r) return {active:false, coverage:0};
 const m1c = isM1_mg13c(r), m1o = isM1_mg13o(r);
 let sC = 0, sO = 0;
 if(m1c) sC = 0.9;
 else {
  if(r.ich >= 300 && r.ich <= 400) sC += 0.4;
  if(r.varc >= 30) sC += 0.3; else if(r.varc >= 20) sC += 0.15;
 }
 if(m1o) sO = 0.9;
 else {
  if(r.ica >= 300 && r.ica <= 400) sO += 0.4;
  if(r.varo >= 30) sO += 0.3; else if(r.varo >= 20) sO += 0.15;
 }
 const side = sC >= sO ? 'casa' : 'ospite';
 const strength = Math.max(sC, sO);
 return {
  active: true, coverage: 1,
  direction: 'mg13',
  side, strength,
  sC, sO,
  m1: side==='casa' ? m1c : m1o,
  m1c, m1o,
  details: {ich:r.ich, ica:r.ica, varc:r.varc, varo:r.varo}
 };
}

// S5 Stats IA convergenza
function signalS5(L, key){
 const r = L.ia.get(key);
 if(!r || !r.stats || !r.stats.length) return {active:false, coverage:0};
 const counts = {'1':0, 'X':0, '2':0};
 r.stats.forEach(s => {
  const dir = String(s.pred).trim().toUpperCase();
  if(counts[dir]!==undefined) counts[dir] += s.aff;
 });
 const winner = Object.keys(counts).sort((a,b)=>counts[b]-counts[a])[0];
 const total = counts['1']+counts['X']+counts['2'];
 const concentration = total > 0 ? counts[winner]/total : 0;
 const strength = clamp((r.avgAff/5) * concentration * 1.4, 0, 1);
 const dirMap = {'1':'casaWin', 'X':'pareggio', '2':'ospiteWin'};
 return {
  active: true, coverage: 1,
  direction: dirMap[winner] || 'neutral',
  strength,
  details: {avgAff:r.avgAff, maxAff:r.maxAff, winner, concentration, statsCount:r.stats.length}
 };
}

// S6 GZ probability
function signalS6(L, key){
 const r = L.gz.get(key);
 if(!r || r.gz===null) return {active:false, coverage:0};
 const map = gzMap(r.gz);
 if(!map || map.dir==='neutral') return {active:true, coverage:1, direction:'neutral', strength:0, details:{gz:r.gz, lbl:'Neutrale'}};
 const strength = map.p;
 return {
  active: true, coverage: 1,
  direction: map.dir,
  strength,
  mkt: map.mkt,
  lbl: map.lbl,
  details: {gz:r.gz, lbl:map.lbl, mkt:map.mkt, p:map.p}
 };
}

// S7 DataMining esteso
function signalS7(L, key){
 const r = L.dm.get(key);
 if(!r) return {active:false, coverage:0};
 const np = r.np || 0;
 const npWeight = clamp(np/30, 0, 1);
 const buckets = {
  'over': r.pOV25,
  'under': r.pUN35,
  'gg': r.pGG,
  'ov15': r.pOV15,
  'ov05pt': r.pOV05pt,
  'casaSegna': r.pSC,
  'ospiteSegna': r.pSO,
  '1': r.p1, 'X': r.pX, '2': r.p2
 };
 let bestDir = 'over', bestVal = 0;
 for(const [d,p] of Object.entries(buckets)){
  if(p > bestVal){ bestVal = p; bestDir = d; }
 }
 const strength = clamp((bestVal/100) * (0.4 + 0.6*npWeight), 0, 1);
 return {
  active: true, coverage: 1,
  direction: bestDir,
  strength,
  np, npWeight,
  buckets,
  re: parseREField(r.re),
  ic: r.ic, rc: r.rc, ro: r.ro,
  raw: r,
  details: {np, mge:r.mge, diff:r.diff, ic:r.ic, rc:r.rc, ro:r.ro}
 };
}

// S8 Value 1X2
function signalS8(L, key){
 const r = L.qVal.get(key);
 if(!r) return {active:false, coverage:0};
 const isValue = (qReale, qDM, spread) => spread > 0.15 && qReale > 1.01 && qReale < 3 && qDM > 0;
 const v1 = isValue(r.r1, r.dm1, r.spread1);
 const vX = isValue(r.rx, r.dmx, r.spreadX);
 const v2 = isValue(r.r2, r.dm2, r.spread2);
 let dir = 'neutral', strength = 0;
 if(v1 && r.spread1 >= Math.max(v2?r.spread2:0, vX?r.spreadX:0)){ dir='1'; strength = clamp(r.spread1, 0, 1); }
 else if(v2 && r.spread2 >= (vX?r.spreadX:0)){ dir='2'; strength = clamp(r.spread2, 0, 1); }
 else if(vX){ dir='X'; strength = clamp(r.spreadX, 0, 1); }
 let golSide = null;
 if(v1 && v2) golSide = 'entrambe';
 else if(v1) golSide = 'casa';
 else if(v2) golSide = 'ospite';
 else if(vX) golSide = 'pareggio';
 return {
  active: true, coverage: 1,
  direction: dir,
  strength,
  v1, vX, v2, golSide,
  np: r.np,
  details: {r1:r.r1, rx:r.rx, r2:r.r2, dm1:r.dm1, dmx:r.dmx, dm2:r.dm2, spread1:r.spread1, spreadX:r.spreadX, spread2:r.spread2}
 };
}

// S9 Profilo giocatori
function signalS9(L, key){
 const cardArr = L.plCardByMatch.get(key) || [];
 const shotArr = L.plShotByMatch.get(key) || [];
 if(!cardArr.length && !shotArr.length) return {active:false, coverage:0};
 let bestCard = null, bestShot = null;
 cardArr.forEach(p => {
  const score = (p.amm * 0.5) + (p.falli * 0.2) + (p.rit * 0.3);
  if(!bestCard || score > bestCard.score) bestCard = {p, score, type:'card'};
 });
 shotArr.forEach(p => {
  const score = (p.gol * 0.6) + (p.tiriPorta * 0.25) + (p.rit * 0.15);
  if(!bestShot || score > bestShot.score) bestShot = {p, score, type:'shot'};
 });
 let strength = 0, direction = 'neutral';
 if(bestCard && bestCard.score > 1.5){ strength = Math.max(strength, clamp(bestCard.score/3, 0, 1)); direction = 'cartellini'; }
 if(bestShot && bestShot.score > 1.5){
  const s = clamp(bestShot.score/3, 0, 1);
  if(s > strength){ strength = s; direction = 'tiri'; }
 }
 return {
  active: bestCard !== null || bestShot !== null,
  coverage: 1,
  direction,
  strength,
  bestCard, bestShot,
  details: {nCard: cardArr.length, nShot: shotArr.length}
 };
}

// S10 Differenziali Gol (mean-reversion)
function signalS10(L, key){
 const r = L.diffg.get(key);
 if(!r) return {active:false, coverage:0};
 const dgt = r.dgt;
 const diffC = r.diffC;
 const diffO = r.diffO;
 const significant = dgt !== null && Math.abs(dgt) > DIFF_THR.dgt;
 let direction = 'neutral', strength = 0;
 if(significant){
  if(dgt > 0){ direction = 'under'; strength = clamp(Math.abs(dgt)/3, 0.3, 1); }
  else { direction = 'over'; strength = clamp(Math.abs(dgt)/3, 0.3, 1); }
 }
 const csSig = diffC !== null && Math.abs(diffC) > DIFF_THR.team;
 const osSig = diffO !== null && Math.abs(diffO) > DIFF_THR.team;
 const teamSignals = {
  casaSegna: csSig && diffC < 0,
  noCasaSegna: csSig && diffC > 0,
  ospiteSegna: osSig && diffO < 0,
  noOspiteSegna: osSig && diffO > 0
 };
 let drop = null, dropDir = null;
 if(r.qr && r.qrL && r.qr > 0){
  drop = (r.qr - r.qrL) / r.qr;
  if(drop > DIFF_THR.dropOk) dropDir = 'pro';
  else if(drop < -DIFF_THR.dropOk) dropDir = 'contra';
 }
 return {
  active: true, coverage: 1,
  direction,
  strength,
  significant,
  dgt, diffC, diffO,
  teamSignals,
  drop, dropDir,
  details: {dgt, dg:r.dg, diffC, diffO, mge:r.mge, mgu5:r.mgu5, qr:r.qr, qrL:r.qrL, qt:r.qt}
 };
}

/* ==================== ESTRAZIONE SEGNALI PER UN MATCH ==================== */
function extractSignals(L, key){
 return {
  s1:  signalS1(L, key),
  s2:  signalS2(L, key),
  s3:  signalS3(L, key),
  s4:  signalS4(L, key),
  s5:  signalS5(L, key),
  s6:  signalS6(L, key),
  s7:  signalS7(L, key),
  s8:  signalS8(L, key),
  s9:  signalS9(L, key),
  s10: signalS10(L, key)
 };
}

function enumerateMarkets(sig, L, key){
 const list = [];
 if(sig.s1.active && sig.s1.strength > 0.3){
  list.push({mkt:'Ov 0.5 PT', dir:'ov05pt'});
 } else if(sig.s7.active && sig.s7.buckets.ov05pt > 50 && sig.s7.np >= 15){
  list.push({mkt:'Ov 0.5 PT', dir:'ov05pt'});
 }
 if(sig.s2.active && sig.s2.strength > 0.3){
  list.push({mkt:'GG', dir:'gg'});
 } else if(sig.s7.active && sig.s7.buckets.gg > 55){
  list.push({mkt:'GG', dir:'gg'});
 }
 if(sig.s3.active){
  if(sig.s3.sO > 0.4) list.push({mkt:'Ov 2.5', dir:'over'});
  if(sig.s3.sU > 0.4) list.push({mkt:'U 2.5', dir:'under'});
 } else if(sig.s7.active){
  if(sig.s7.buckets.over > 55) list.push({mkt:'Ov 2.5', dir:'over'});
  if(sig.s7.buckets.under > 60) list.push({mkt:'U 2.5', dir:'under'});
 }
 if(sig.s10.active && sig.s10.significant){
  if(sig.s10.direction === 'over' && !list.find(x=>x.mkt==='Ov 2.5')) list.push({mkt:'Ov 2.5', dir:'over'});
  if(sig.s10.direction === 'under' && !list.find(x=>x.mkt==='U 2.5')) list.push({mkt:'U 2.5', dir:'under'});
 }
 if(sig.s4.active && sig.s4.strength > 0.4){
  if(sig.s4.side === 'casa') list.push({mkt:'MG 1-3 Casa', dir:'mg13', side:'casa'});
  else list.push({mkt:'MG 1-3 Ospite', dir:'mg13', side:'ospite'});
 }
 const dm = L.dm.get(key);
 if(dm && dm.pSC >= 60 && dm.igbc >= 150){
  const teamConfirm = sig.s10.active && sig.s10.teamSignals.casaSegna;
  if(teamConfirm || dm.pSC >= 70){
   list.push({mkt:'Casa Segna', dir:'casaSegna'});
  }
 }
 if(dm && dm.pSO >= 60 && dm.igbo >= 150){
  const teamConfirm = sig.s10.active && sig.s10.teamSignals.ospiteSegna;
  if(teamConfirm || dm.pSO >= 70){
   list.push({mkt:'Ospite Segna', dir:'ospiteSegna'});
  }
 }
 if(dm && dm.pOV15 > 60 && dm.pUN35 > 60){
  list.push({mkt:'MG 2-4', dir:'mg24'});
 }
 if(sig.s8.active && sig.s8.strength > 0.15){
  if(sig.s8.v1) list.push({mkt:'1', dir:'1'});
  if(sig.s8.vX) list.push({mkt:'X', dir:'X'});
  if(sig.s8.v2) list.push({mkt:'2', dir:'2'});
 }
 if(sig.s7.active && sig.s7.re && sig.s7.re.length >= 2){
  const top = sig.s7.re.filter(x => x.perc >= 12);
  if(top.length >= 2){
   list.push({mkt:'CS Cluster', dir:'cs', cluster: top.slice(0,3)});
  }
 }
 return list;
}

/* ==================== QUOTA OPERATIVA PER MERCATO ==================== */
function operationalOdds(market, sig, L, key){
 const dm = L.dm.get(key);
 const dg = L.diffg.get(key);
 const ggov = L.ggov25.get(key);
 const mg = L.mg13.get(key);
 const ov = L.ov05pt.get(key);
 const qv = L.qVal.get(key);
 if(market === 'Ov 0.5 PT') return ov ? (ov.qrOv05 || null) : (dm ? dm.qOV05pt : null);
 if(market === 'GG') return dm ? dm.qGG : null;
 if(market === 'Ov 2.5') return (dg && dg.qrL) || (ggov ? ggov.qov25 : null) || (dm ? dm.qOV25 : null);
 if(market === 'U 2.5') return dm ? dm.qUN35 : null;
 if(market === 'MG 1-3 Casa') return mg ? mg.q1 : null;
 if(market === 'MG 1-3 Ospite') return mg ? mg.q2 : null;
 if(market === 'Casa Segna') return dm ? dm.qSC : null;
 if(market === 'Ospite Segna') return dm ? dm.qSO : null;
 if(market === 'MG 2-4') return 1.50;
 if(market === '1') return qv ? qv.r1 : (dm ? dm.q1 : null);
 if(market === 'X') return qv ? qv.rx : (dm ? dm.qX : null);
 if(market === '2') return qv ? qv.r2 : (dm ? dm.q2 : null);
 if(market === 'CS Cluster') return null;
 return null;
}

/* ==================== CONFIDENCE SCORE 0-100 ==================== */
const DIR_COMPAT = {
 'ov05pt':      new Set(['ov05pt','over']),
 'gg':          new Set(['gg','over','casaSegna','ospiteSegna']),
 'over':        new Set(['over','gg','ov05pt','ov15']),
 'under':       new Set(['under','noCasaSegna','noOspiteSegna']),
 'casaSegna':   new Set(['casaSegna','gg','over','1']),
 'ospiteSegna': new Set(['ospiteSegna','gg','over','2']),
 'mg13':        new Set(['mg13','under']),
 '1':           new Set(['1','casaWin','casaSegna']),
 'X':           new Set(['X','pareggio']),
 '2':           new Set(['2','ospiteWin','ospiteSegna']),
 'mg24':        new Set(['mg24','over','gg']),
 'cs':          new Set(['cs'])
};

function dirAgreesWith(targetDir, sigDir){
 if(!sigDir || sigDir === 'neutral') return null;
 const set = DIR_COMPAT[targetDir];
 if(!set) return null;
 if(set.has(sigDir)) return +1;
 const opposite = {
  'over':'under', 'under':'over',
  'gg':'ng', 'ng':'gg',
  'casaSegna':'noCasaSegna', 'noCasaSegna':'casaSegna',
  'ospiteSegna':'noOspiteSegna', 'noOspiteSegna':'ospiteSegna'
 };
 if(opposite[targetDir] === sigDir) return -1;
 return null;
}

function computeConfidence(target, sig, L, key){
 const targetDir = target.dir;
 const comp = [];

 // M1
 let m1Active = false, m1Score = 0;
 if(targetDir === 'ov05pt' && sig.s1.active){ if(sig.s1.m1) m1Active = true; m1Score = sig.s1.strength; }
 else if(targetDir === 'gg' && sig.s2.active){ if(sig.s2.m1) m1Active = true; m1Score = sig.s2.strength; }
 else if(targetDir === 'over' && sig.s3.active){ if(sig.s3.m1o) m1Active = true; m1Score = sig.s3.sO; }
 else if(targetDir === 'under' && sig.s3.active){ if(sig.s3.m1u) m1Active = true; m1Score = sig.s3.sU; }
 else if(targetDir === 'mg13' && sig.s4.active){
  if(target.side === 'casa' && sig.s4.m1c){ m1Active = true; m1Score = sig.s4.sC; }
  else if(target.side === 'ospite' && sig.s4.m1o){ m1Active = true; m1Score = sig.s4.sO; }
  else m1Score = target.side==='casa' ? sig.s4.sC : sig.s4.sO;
 }
 if(m1Score > 0){
  comp.push({key:'M1', weight:W.M1, contrib: m1Score*2-1, coverage:1, label: m1Active?'M1 attiva':'M1 borderline'});
 } else {
  comp.push({key:'M1', weight:W.M1, contrib: 0, coverage:0});
 }

 // DataMining
 if(sig.s7.active){
  let perc = 0;
  if(targetDir === 'over') perc = sig.s7.buckets.over;
  else if(targetDir === 'under') perc = sig.s7.buckets.under;
  else if(targetDir === 'gg') perc = sig.s7.buckets.gg;
  else if(targetDir === 'ov05pt') perc = sig.s7.buckets.ov05pt;
  else if(targetDir === 'casaSegna') perc = sig.s7.buckets.casaSegna;
  else if(targetDir === 'ospiteSegna') perc = sig.s7.buckets.ospiteSegna;
  else if(targetDir === '1') perc = sig.s7.buckets['1'];
  else if(targetDir === 'X') perc = sig.s7.buckets['X'];
  else if(targetDir === '2') perc = sig.s7.buckets['2'];
  else if(targetDir === 'mg24') perc = (sig.s7.buckets.ov15 + sig.s7.buckets.under) / 2;
  if(perc > 0){
   const c = clamp((perc - 50) / 50, -1, 1) * sig.s7.npWeight;
   comp.push({key:'DM', weight:W.DM, contrib:c, coverage:1, label:`DM ${perc.toFixed(0)}% NP=${sig.s7.np}`});
  } else {
   comp.push({key:'DM', weight:W.DM, contrib:0, coverage:0});
  }
 } else comp.push({key:'DM', weight:W.DM, contrib:0, coverage:0});

 // GZ
 if(sig.s6.active && sig.s6.direction !== 'neutral'){
  const ag = dirAgreesWith(targetDir, sig.s6.direction);
  if(ag !== null){
   comp.push({key:'GZ', weight:W.GZ, contrib: ag * sig.s6.strength, coverage:1, label: sig.s6.lbl});
  } else {
   comp.push({key:'GZ', weight:W.GZ, contrib: 0, coverage:0.5});
  }
 } else comp.push({key:'GZ', weight:W.GZ, contrib:0, coverage:0});

 // S10 Differenziali Gol
 let dgPenalty = 0;
 if(sig.s10.active){
  if(sig.s10.significant){
   const ag = dirAgreesWith(targetDir, sig.s10.direction);
   if(ag !== null){
    comp.push({key:'DGT', weight:W.DIFFG, contrib: ag * sig.s10.strength, coverage:1, label:`DGT ${sig.s10.dgt.toFixed(2)}`});
    if(ag < 0) dgPenalty = 0.15;
   } else comp.push({key:'DGT', weight:W.DIFFG, contrib:0, coverage:0.5});
  } else {
   if(targetDir === 'casaSegna' && sig.s10.teamSignals.casaSegna){
    comp.push({key:'DiffC', weight:W.DIFFG, contrib: 0.7, coverage:1, label:`DiffC ${sig.s10.diffC?.toFixed(2)}`});
   } else if(targetDir === 'ospiteSegna' && sig.s10.teamSignals.ospiteSegna){
    comp.push({key:'DiffO', weight:W.DIFFG, contrib: 0.7, coverage:1, label:`DiffO ${sig.s10.diffO?.toFixed(2)}`});
   } else comp.push({key:'DGT', weight:W.DIFFG, contrib:0, coverage:0});
  }
 } else comp.push({key:'DGT', weight:W.DIFFG, contrib:0, coverage:0});

 // S8 Value
 if(sig.s8.active){
  const ag = dirAgreesWith(targetDir, sig.s8.direction);
  if(ag !== null){
   comp.push({key:'VAL', weight:W.VAL, contrib: ag * sig.s8.strength, coverage:1, label:`Spread ${sig.s8.strength.toFixed(2)}`});
  } else comp.push({key:'VAL', weight:W.VAL, contrib:0, coverage:0.3});
 } else comp.push({key:'VAL', weight:W.VAL, contrib:0, coverage:0});

 // S5 Stats IA
 if(sig.s5.active && sig.s5.strength > 0){
  const ag = dirAgreesWith(targetDir, sig.s5.direction);
  if(ag !== null){
   comp.push({key:'IA', weight:W.IA, contrib: ag * sig.s5.strength, coverage:1, label:`IA ${sig.s5.details.winner}`});
  } else comp.push({key:'IA', weight:W.IA, contrib:0, coverage:0.3});
 } else comp.push({key:'IA', weight:W.IA, contrib:0, coverage:0});

 // S9
 if(sig.s9.active){
  comp.push({key:'PL', weight:W.PL, contrib: 0, coverage:0.5});
 } else comp.push({key:'PL', weight:W.PL, contrib:0, coverage:0});

 // Calcolo
 const W_eff = comp.reduce((s,c) => s + c.weight*c.coverage, 0);
 if(W_eff <= 0){
  return {confidence:0, components:comp, coverage:0, conflictPenalty:0, capped:false, capReason:''};
 }
 const score_raw = comp.reduce((s,c) => s + c.weight*c.coverage*c.contrib, 0) / W_eff;
 const score_base = 50 + 50 * score_raw;
 const activeContribs = comp.filter(c => c.coverage > 0).map(c => c.contrib);
 const activeWeights = comp.filter(c => c.coverage > 0).map(c => c.weight*c.coverage);
 const sigma = stdW(activeContribs, activeWeights);
 const penalty = CONFLICT_LAMBDA * sigma;
 const W_total = Object.values(W).reduce((s,x) => s+x, 0);
 const cov_ratio = W_eff / W_total;
 const cov_factor = COV_FLOOR + (1 - COV_FLOOR) * cov_ratio;
 let score = score_base * cov_factor - penalty;
 if(dgPenalty > 0) score -= dgPenalty * 100 * 0.4;
 let capped = false, capReason = '';
 if(sig.s10.active && sig.s10.significant){
  const ag = dirAgreesWith(targetDir, sig.s10.direction);
  if(ag === -1 && score > 70){ score = 70; capped = true; capReason = 'DGT contraria'; }
 }
 if(sig.s10.active && sig.s10.dropDir === 'contra' && score > 60){
  score = 60; capped = true; capReason = 'Drop quota contrario';
 }
 if(cov_ratio < 0.5 && score > 70){
  score = 70; capped = true; capReason = 'Coverage <50%';
 }
 if(sig.s10.active && sig.s10.dropDir === 'pro') score += 4;
 score = clamp(score, 0, 100);
 return {
  confidence: Math.round(score),
  components: comp,
  coverage: cov_ratio,
  conflictPenalty: penalty,
  capped, capReason,
  score_raw, score_base, cov_factor
 };
}

/* ==================== TEMPLATE NARRATIVI A-G ==================== */
function topContributors(components, n=3){
 return components
  .filter(c => c.coverage > 0 && c.contrib > 0.05)
  .sort((a,b) => (Math.abs(b.contrib)*b.weight) - (Math.abs(a.contrib)*a.weight))
  .slice(0, n);
}
function topConflicts(components, n=1){
 return components
  .filter(c => c.coverage > 0 && c.contrib < -0.05)
  .sort((a,b) => (Math.abs(b.contrib)*b.weight) - (Math.abs(a.contrib)*a.weight))
  .slice(0, n);
}

function buildNarrative(rec){
 const c = rec.confidence;
 const m = rec.market;
 const match = rec.match;
 const odds = rec.odds;
 const stake = rec.stake;
 const stakePct = rec.stakePct;
 const tops = topContributors(rec.components, 3);
 const conflicts = topConflicts(rec.components, 1);
 const sig = rec.sig;
 const dgt = sig.s10 && sig.s10.dgt;
 const drop = sig.s10 && sig.s10.drop;

 let template = 'D';
 if(c >= 82 && rec.hasM1) template = 'A';
 else if(rec.dir === 'under' && sig.s10.active && sig.s10.significant && sig.s10.dgt > 0.8) template = 'B';
 else if(rec.dir === 'casaSegna' || rec.dir === 'ospiteSegna') template = 'C';
 else if(rec.cluster) template = 'E';
 else if(c < 60) template = 'F';
 else if(rec.dir === 'over' && sig.s10.active && sig.s10.significant && sig.s10.dgt < -0.8) template = 'B2';

 const reasonStr = tops.map(t => t.label || t.key).join('; ');
 const conflictStr = conflicts.length ? `Attenzione: ${conflicts[0].label || conflicts[0].key} contro` : '';

 if(template === 'A'){
  return `🏆 BET OF THE DAY · ${match} · ${m} a quota ${odds?.toFixed(2)}. ${reasonStr}. ${conflictStr || 'Nessun segnale contrario significativo.'} Confidence ${c}/100, stake consigliato ${stakePct?.toFixed(1)}% (${fmtEur(stake)}).`;
 }
 if(template === 'B'){
  return `${match}. ${m} a quota ${odds?.toFixed(2)}. Le squadre stanno segnando sopra la media consolidata (DGT ${dgt?.toFixed(2)}, sovrafrequenza): la regressione alla media suggerisce meno gol del trend recente. ${reasonStr}. Confidence ${c}/100, stake ${stakePct?.toFixed(1)}% (${fmtEur(stake)}).`;
 }
 if(template === 'B2'){
  return `${match}. ${m} a quota ${odds?.toFixed(2)}. Le squadre stanno segnando sotto la media consolidata (DGT ${dgt?.toFixed(2)}, sottofrequenza): la regressione alla media suggerisce più gol del trend recente. ${reasonStr}. Confidence ${c}/100, stake ${stakePct?.toFixed(1)}% (${fmtEur(stake)}).`;
 }
 if(template === 'C'){
  const team = rec.dir === 'casaSegna' ? 'casa' : 'ospite';
  const diffVal = rec.dir === 'casaSegna' ? sig.s10?.diffC : sig.s10?.diffO;
  const diffPart = diffVal !== null && diffVal !== undefined ? ` (Diff ${diffVal.toFixed(2)})` : '';
  return `${match}. ${m} a quota ${odds?.toFixed(2)}. La squadra ${team} sta segnando sotto la media${diffPart}: profilo offensivo da rimbalzo. ${reasonStr}. Confidence ${c}/100, stake ${stakePct?.toFixed(1)}% (${fmtEur(stake)}).`;
 }
 if(template === 'D'){
  const dropPart = drop !== null && drop !== undefined && Math.abs(drop) > 0.03 ? ` Quota scesa ${(drop*100).toFixed(1)}% da Qr a QrL (money flow ${drop>0?'pro':'contra'}).` : '';
  return `${match}. ${m} a quota ${odds?.toFixed(2)}. ${reasonStr}.${dropPart} Confidence ${c}/100, stake ${stakePct?.toFixed(1)}% (${fmtEur(stake)}).`;
 }
 if(template === 'E'){
  const cl = rec.cluster.map(x => `${x.score} (${x.perc.toFixed(0)}%)`).join(' + ');
  const pCum = rec.cluster.reduce((s,x)=>s+x.perc, 0);
  return `${match}. Cluster Correct Score: ${cl}. Probabilità cumulata ${pCum.toFixed(0)}%. Stake ${stakePct?.toFixed(1)}% diviso fra i risultati. Confidence ${c}/100.`;
 }
 if(template === 'F'){
  return `${match}. ${m}: segnali deboli (Confidence ${c}/100, copertura ${(rec.coverage*100).toFixed(0)}%). Skip consigliato.`;
 }
 return `${match}. ${m} a quota ${odds?.toFixed(2)}. Confidence ${c}/100.`;
}

/* ==================== KELLY FRAZIONARIO + SHRINKAGE ==================== */
function kellyStake(p, odds, opts={}){
 const fraction = opts.fraction !== undefined ? opts.fraction : S.bankroll.kellyFraction;
 const cap = opts.cap !== undefined ? opts.cap : S.bankroll.capPct;
 const bankroll = opts.bankroll !== undefined ? opts.bankroll : S.bankroll.segregated;
 if(!odds || odds <= 1.01) return {pct:0, eur:0, edge:0, fStar:0};
 const b = odds - 1;
 const pImpl = 1 / odds;
 const alpha = clamp(0.4 + 0.6 * (opts.confidence||50)/100, 0.4, 1.0);
 const pShrunk = alpha * p + (1 - alpha) * pImpl;
 const fStar = (b * pShrunk - (1 - pShrunk)) / b;
 if(fStar <= 0) return {pct:0, eur:0, edge: pShrunk - pImpl, fStar:0, pShrunk};
 let pct = fraction * fStar;
 if(S.bankroll.afterLossActive) pct *= 0.75;
 pct = clamp(pct, 0, cap);
 const eur = round(pct * bankroll, 2);
 const edge = pShrunk - pImpl;
 return {pct, eur, edge, fStar, pShrunk};
}

/* ==================== 10 CRITERI ANTI-SCOMMESSA ==================== */
function applyTenFilters(rec){
 const reasons = [];
 if(rec.coverage < 0.5) reasons.push('coverage <50%');
 if(rec.confidence < 60) reasons.push('confidence <60');
 if(!rec.odds || rec.odds < 1.20 || rec.odds > 15) reasons.push('quota fuori range');
 if(rec.kelly.fStar <= 0) reasons.push('edge negativo');
 if(rec.kelly.pct === 0) reasons.push('stake zero');
 if(rec.sig.s10.active && rec.sig.s10.dropDir === 'contra') reasons.push('drop quota contrario');
 if(rec.dir === 'over' && rec.sig.s7 && rec.sig.s7.np < 8) reasons.push('NP DataMining <8');
 const today = new Date().toDateString();
 if(S.bankroll.startDay !== today){ S.bankroll.startDay = today; S.bankroll.pl_day = 0; }
 if(S.bankroll.startWeek !== startOfWeekISO()){ S.bankroll.startWeek = startOfWeekISO(); S.bankroll.pl_week = 0; }
 const stopDay = -0.10 * S.bankroll.total;
 const stopWeek = -0.20 * S.bankroll.total;
 if(S.bankroll.pl_day < stopDay) reasons.push('stop-loss giornaliero attivo');
 if(S.bankroll.pl_week < stopWeek) reasons.push('stop-loss settimanale attivo');
 const conflicts = topConflicts(rec.components, 3);
 if(conflicts.length >= 2) reasons.push('2+ segnali contrari');
 return { skip: reasons.length > 0, reasons };
}

/* ==================== CORRELATION SCORE ==================== */
const CONFLICT_PAIRS = new Set([
 'Ov 2.5|U 2.5', 'U 2.5|Ov 2.5',
 'GG|U 2.5', 'U 2.5|GG',
 'MG 2-4|Ov 2.5', 'Ov 2.5|MG 2-4'
]);
const COMPAT_PAIRS = new Set([
 'GG|Ov 2.5', 'Ov 2.5|GG',
 'Ov 0.5 PT|Ov 2.5', 'Ov 2.5|Ov 0.5 PT',
 'Casa Segna|GG', 'GG|Casa Segna',
 'Ospite Segna|GG', 'GG|Ospite Segna'
]);
function pairKey(a,b){ return a + '|' + b; }
function sharesTeam(matchA, matchB){
 const sa = (matchA._key || '').split(' - ');
 const sb = (matchB._key || '').split(' - ');
 if(sa.length<2 || sb.length<2) return false;
 return sa[0]===sb[0] || sa[0]===sb[1] || sa[1]===sb[0] || sa[1]===sb[1];
}
function correlationScore(recA, recB){
 if(recA._key === recB._key){
  if(CONFLICT_PAIRS.has(pairKey(recA.market, recB.market))) return 1.0;
  if(COMPAT_PAIRS.has(pairKey(recA.market, recB.market))) return 0.6;
  return 0.5;
 }
 let s = 0;
 if(recA.lega && recB.lega && recA.lega === recB.lega) s += 0.30;
 const tA = timeVal(recA.ora), tB = timeVal(recB.ora);
 if(Math.abs(tA - tB) <= 30) s += 0.20;
 if(recA.market === recB.market) s += 0.15;
 if(sharesTeam(recA, recB)) s += 0.50;
 return Math.min(s, 0.99);
}

/* ==================== PORTFOLIO ENGINE ==================== */
function buildAllRecs(){
 const L = buildLookups();
 const universe = buildUniverse(L);
 const matches = [];
 for(const m of universe){
  const sig = extractSignals(L, m._key);
  const minCov = (sig.s7.active?1:0) + (sig.s2.active?1:0) + (sig.s10.active?1:0);
  if(minCov === 0) continue;
  const candidates = enumerateMarkets(sig, L, m._key);
  if(!candidates.length) continue;
  const recs = [];
  for(const cand of candidates){
   const odds = operationalOdds(cand.mkt, sig, L, m._key);
   if(cand.mkt !== 'CS Cluster' && (!odds || odds < 1.20)) continue;
   const conf = computeConfidence(cand, sig, L, m._key);
   let oddsUsed = odds;
   if(cand.mkt === 'CS Cluster' && cand.cluster){
    const pAvg = cand.cluster.reduce((s,x)=>s+x.perc,0)/cand.cluster.length/100;
    oddsUsed = pAvg > 0 ? 1/pAvg : null;
   }
   const pModel = clamp(conf.confidence/100 * 0.85 + 0.05, 0.05, 0.95);
   const kelly = oddsUsed ? kellyStake(pModel, oddsUsed, {confidence: conf.confidence}) : {pct:0, eur:0, edge:0, fStar:0};
   const rec = {
    _key: m._key,
    match: m.evento,
    ora: m.ora || (L.ggov25.get(m._key)?.ora || ''),
    lega: m.lega || (L.ggov25.get(m._key)?.lega || L.ia.get(m._key)?.lega || ''),
    market: cand.mkt,
    dir: cand.dir,
    side: cand.side,
    cluster: cand.cluster,
    odds: oddsUsed,
    confidence: conf.confidence,
    coverage: conf.coverage,
    components: conf.components,
    capped: conf.capped, capReason: conf.capReason,
    pModel,
    kelly,
    stake: kelly.eur,
    stakePct: kelly.pct * 100,
    edge: kelly.edge * 100,
    sig,
    hasM1: !!(sig.s1.m1 || sig.s2.m1 || (sig.s3.m1o && cand.dir==='over') || (sig.s3.m1u && cand.dir==='under') || (sig.s4.m1c && cand.side==='casa') || (sig.s4.m1o && cand.side==='ospite'))
   };
   const filt = applyTenFilters(rec);
   rec.skip = filt.skip;
   rec.skipReasons = filt.reasons;
   rec.narrative = buildNarrative(rec);
   recs.push(rec);
  }
  if(recs.length){
   recs.sort((a,b) => b.confidence - a.confidence);
   matches.push({ match: m, sig, recs, top: recs[0] });
  }
 }
 matches.sort((a,b) => b.top.confidence - a.top.confidence);
 return matches;
}

function buildTopSingles(allMatches){
 const pool = [];
 for(const m of allMatches){
  for(const r of m.recs){
   if(r.skip) continue;
   if(r.confidence < 65) continue;
   if(!r.odds || r.odds < 1.70 || r.odds > 1.99) continue;
   if(r.odds < 1.75 && r.edge < 2) continue;
   pool.push(r);
  }
 }
 pool.sort((a,b) => (b.confidence + b.edge*1.5) - (a.confidence + a.edge*1.5));
 const seen = new Set();
 const out = [];
 for(const r of pool){
  if(seen.has(r._key)) continue;
  seen.add(r._key);
  out.push(r);
  if(out.length >= 8) break;
 }
 return out;
}

function buildSmartDouble(allMatches){
 const pool = [];
 for(const m of allMatches){
  for(const r of m.recs){
   if(r.skip) continue;
   if(r.confidence < 60) continue;
   if(!r.odds || r.odds < 1.30 || r.odds > 1.85) continue;
   pool.push(r);
  }
 }
 const dedup = {};
 pool.forEach(r => { if(!dedup[r._key] || dedup[r._key].confidence < r.confidence) dedup[r._key] = r; });
 const cands = Object.values(dedup);
 const out = [];
 for(let i=0; i<cands.length; i++){
  for(let j=i+1; j<cands.length; j++){
   const a = cands[i], b = cands[j];
   const corr = correlationScore(a, b);
   if(corr > 0.35) continue;
   const total = a.odds * b.odds;
   if(total < 2.00 || total > 2.50) continue;
   const pJoint = a.pModel * b.pModel;
   const ev = pJoint * total - 1;
   if(ev <= 0) continue;
   const score = ev * Math.min(a.confidence, b.confidence) / 100;
   out.push({legs:[a,b], totalOdds:total, pJoint, ev, corr, score, ev_pct: ev*100});
  }
 }
 out.sort((x,y) => y.score - x.score);
 return out.slice(0, 3);
}

function buildSmartTriple(allMatches){
 const pool = [];
 for(const m of allMatches){
  for(const r of m.recs){
   if(r.skip) continue;
   if(r.confidence < 60) continue;
   if(!r.odds || r.odds < 1.30 || r.odds > 1.90) continue;
   pool.push(r);
  }
 }
 const dedup = {};
 pool.forEach(r => { if(!dedup[r._key] || dedup[r._key].confidence < r.confidence) dedup[r._key] = r; });
 const cands = Object.values(dedup).sort((a,b) => b.confidence - a.confidence).slice(0, 14);
 const out = [];
 outer:
 for(let i=0; i<cands.length; i++){
  for(let j=i+1; j<cands.length; j++){
   for(let k=j+1; k<cands.length; k++){
    const a = cands[i], b = cands[j], c = cands[k];
    const corrAB = correlationScore(a,b);
    const corrAC = correlationScore(a,c);
    const corrBC = correlationScore(b,c);
    if(Math.max(corrAB, corrAC, corrBC) > 0.35) continue;
    const total = a.odds * b.odds * c.odds;
    if(total < 3.00 || total > 5.00) continue;
    const pJoint = a.pModel * b.pModel * c.pModel;
    const ev = pJoint * total - 1;
    if(ev <= 0) continue;
    if(pJoint < 0.20 || pJoint > 0.40) continue;
    const score = ev * Math.min(a.confidence, b.confidence, c.confidence) / 100;
    out.push({legs:[a,b,c], totalOdds:total, pJoint, ev, score, ev_pct: ev*100});
    if(out.length > 50) break outer;
   }
  }
 }
 out.sort((x,y) => y.score - x.score);
 return out.slice(0, 1);
}

function buildValueBets(allMatches){
 const out = [];
 for(const m of allMatches){
  for(const r of m.recs){
   if(r.skip && !r.skipReasons.includes('confidence <60')) continue;
   if(r.confidence < 55) continue;
   if(!r.odds || r.odds < 1.40 || r.odds > 8) continue;
   if(r.edge < 5) continue;
   const np = r.sig?.s7?.np || 0;
   if(np < 15) continue;
   out.push(r);
  }
 }
 out.sort((a,b) => b.edge - a.edge);
 const seen = new Set();
 const fin = [];
 for(const r of out){
  if(seen.has(r._key)) continue;
  seen.add(r._key);
  fin.push(r);
  if(fin.length >= 6) break;
 }
 return fin;
}

/* ==================== ORCHESTRATORE DECISION ENGINE ==================== */
function runDecisionEngine(){
 try {
  const allMatches = buildAllRecs();
  const topSingles = buildTopSingles(allMatches);
  const smartDoubles = buildSmartDouble(allMatches);
  const smartTriples = buildSmartTriple(allMatches);
  const valueBets = buildValueBets(allMatches);
  const hero = topSingles[0] || null;
  const shortlist = topSingles.slice(1, 4);
  S.output = {
   computedAt: new Date().toISOString(),
   matchesCount: allMatches.length,
   allMatches,
   topSingles,
   smartDoubles,
   smartTriples,
   valueBets,
   hero,
   shortlist
  };
  bus.emit('data:recomputed');
 } catch(e){
  console.error('Decision engine error', e);
  showToast('Errore nel calcolo: '+e.message, 'err');
 }
}

 if(b.startWeek !== startOfWeekISO()){ b.startWeek = startOfWeekISO(); b.pl_week = 0; }
 const dayPctWarn = b.pl_day < -0.05 * b.total;
 const dayPctErr  = b.pl_day < -0.10 * b.total;
 const weekPctErr = b.pl_week < -0.20 * b.total;
 const cards = `<div class="bk-cards">
  <div class="bk-card"><div class="lbl">Bankroll totale</div><div class="vl">${fmtEur(b.total)}</div></div>

 </div>`;
 const warning = (dayPctErr || weekPctErr) ? `<div class="err-box">🛑 ${dayPctErr?'Stop-loss giornaliero −10% raggiunto. Scommesse bloccate fino a domani.':''}${weekPctErr?'Stop-loss settimanale −20% raggiunto. Rivedi il modello prima di riprendere.':''}</div>` :
  dayPctWarn ? `<div class="warn-box">⚠️ Sei sopra il −5% giornaliero. Resta attento al cap del −10%.</div>` : '';
 const afterLossBox = b.afterLossActive ? `<div class="warn-box">📉 Modalità after-loss attiva: gli stake suggeriti dal Kelly sono ridotti del 25%.</div>` : '';
 const ctrl = `<div class="bk-ctrl">
  <h3>⚙️ Configurazione bankroll</h3>
  <div class="bk-row"><label>Bankroll totale (€)</label><input type="number" id="bkTotal" value="${b.total}" min="10" max="100000" step="10"></div>
  <div class="bk-row"><label>Segregato (€)</label><input type="number" id="bkSeg" value="${b.segregated}" min="10" max="100000" step="10"></div>
  <div class="bk-row">
   <label>Frazione Kelly</label>
   <input type="range" id="kellyFrac" min="0.10" max="0.50" step="0.05" value="${b.kellyFraction}">
   <span class="out" id="kellyFracOut">${b.kellyFraction.toFixed(2)}</span>
  </div>
  <div class="bk-row">
   <label>Cap stake max %</label>
   <input type="range" id="capPct" min="0.01" max="0.10" step="0.005" value="${b.capPct}">
   <span class="out" id="capPctOut">${(b.capPct*100).toFixed(1)}%</span>
  </div>
  <div class="bk-row">
   <label>After-loss (riduce 25%)</label>
   <select id="afterLossSel">
    <option value="false" ${!b.afterLossActive?'selected':''}>Disattivo</option>
    <option value="true" ${b.afterLossActive?'selected':''}>Attivo</option>
   </select>
  </div>
  <div class="bk-row" style="border-top:1px solid var(--brd1);padding-top:10px;margin-top:10px">
   <button class="btn btn-primary" id="bkSave">💾 Salva configurazione</button>
   <button class="btn btn-ghost" id="bkResetWeek">🔄 Reset P/L settimana</button>
   <button class="btn btn-ghost" style="color:var(--err);border-color:rgba(248,113,113,.3)" id="bkResetAll">⚠️ Reset bankroll</button>
  </div>
 </div>`;
 // Lookup table edge × confidence
 const edges = [3, 5, 8, 12, 18];
 const confs = [60, 70, 80, 90];
 let table = `<table class="lookup"><thead><tr><th>Edge ↓ / Conf →</th>${confs.map(c=>`<th>${c}-${c+9}</th>`).join('')}</tr></thead><tbody>`;
 edges.forEach((e,ei) => {
  const max = ei < edges.length-1 ? edges[ei+1] : 25;
  table += `<tr><td>${e}-${max}%</td>`;
  confs.forEach(c => {
   const odds = 1.90;
   const pImpl = 1/odds;
   const p = pImpl + (e/100);
   const r = kellyStake(p, odds, {confidence:c, fraction:b.kellyFraction, cap:b.capPct, bankroll:100});
   const pct = r.pct * 100;
   const cls = pct >= 3 ? 'hl' : '';
   table += `<td class="${cls}">${pct.toFixed(1)}%</td>`;
  });
  table += '</tr>';
 });
 table += '</tbody></table>';
 main.innerHTML = warning + afterLossBox + cards + ctrl + `<div class="str-sec"><h3>📊 Tabella stake suggerito (% bankroll)</h3><p>Per ogni combinazione edge × confidence viene calcolato lo stake con la frazione Kelly attuale (${b.kellyFraction.toFixed(2)}, cap ${(b.capPct*100).toFixed(1)}%).</p>${table}</div>`;
}

/* ==================== TICKET ACTIONS ==================== */
function findRecBy(key, market){
 if(!S.output) return null;
 for(const m of S.output.allMatches){
  if(m.match._key === key){
   for(const r of m.recs){
    if(r.market === market) return r;
   }
  }
 }
 return null;
}

function addToTicket(key, market){
 const rec = findRecBy(key, market);
 if(!rec){ showToast('Pick non trovata', 'err'); return; }
 if(S.ticket.legs.length >= 5){ showToast('Max 5 leg per schedina', 'err'); return; }
 if(S.ticket.legs.find(l => l._key === key)){ showToast('Match già in schedina', 'err'); return; }
 // Check correlation con leg esistenti
 for(const ex of S.ticket.legs){
  const corr = correlationScore(ex, rec);
  if(corr > 0.35){
   if(!confirm(`Attenzione: questa pick ha correlazione ${(corr*100).toFixed(0)}% con "${ex.match}". Vuoi aggiungerla comunque?`)) return;
  }
 }
 S.ticket.legs.push({
  _key: rec._key, match: rec.match, market: rec.market, odds: rec.odds,
  ora: rec.ora, lega: rec.lega, dir: rec.dir, side: rec.side,
  pModel: rec.pModel, confidence: rec.confidence
 });
 if(S.ticket.legs.length === 1){
  // Imposta stake suggerito Kelly per la prima leg
  S.ticket.stake = Math.max(1, Math.round(rec.stake));
 }
 schedulePersist();
 showToast('Aggiunto alla schedina', 'ok');
 render();
}

function addComboToTicket(type, idx){
 const o = S.output;
 if(!o) return;
 const combo = type === 'tris' ? o.smartTriples[idx] : o.smartDoubles[idx];
 if(!combo) return;
 S.ticket.legs = combo.legs.map(l => ({
  _key: l._key, match: l.match, market: l.market, odds: l.odds,
  ora: l.ora, lega: l.lega, dir: l.dir, side: l.side,
  pModel: l.pModel, confidence: l.confidence
 }));
 const stakeJoint = round(S.bankroll.segregated * 0.02 * (combo.score+1), 2);
 S.ticket.stake = Math.max(1, Math.round(stakeJoint));
 S.ui.tab = 'schedina';
 schedulePersist();
 showToast(`${type==='tris'?'Tris':'Doppia'} caricata in schedina`, 'ok');
 render();
}

function removeLeg(idx){
 S.ticket.legs.splice(idx,1);
 schedulePersist();
 render();
}

function clearTicket(){
 if(!S.ticket.legs.length) return;
 if(!confirm('Svuotare la schedina corrente?')) return;
 S.ticket.legs = [];
 S.ticket.stake = 10;
 schedulePersist();
 render();
}

function confirmTicket(){
 if(!S.ticket.legs.length) return;
 const totalOdds = S.ticket.legs.reduce((s,l) => s * (l.odds||1), 1);
 const tipo = S.ticket.legs.length === 1 ? 'Singola' : S.ticket.legs.length === 2 ? 'Doppia' : S.ticket.legs.length === 3 ? 'Tris' : `Multipla x${S.ticket.legs.length}`;
 const entry = {
  id: 'h_' + Date.now() + '_' + Math.random().toString(36).slice(2,7),
  savedAt: new Date().toISOString(),
  tipo,
  legs: S.ticket.legs.slice(),
  totalOdds,
  stake: S.ticket.stake,
  status: 'open',
  profit: 0
 };
 S.history.unshift(entry);
 S.ticket.legs = [];
 S.ticket.stake = 10;
 schedulePersist();
 showToast('Pick salvata nello storico', 'ok');
 S.ui.tab = 'storico';
 render();
}

function setHistStatus(id, status){
 const item = S.history.find(x => x.id === id);
 if(!item) return;
 item.status = status;
 if(status === 'won') item.profit = item.stake * item.totalOdds - item.stake;
 else if(status === 'lost') item.profit = -item.stake;
 else item.profit = 0;
 // Aggiorna bankroll
 recomputeBankrollPL();
 schedulePersist();
 render();
}

function removeHist(id){
 if(!confirm('Eliminare definitivamente questa pick dallo storico?')) return;
 S.history = S.history.filter(x => x.id !== id);
 recomputeBankrollPL();
 schedulePersist();
 render();
}

function recomputeBankrollPL(){
 const today = new Date().toDateString();
 const startWeek = startOfWeekISO();
 let pld = 0, plw = 0;
 S.history.forEach(h => {
  if(h.status === 'open') return;
  const d = new Date(h.savedAt);
  if(d.toDateString() === today) pld += h.profit || 0;
  if(d.toISOString() >= startWeek) plw += h.profit || 0;
 });
 S.bankroll.pl_day = pld;
 S.bankroll.pl_week = plw;
}

/* ==================== PERSISTENZA LOCALSTORAGE ==================== */
let saveTimer = null;
function schedulePersist(){
 clearTimeout(saveTimer);
 saveTimer = setTimeout(persistState, 400);
}

function persistState(){
 try {
  const toSave = {
   version: VERSION,
   savedAt: new Date().toISOString(),
   bankroll: S.bankroll,
   ticket: S.ticket,
   history: S.history,
   ui: { tab: S.ui.tab, uploadOpen: S.ui.uploadOpen }
  };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(toSave));
 } catch(e){
  console.warn('Persist failed', e);
 }
}

function loadState(){
 try {
  const raw = localStorage.getItem(STORAGE_KEY);
  if(!raw) return;
  const obj = JSON.parse(raw);
  if(!obj || obj.version !== VERSION) return;
  if(obj.bankroll) Object.assign(S.bankroll, obj.bankroll);
  if(obj.ticket) Object.assign(S.ticket, obj.ticket);
  if(Array.isArray(obj.history)) S.history = obj.history;
  if(obj.ui) Object.assign(S.ui, obj.ui);
  recomputeBankrollPL();
 } catch(e){
  console.warn('Load state failed', e);
 }
}
