<!DOCTYPE html>

<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="color-scheme" content="light only">
<meta name="supported-color-schemes" content="light">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#FFFFFF">
<meta name="format-detection" content="telephone=no, date=no, address=no, email=no">
<meta name="application-name" content="Match Analyzer Pro">
<title>Match Analyzer Pro - Fase 5</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
/* ============= RESET E COLORI BASE ============= */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background-color: #F5F7FA !important;
  color: #1A1F2E !important;
  -webkit-text-size-adjust: 100%;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}
html { font-size: 15px; color-scheme: light; }
body {
  min-height: 100vh;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
}
button, input, select, textarea { font: inherit; color: inherit; }
button { border: none; background: none; cursor: pointer; }

/* ============= LAYOUT BASE ============= */
.app {
max-width: 940px;
margin: 0 auto;
padding: 14px 12px 120px;
background-color: #F5F7FA;
}

/* ============= HEADER ============= */
.hdr {
display: flex;
align-items: flex-start;
justify-content: space-between;
gap: 12px;
padding: 14px 4px 14px;
margin-bottom: 14px;
border-bottom: 2px solid #E2E8F0;
flex-wrap: wrap;
}
.hdr-l h1 {
font-size: 1.5rem;
font-weight: 800;
color: #0F172A;
letter-spacing: -0.5px;
line-height: 1.15;
margin: 0;
}
.hdr-l h1 span { color: #16A34A; }
.hdr-l .sub {
font-weight: 500;
font-size: 0.82rem;
color: #64748B;
margin-top: 4px;
}
.hdr-r {
display: flex;
gap: 10px;
flex-wrap: wrap;
}
.bk-mini {
padding: 10px 14px;
background-color: #FFFFFF;
border: 2px solid #CBD5E1;
border-radius: 10px;
font-family: ‘JetBrains Mono’, monospace;
font-weight: 700;
font-size: 0.95rem;
color: #0F172A;
min-width: 110px;
box-shadow: 0 1px 3px rgba(15,23,42,0.06);
}
.bk-mini .lbl {
display: block;
font-family: ‘Inter’, sans-serif;
font-weight: 700;
font-size: 0.65rem;
color: #64748B;
text-transform: uppercase;
letter-spacing: 0.6px;
margin-bottom: 3px;
}
.bk-mini.pos { color: #16A34A; border-color: #86EFAC; background-color: #F0FDF4; }
.bk-mini.neg { color: #DC2626; border-color: #FCA5A5; background-color: #FEF2F2; }

/* ============= NAV TAB ============= */
.nav {
display: flex;
gap: 6px;
margin-bottom: 14px;
overflow-x: auto;
padding: 6px;
background-color: #FFFFFF;
border: 2px solid #E2E8F0;
border-radius: 12px;
box-shadow: 0 1px 3px rgba(15,23,42,0.05);
scrollbar-width: none;
}
.nav::-webkit-scrollbar { display: none; }
.nav-btn {
padding: 10px 16px;
border-radius: 8px;
font-family: ‘Inter’, sans-serif;
font-weight: 600;
font-size: 0.88rem;
color: #475569;
background-color: transparent;
border: 1px solid transparent;
white-space: nowrap;
flex-shrink: 0;
display: flex;
align-items: center;
gap: 6px;
cursor: pointer;
transition: all 0.15s;
}
.nav-btn:hover {
background-color: #F1F5F9;
color: #0F172A;
}
.nav-btn.active {
background-color: #1E40AF;
color: #FFFFFF;
border-color: #1E40AF;
box-shadow: 0 2px 4px rgba(30,64,175,0.3);
}
.nav-btn .ico { font-size: 1rem; }

/* ============= PANNELLO UPLOAD ============= */
.panel {
background-color: #FFFFFF;
border: 2px solid #E2E8F0;
border-radius: 14px;
padding: 16px;
margin-bottom: 14px;
box-shadow: 0 1px 3px rgba(15,23,42,0.05);
color: #0F172A;
}
.panel-tg {
display: flex;
align-items: center;
justify-content: space-between;
padding: 2px 0;
cursor: pointer;
user-select: none;
}
.panel-tg h3 {
font-size: 1.08rem;
font-weight: 700;
color: #0F172A;
display: flex;
align-items: center;
gap: 8px;
margin: 0;
}
.panel-tg h3 .n {
font-family: ‘JetBrains Mono’, monospace;
font-weight: 700;
font-size: 0.78rem;
color: #1E40AF;
background-color: #DBEAFE;
padding: 4px 10px;
border: 1px solid #93C5FD;
border-radius: 6px;
}
.panel-tg .arrow {
color: #1E40AF;
font-size: 1rem;
padding: 6px 10px;
background-color: #F1F5F9;
border: 1px solid #CBD5E1;
border-radius: 7px;
line-height: 1;
transition: transform 0.2s;
}
.panel-tg.open .arrow {
transform: rotate(180deg);
background-color: #DBEAFE;
border-color: #93C5FD;
}
.panel-body {
max-height: 0;
overflow: hidden;
transition: max-height 0.35s ease;
}
.panel-body.open {
max-height: 4000px;
padding-top: 16px;
}

/* ============= CARD UPLOAD DATASET ============= */
.up-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
gap: 10px;
}
.up-card {
position: relative;
padding: 14px;
border: 2px solid #CBD5E1;
border-radius: 12px;
background-color: #F8FAFC;
display: flex;
flex-direction: column;
gap: 10px;
min-height: 130px;
transition: all 0.15s;
color: #0F172A;
}
.up-card:hover {
border-color: #94A3B8;
background-color: #FFFFFF;
transform: translateY(-1px);
box-shadow: 0 2px 6px rgba(15,23,42,0.08);
}
.up-card.loaded {
border: 2px solid #22C55E;
background-color: #F0FDF4;
}
.up-lbl {
font-weight: 700;
font-size: 0.95rem;
color: #0F172A;
display: flex;
align-items: center;
gap: 8px;
line-height: 1.25;
}
.up-lbl .tag-num {
font-family: ‘JetBrains Mono’, monospace;
font-weight: 700;
font-size: 0.72rem;
color: #1E40AF;
background-color: #DBEAFE;
padding: 3px 10px;
border: 1px solid #93C5FD;
border-radius: 5px;
margin-left: auto;
}
.up-meta {
font-weight: 500;
font-size: 0.83rem;
color: #475569;
line-height: 1.45;
flex: 1;
display: flex;
flex-direction: column;
gap: 4px;
}
.up-meta small {
color: #94A3B8;
font-size: 0.74rem;
}
.up-count {
color: #15803D;
font-weight: 800;
}
.up-nofile {
color: #94A3B8;
font-style: italic;
}
.up-actions {
display: flex;
gap: 8px;
align-items: center;
margin-top: auto;
padding-top: 4px;
position: relative;
z-index: 2;
}
.up-btn {
padding: 9px 16px;
background-color: #1E40AF;
border: 2px solid #1E40AF;
border-radius: 8px;
color: #FFFFFF;
font-weight: 700;
font-size: 0.82rem;
cursor: pointer;
display: inline-flex;
align-items: center;
gap: 5px;
box-shadow: 0 1px 3px rgba(30,64,175,0.3);
transition: all 0.15s;
}
.up-btn:hover {
background-color: #1E3A8A;
border-color: #1E3A8A;
transform: translateY(-1px);
}
.up-btn.clear {
background-color: #FFFFFF;
color: #DC2626;
border-color: #FCA5A5;
box-shadow: none;
}
.up-btn.clear:hover {
background-color: #FEF2F2;
border-color: #DC2626;
}
.up-card input[type=file] {
position: absolute;
inset: 0;
opacity: 0;
cursor: pointer;
z-index: 1;
}

.up-note {
margin-top: 14px;
padding: 12px 14px;
background-color: #F1F5F9;
border: 1px solid #CBD5E1;
border-radius: 10px;
color: #475569;
font-weight: 500;
font-size: 0.82rem;
line-height: 1.6;
}
.up-note code {
font-family: ‘JetBrains Mono’, monospace;
background-color: #FFFFFF;
border: 1px solid #CBD5E1;
padding: 2px 6px;
border-radius: 4px;
color: #1E40AF;
font-size: 0.88em;
}
.up-status {
margin-top: 12px;
padding: 12px 14px;
border-radius: 10px;
font-weight: 600;
font-size: 0.86rem;
border: 1.5px solid transparent;
}
.up-status.ok {
background-color: #F0FDF4;
color: #15803D;
border-color: #86EFAC;
}
.up-status.err {
background-color: #FEF2F2;
color: #B91C1C;
border-color: #FCA5A5;
}

.up-clear-all-wrap {
margin-top: 14px;
display: flex;
justify-content: center;
}
.up-clear-all-btn {
padding: 11px 18px;
background-color: #FEF2F2;
color: #DC2626;
border: 2px solid #FCA5A5;
border-radius: 9px;
font-weight: 700;
font-size: 0.85rem;
cursor: pointer;
}
.up-clear-all-btn:hover {
background-color: #FEE2E2;
border-color: #DC2626;
}

/* ============= GAUGE ============= */
.gauge { position: relative; width: 120px; height: 120px; }
.gauge.sm { width: 72px; height: 72px; }
.gauge svg { transform: rotate(-90deg); }
.gauge .bg-ring { fill: none; stroke: #E2E8F0; stroke-width: 10; }
.gauge .fg-ring {
fill: none;
stroke: #16A34A;
stroke-width: 10;
stroke-linecap: round;
transition: stroke-dashoffset 0.6s ease, stroke 0.3s;
}
.gauge.sm .bg-ring, .gauge.sm .fg-ring { stroke-width: 7; }
.gauge .lbl {
position: absolute;
inset: 0;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
text-align: center;
}
.gauge .lbl .v {
font-family: ‘JetBrains Mono’, monospace;
font-weight: 800;
font-size: 1.4rem;
color: #0F172A;
line-height: 1;
}
.gauge.sm .lbl .v { font-size: 1.05rem; }
.gauge.g-ok .fg-ring { stroke: #16A34A; }
.gauge.g-wa .fg-ring { stroke: #D97706; }
.gauge.g-er .fg-ring { stroke: #DC2626; }

/* ============= SEZIONI ============= */
.sec {
display: flex;
align-items: center;
gap: 10px;
margin: 22px 4px 12px;
padding-bottom: 10px;
border-bottom: 2px solid #E2E8F0;
}
.sec h2 {
font-weight: 700;
font-size: 1.1rem;
color: #0F172A;
display: flex;
align-items: center;
gap: 8px;
margin: 0;
}
.sec .ct {
margin-left: auto;
font-weight: 700;
font-size: 0.78rem;
color: #1E40AF;
background-color: #DBEAFE;
border: 1px solid #93C5FD;
padding: 5px 11px;
border-radius: 7px;
}
.sec .ico { font-size: 1.15rem; }

/* ============= CARD MATCH ============= */
.cards {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
gap: 12px;
}
.card {
background-color: #FFFFFF;
border: 2px solid #E2E8F0;
border-radius: 14px;
padding: 15px;
cursor: pointer;
position: relative;
transition: all 0.15s;
box-shadow: 0 1px 3px rgba(15,23,42,0.06);
color: #0F172A;
}
.card:hover {
border-color: #94A3B8;
transform: translateY(-2px);
box-shadow: 0 4px 12px rgba(15,23,42,0.1);
}
.card-top {
display: flex;
align-items: flex-start;
gap: 12px;
margin-bottom: 11px;
padding-bottom: 11px;
border-bottom: 1px solid #E2E8F0;
}
.card-info { flex: 1; min-width: 0; }
.card-league {
font-weight: 700;
font-size: 0.72rem;
color: #15803D;
margin-bottom: 4px;
text-transform: uppercase;
letter-spacing: 0.5px;
display: flex;
align-items: center;
gap: 7px;
}
.card-league .time { color: #94A3B8; font-weight: 500; letter-spacing: 0; }
.card-match {
font-weight: 700;
font-size: 1rem;
color: #0F172A;
line-height: 1.3;
overflow: hidden;
text-overflow: ellipsis;
white-space: nowrap;
}
.card-body { display: flex; flex-direction: column; gap: 9px; }
.card-market {
font-weight: 700;
font-size: 1rem;
color: #0F172A;
display: flex;
align-items: center;
gap: 7px;
}
.card-market::before { content: “>”; color: #16A34A; font-weight: 800; }
.card-stats {
display: grid;
grid-template-columns: repeat(3, 1fr);
gap: 8px;
padding: 11px;
background-color: #F8FAFC;
border: 1px solid #E2E8F0;
border-radius: 8px;
}
.card-stats .s { display: flex; flex-direction: column; gap: 3px; }
.card-stats .lb {
font-weight: 700;
font-size: 0.62rem;
color: #94A3B8;
text-transform: uppercase;
letter-spacing: 0.5px;
}
.card-stats .vl {
font-family: ‘JetBrains Mono’, monospace;
font-weight: 700;
font-size: 0.95rem;
color: #0F172A;
}
.card-stats .vl.ok { color: #16A34A; }
.card-stats .vl.warn { color: #D97706; }
.card-stats .vl.err { color: #DC2626; }
.card-badges { display: flex; gap: 7px; flex-wrap: wrap; padding: 4px 0; }
.card-foot {
display: flex;
align-items: center;
justify-content: space-between;
gap: 8px;
padding-top: 10px;
border-top: 1px solid #E2E8F0;
margin-top: 4px;
}
.card-foot-l {
font-weight: 600;
font-size: 0.74rem;
color: #64748B;
}

/* ============= BADGE ============= */
.bdg {
padding: 5px 10px;
border-radius: 6px;
font-family: ‘JetBrains Mono’, monospace;
font-weight: 700;
font-size: 0.72rem;
display: inline-flex;
align-items: center;
gap: 4px;
white-space: nowrap;
border: 1.5px solid transparent;
cursor: pointer;
}
.bdg-m1 { background-color: #FEF3C7; color: #B45309; border-color: #FCD34D; }
.bdg-dm-ok { background-color: #DCFCE7; color: #15803D; border-color: #86EFAC; }
.bdg-dm-wa { background-color: #FEF3C7; color: #B45309; border-color: #FCD34D; }
.bdg-dm-er { background-color: #FEE2E2; color: #B91C1C; border-color: #FCA5A5; }
.bdg-val { background-color: #F3E8FF; color: #7E22CE; border-color: #D8B4FE; }
.bdg-gz { background-color: #DBEAFE; color: #1E40AF; border-color: #93C5FD; }
.bdg-neu { background-color: #F1F5F9; color: #475569; border-color: #CBD5E1; }
.bdg-ok { background-color: #DCFCE7; color: #15803D; border-color: #86EFAC; }
.bdg-skip { background-color: #FEE2E2; color: #B91C1C; border-color: #FCA5A5; }

/* Mini buttons */
.mini-btn {
padding: 8px 13px;
background-color: #F1F5F9;
border: 1.5px solid #CBD5E1;
border-radius: 7px;
color: #0F172A;
font-weight: 700;
font-size: 0.76rem;
cursor: pointer;
display: inline-flex;
align-items: center;
gap: 5px;
transition: all 0.15s;
}
.mini-btn:hover {
border-color: #94A3B8;
background-color: #E2E8F0;
}
.mini-btn.primary {
background-color: #1E40AF;
border-color: #1E40AF;
color: #FFFFFF;
}
.mini-btn.primary:hover { background-color: #1E3A8A; border-color: #1E3A8A; }
.mini-btn.ok {
background-color: #DCFCE7;
color: #15803D;
border-color: #86EFAC;
}

.card-conf { display: flex; align-items: center; gap: 10px; }

/* ============= EMPTY ============= */
.empty {
text-align: center;
padding: 48px 24px;
background-color: #FFFFFF;
border: 2px dashed #CBD5E1;
border-radius: 14px;
color: #475569;
}
.empty .ico { font-size: 2.8rem; margin-bottom: 12px; }
.empty p { font-weight: 500; font-size: 0.96rem; line-height: 1.65; max-width: 46ch; margin: 0 auto; }
.empty p.title {
font-weight: 800;
color: #0F172A;
margin-bottom: 10px;
font-size: 1.12rem;
}

/* ============= INFO BOXES ============= */
.info-box {
padding: 13px 15px;
background-color: #DBEAFE;
color: #1E40AF;
border: 1.5px solid #93C5FD;
border-radius: 12px;
font-weight: 600;
font-size: 0.9rem;
line-height: 1.55;
margin-bottom: 12px;
}
.warn-box {
padding: 13px 15px;
background-color: #FEF3C7;
color: #B45309;
border: 1.5px solid #FCD34D;
border-radius: 12px;
font-weight: 600;
font-size: 0.9rem;
line-height: 1.55;
margin-bottom: 12px;
}
.err-box {
padding: 13px 15px;
background-color: #FEE2E2;
color: #B91C1C;
border: 1.5px solid #FCA5A5;
border-radius: 12px;
font-weight: 600;
font-size: 0.9rem;
line-height: 1.55;
margin-bottom: 12px;
}

/* ============= SCHEDINA / TICKET ============= */
.ticket {
background-color: #FFFFFF;
border: 2px solid #E2E8F0;
border-radius: 14px;
padding: 18px;
margin-bottom: 12px;
box-shadow: 0 1px 3px rgba(15,23,42,0.05);
color: #0F172A;
}
.ticket-hdr {
display: flex;
align-items: center;
justify-content: space-between;
padding-bottom: 12px;
border-bottom: 2px solid #E2E8F0;
margin-bottom: 14px;
gap: 10px;
flex-wrap: wrap;
}
.ticket-hdr h3 { font-weight: 700; font-size: 1.12rem; color: #0F172A; margin: 0; }
.ticket-hdr .meta {
font-weight: 600;
font-size: 0.8rem;
color: #1E40AF;
background-color: #DBEAFE;
border: 1px solid #93C5FD;
padding: 5px 11px;
border-radius: 7px;
}
.ticket-leg {
display: flex;
align-items: center;
gap: 10px;
padding: 12px;
background-color: #F8FAFC;
border: 1px solid #E2E8F0;
border-radius: 10px;
margin-bottom: 8px;
}
.ticket-leg .info { flex: 1; min-width: 0; }
.ticket-leg .info .m { font-weight: 700; font-size: 0.95rem; color: #0F172A; margin-bottom: 3px; }
.ticket-leg .info .s { font-weight: 500; font-size: 0.8rem; color: #64748B; }
.ticket-leg .odds {
font-family: ‘JetBrains Mono’, monospace;
font-weight: 800;
font-size: 1.02rem;
color: #15803D;
min-width: 56px;
text-align: right;
padding: 7px 11px;
background-color: #DCFCE7;
border: 1.5px solid #86EFAC;
border-radius: 7px;
}
.ticket-leg .del {
width: 36px;
height: 36px;
border-radius: 8px;
background-color: #FEF2F2;
color: #DC2626;
display: flex;
align-items: center;
justify-content: center;
cursor: pointer;
border: 1.5px solid #FCA5A5;
flex-shrink: 0;
}
.ticket-leg .del:hover { background-color: #FEE2E2; border-color: #DC2626; }
.ticket-total {
display: flex;
justify-content: space-between;
align-items: center;
padding: 13px;
background-color: #F0FDF4;
border: 1.5px solid #86EFAC;
border-radius: 10px;
margin-top: 8px;
}
.ticket-total .t { font-weight: 600; font-size: 0.9rem; color: #475569; }
.ticket-total .v { font-family: ‘JetBrains Mono’, monospace; font-weight: 800; font-size: 1.22rem; color: #15803D; }
.stake-ctrl {
display: flex;
gap: 10px;
align-items: center;
flex-wrap: wrap;
padding: 13px;
background-color: #F8FAFC;
border: 1px solid #E2E8F0;
border-radius: 10px;
margin: 10px 0;
}
.stake-ctrl input[type=number] {
width: 110px;
padding: 11px 13px;
background-color: #FFFFFF;
border: 1.5px solid #CBD5E1;
border-radius: 8px;
color: #0F172A;
font-family: ‘JetBrains Mono’, monospace;
font-weight: 700;
font-size: 0.98rem;
outline: none;
}
.stake-ctrl input:focus { border-color: #1E40AF; box-shadow: 0 0 0 3px rgba(30,64,175,0.15); }
.stake-ctrl .lb { font-weight: 700; font-size: 0.88rem; color: #475569; }

/* ============= BUTTONS ============= */
.btn {
padding: 12px 18px;
border-radius: 10px;
font-weight: 700;
font-size: 0.9rem;
cursor: pointer;
display: inline-flex;
align-items: center;
gap: 6px;
border: 1.5px solid transparent;
transition: all 0.15s;
}
.btn-primary {
background-color: #1E40AF;
color: #FFFFFF;
border-color: #1E40AF;
box-shadow: 0 2px 6px rgba(30,64,175,0.3);
}

  if(ch === '"'){

   else inQ = !inQ;
  } else if(ch === sep && !inQ){
   out.push(cur); cur='';
  } else cur += ch;
 }
 out.push(cur);
 return out.map(x => x.replace(/^"|"$/g,'').trim());
}

function parseCsvLines(text){
 return text.replace(/^\uFEFF/,'').replace(/\r\n?/g,'\n').trim().split('\n').filter(l=>l.trim()!=='');
}

function buildHeaderIndex(headerArr){
 const idx = {};
 headerArr.forEach((h,i) => { idx[h.trim()] = i; });
 return idx;
}

function gCell(row, idx, name){
 const i = idx[name];
 if(i === undefined) return '';
 return (row[i]==null) ? '' : String(row[i]).trim();
}

function parseIA(text){

 const iGGQuota = iGGPerc + 1;

function buildLookups(){
 const L = {
  ov05pt: new Map(), ggov25: new Map(), mg13: new Map(), ia: new Map(),
  qVal: new Map(), gz: new Map(), dm: new Map(), diffg: new Map(),
  plCardByMatch: new Map(), plShotByMatch: new Map()
 };
 (S.datasets.ov05pt||[]).forEach(r => L.ov05pt.set(r._key, r));
 (S.datasets.ggov25||[]).forEach(r => L.ggov25.set(r._key, r));
 (S.datasets.mg13||[]).forEach(r => L.mg13.set(r._key, r));
 (S.datasets.ia||[]).forEach(r => L.ia.set(r._key, r));
 (S.datasets.qVal||[]).forEach(r => L.qVal.set(r._key, r));
 (S.datasets.gz||[]).forEach(r => L.gz.set(r._key, r));
 (S.datasets.dm||[]).forEach(r => L.dm.set(r._key, r));
 (S.datasets.diffg||[]).forEach(r => L.diffg.set(r._key, r));
 (S.datasets.plCard||[]).forEach(r => {
  if(!L.plCardByMatch.has(r._key)) L.plCardByMatch.set(r._key, []);
  L.plCardByMatch.get(r._key).push(r);
 });
 (S.datasets.plShot||[]).forEach(r => {
  if(!L.plShotByMatch.has(r._key)) L.plShotByMatch.set(r._key, []);
  L.plShotByMatch.get(r._key).push(r);
 });
 return L;
}

function buildUniverse(L){
 const map = new Map();
 const upsert = (key, info) => {
  if(!key) return;
  if(!map.has(key)) map.set(key, { _key:key, evento:info.evento||'', ora:info.ora||'', lega:info.lega||'' });
  else {
   const cur = map.get(key);
   if(!cur.lega && info.lega) cur.lega = info.lega;
   if(!cur.ora && info.ora) cur.ora = info.ora;
   if(!cur.evento && info.evento) cur.evento = info.evento;
  }
 };
 L.ggov25.forEach((r,k) => upsert(k,{evento:r.evento, ora:r.ora, lega:r.lega}));
 L.dm.forEach((r,k) => upsert(k,{evento:r.match, ora:r.ora}));
 L.gz.forEach((r,k) => upsert(k,{evento:r.evento, ora:r.ora, lega:r.lega}));
 L.diffg.forEach((r,k) => upsert(k,{evento:r.evento, ora:r.ora}));
 L.ov05pt.forEach((r,k) => upsert(k,{evento:r.evento, ora:r.ora}));
 L.mg13.forEach((r,k) => upsert(k,{evento:r.evento, ora:r.ora}));
 L.ia.forEach((r,k) => upsert(k,{evento:r.evento, ora:r.ora, lega:r.lega}));
 L.qVal.forEach((r,k) => upsert(k,{evento:r.match, ora:r.ora}));
 return Array.from(map.values());
}

function isM1_gg(r){ return r && r.igbc>=M1_THR.gg.igbc && r.igbo>=M1_THR.gg.igbo && r.s12<M1_THR.gg.s12 && r.pgg>=M1_THR.gg.pgg; }
function isM1_o25(r){ return r && r.igbt>=M1_THR.o25.igbt && r.mge>=M1_THR.o25.mge && r.diff<=M1_THR.o25.diff; }
function isM1_u25(r){ return r && r.diff>M1_THR.u25.diffMin && r.mge>M1_THR.u25.mgeLow && r.mge<M1_THR.u25.mgeHi; }
function isM1_mg13c(r){ return r && r.ich>=M1_THR.mg13c.ichLo && r.ich<=M1_THR.mg13c.ichHi && r.varc>=M1_THR.mg13c.varc; }
function isM1_mg13o(r){ return r && r.ica>=M1_THR.mg13o.icaLo && r.ica<=M1_THR.mg13o.icaHi && r.varo>=M1_THR.mg13o.varo; }

function gzMap(gz){
 if(gz===null||gz===undefined) return null;
 if(gz < -1800) return {dir:'under', mkt:'U2.5', p:0.64, lbl:'U2.5 64%'};
 if(gz < -1200) return {dir:'under', mkt:'U3.5', p:0.81, lbl:'U3.5 81%'};
 if(gz > 5000)  return {dir:'over',  mkt:'O2.5', p:0.64, lbl:'Ov2.5 64%'};
 if(gz > 1000)  return {dir:'over',  mkt:'O1.5', p:0.80, lbl:'Ov1.5 80%'};
 if(gz > -200 && gz < 200) return {dir:'over', mkt:'O0.5', p:0.95, lbl:'Ov0.5 95%'};
 return {dir:'neutral', mkt:'-', p:0.5, lbl:'Neutrale'};
}

/* ==================== SIGNALS ==================== */
function signalS1(L, key){
 const r = L.ov05pt.get(key);
 if(!r) return {active:false, coverage:0};
 const m1 = isM1_ov05pt(r);
 let strength = 0;
 if(m1) strength = 0.9;
 else { let s=0; if(r.ind<320) s+=0.35; else if(r.ind<340) s+=0.2; if(r.delta<=-20) s+=0.35; else if(r.delta<=-5) s+=0.2; if(r.diff<0) s+=0.2; strength=s; }
 return {active:true, coverage:1, direction:'ov05pt', strength:clamp(strength,0,1), m1, raw:r, details:{ind:r.ind, delta:r.delta, diff:r.diff, mge:r.mge}};
}
function signalS2(L, key){
 const r = L.ggov25.get(key);
 if(!r) return {active:false, coverage:0};
 const m1 = isM1_gg(r);
 let strength = 0;
 if(m1) strength = 0.9;
 else { let s=0; if(r.igbc>=150) s+=0.25; else if(r.igbc>=100) s+=0.12; if(r.igbo>=150) s+=0.25; else if(r.igbo>=100) s+=0.12; if(r.s12<150) s+=0.2; else if(r.s12<250) s+=0.1; if(r.pgg>=55) s+=0.2; else if(r.pgg>=45) s+=0.1; strength=s; }
 return {active:true, coverage:1, direction:'gg', strength:clamp(strength,0,1), m1, raw:r, details:{igbc:r.igbc, igbo:r.igbo, s12:r.s12, pgg:r.pgg}};
}
function signalS3(L, key){
 const r = L.ggov25.get(key);
 if(!r) return {active:false, coverage:0};
 const m1o = isM1_o25(r), m1u = isM1_u25(r);
 let sO=0, sU=0;
 if(m1o) sO=0.9; else { if(r.igbt>=300) sO+=0.35; else if(r.igbt>=250) sO+=0.18; if(r.mge>=3) sO+=0.3; else if(r.mge>=2.5) sO+=0.15; if(r.diff<=0) sO+=0.2; }
 if(m1u) sU=0.9; else { if(r.diff>1.5) sU+=0.35; else if(r.diff>1) sU+=0.2; if(r.mge>0&&r.mge<2.5) sU+=0.3; else if(r.mge<3&&r.mge>0) sU+=0.15; if(r.igbt<250) sU+=0.15; }
 sO=clamp(sO,0,1); sU=clamp(sU,0,1);
 const dir = sO>=sU?'over':'under';
 return {active:true, coverage:1, direction:dir, strength:Math.max(sO,sU), sO, sU, m1: dir==='over'?m1o:m1u, m1o, m1u, raw:r, details:{igbt:r.igbt, mge:r.mge, diff:r.diff, pgg:r.pgg, qov25:r.qov25}};
}
function signalS4(L, key){
 const r = L.mg13.get(key);
 if(!r) return {active:false, coverage:0};
 const m1c = isM1_mg13c(r), m1o = isM1_mg13o(r);
 let sC=0, sO=0;
 if(m1c) sC=0.9; else { if(r.ich>=300&&r.ich<=400) sC+=0.4; if(r.varc>=30) sC+=0.3; else if(r.varc>=20) sC+=0.15; }
 if(m1o) sO=0.9; else { if(r.ica>=300&&r.ica<=400) sO+=0.4; if(r.varo>=30) sO+=0.3; else if(r.varo>=20) sO+=0.15; }
 const side = sC>=sO?'casa':'ospite';
 return {active:true, coverage:1, direction:'mg13', side, strength:Math.max(sC,sO), sC, sO, m1: side==='casa'?m1c:m1o, m1c, m1o, raw:r, details:{ich:r.ich, ica:r.ica, varc:r.varc, varo:r.varo}};
}
function signalS5(L, key){
 const r = L.ia.get(key);
 if(!r || !r.stats || !r.stats.length) return {active:false, coverage:0};
 const counts = {'1':0, 'X':0, '2':0};
 r.stats.forEach(s => { const dir = String(s.pred).trim().toUpperCase(); if(counts[dir]!==undefined) counts[dir] += s.aff; });
 const winner = Object.keys(counts).sort((a,b)=>counts[b]-counts[a])[0];
 const total = counts['1']+counts['X']+counts['2'];
 const concentration = total>0?counts[winner]/total:0;
 const strength = clamp((r.avgAff/5)*concentration*1.4, 0, 1);
 const dirMap = {'1':'casaWin','X':'pareggio','2':'ospiteWin'};
 return {active:true, coverage:1, direction:dirMap[winner]||'neutral', strength, raw:r, details:{avgAff:r.avgAff, maxAff:r.maxAff, winner, concentration, statsCount:r.stats.length}};
}
function signalS6(L, key){
 const r = L.gz.get(key);
 if(!r || r.gz===null) return {active:false, coverage:0};
 const map = gzMap(r.gz);
 if(!map || map.dir==='neutral') return {active:true, coverage:1, direction:'neutral', strength:0, raw:r, details:{gz:r.gz, lbl:'Neutrale'}};
 return {active:true, coverage:1, direction:map.dir, strength:map.p, mkt:map.mkt, lbl:map.lbl, raw:r, details:{gz:r.gz, lbl:map.lbl, mkt:map.mkt, p:map.p}};
}
function signalS7(L, key){
 const r = L.dm.get(key);
 if(!r) return {active:false, coverage:0};
 const np = r.np||0;
 const npWeight = clamp(np/30, 0, 1);
 const buckets = {'over':r.pOV25, 'under':r.pUN35, 'gg':r.pGG, 'ov15':r.pOV15, 'ov05pt':r.pOV05pt, 'casaSegna':r.pSC, 'ospiteSegna':r.pSO, '1':r.p1, 'X':r.pX, '2':r.p2};
 let bestDir='over', bestVal=0;
 for(const [d,p] of Object.entries(buckets)){ if(p>bestVal){ bestVal=p; bestDir=d; } }
 const strength = clamp((bestVal/100)*(0.4+0.6*npWeight), 0, 1);
 return {active:true, coverage:1, direction:bestDir, strength, np, npWeight, buckets, re:parseREField(r.re), ic:r.ic, rc:r.rc, ro:r.ro, raw:r, details:{np, mge:r.mge, diff:r.diff, ic:r.ic, rc:r.rc, ro:r.ro}};
}
function signalS8(L, key){
 const r = L.qVal.get(key);
 if(!r) return {active:false, coverage:0};
 const isVal = (qR, qDM, sp) => sp>0.15 && qR>1.01 && qR<3 && qDM>0;
 const v1 = isVal(r.r1, r.dm1, r.spread1), vX = isVal(r.rx, r.dmx, r.spreadX), v2 = isVal(r.r2, r.dm2, r.spread2);
 let dir='neutral', strength=0;
 if(v1 && r.spread1>=Math.max(v2?r.spread2:0, vX?r.spreadX:0)){ dir='1'; strength=clamp(r.spread1,0,1); }
 else if(v2 && r.spread2>=(vX?r.spreadX:0)){ dir='2'; strength=clamp(r.spread2,0,1); }
 else if(vX){ dir='X'; strength=clamp(r.spreadX,0,1); }
 return {active:true, coverage:1, direction:dir, strength, v1, vX, v2, np:r.np, raw:r, details:{r1:r.r1, rx:r.rx, r2:r.r2, dm1:r.dm1, dmx:r.dmx, dm2:r.dm2, spread1:r.spread1, spreadX:r.spreadX, spread2:r.spread2}};
}
function signalS9(L, key){
 const cardArr = L.plCardByMatch.get(key)||[];
 const shotArr = L.plShotByMatch.get(key)||[];
 if(!cardArr.length && !shotArr.length) return {active:false, coverage:0};
 let bestCard=null, bestShot=null;
 cardArr.forEach(p => { const sc = (p.amm*0.5)+(p.falli*0.2)+(p.rit*0.3); if(!bestCard||sc>bestCard.score) bestCard={p, score:sc, type:'card'}; });
 shotArr.forEach(p => { const sc = (p.gol*0.6)+(p.tiriPorta*0.25)+(p.rit*0.15); if(!bestShot||sc>bestShot.score) bestShot={p, score:sc, type:'shot'}; });
 let strength=0, direction='neutral';
 if(bestCard && bestCard.score>1.5){ strength=Math.max(strength,clamp(bestCard.score/3,0,1)); direction='cartellini'; }
 if(bestShot && bestShot.score>1.5){ const s=clamp(bestShot.score/3,0,1); if(s>strength){ strength=s; direction='tiri'; } }
 return {active:bestCard!==null||bestShot!==null, coverage:1, direction, strength, bestCard, bestShot, details:{nCard:cardArr.length, nShot:shotArr.length}};
}
function signalS10(L, key){
 const r = L.diffg.get(key);
 if(!r) return {active:false, coverage:0};
 const dgt=r.dgt, diffC=r.diffC, diffO=r.diffO;
 const significant = dgt!==null && Math.abs(dgt)>DIFF_THR.dgt;
 let direction='neutral', strength=0;
 if(significant){ if(dgt>0){ direction='under'; strength=clamp(Math.abs(dgt)/3, 0.3, 1); } else { direction='over'; strength=clamp(Math.abs(dgt)/3, 0.3, 1); } }
 const csSig = diffC!==null && Math.abs(diffC)>DIFF_THR.team;
 const osSig = diffO!==null && Math.abs(diffO)>DIFF_THR.team;
 const teamSignals = {casaSegna: csSig&&diffC<0, noCasaSegna: csSig&&diffC>0, ospiteSegna: osSig&&diffO<0, noOspiteSegna: osSig&&diffO>0};
 let drop=null, dropDir=null;
 if(r.qr && r.qrL && r.qr>0){ drop=(r.qr-r.qrL)/r.qr; if(drop>DIFF_THR.dropOk) dropDir='pro'; else if(drop<-DIFF_THR.dropOk) dropDir='contra'; }
 return {active:true, coverage:1, direction, strength, significant, dgt, diffC, diffO, teamSignals, drop, dropDir, raw:r, details:{dgt, dg:r.dg, diffC, diffO, mge:r.mge, mgu5:r.mgu5, qr:r.qr, qrL:r.qrL, qt:r.qt}};
}
function extractSignals(L, key){
 return {s1:signalS1(L,key), s2:signalS2(L,key), s3:signalS3(L,key), s4:signalS4(L,key), s5:signalS5(L,key), s6:signalS6(L,key), s7:signalS7(L,key), s8:signalS8(L,key), s9:signalS9(L,key), s10:signalS10(L,key)};
}

/* ==================== ENUMERATE MARKETS ==================== */
function enumerateMarkets(sig, L, key){
 const list = [];
 // Soglie più morbide stile Bollamaker
 if(sig.s1.active && sig.s1.strength>0.25) list.push({mkt:'Ov 0.5 PT', dir:'ov05pt'});
 else if(sig.s7.active && sig.s7.buckets.ov05pt>50 && sig.s7.np>=10) list.push({mkt:'Ov 0.5 PT', dir:'ov05pt'});
 if(sig.s2.active && sig.s2.strength>0.25) list.push({mkt:'GG', dir:'gg'});
 else if(sig.s7.active && sig.s7.buckets.gg>52) list.push({mkt:'GG', dir:'gg'});
 if(sig.s3.active){
  if(sig.s3.sO>0.35) list.push({mkt:'Ov 2.5', dir:'over'});
  if(sig.s3.sU>0.35) list.push({mkt:'U 2.5', dir:'under'});
 } else if(sig.s7.active){
  if(sig.s7.buckets.over>52) list.push({mkt:'Ov 2.5', dir:'over'});
  if(sig.s7.buckets.under>55) list.push({mkt:'U 2.5', dir:'under'});
 }
 // Ov 1.5 da S7
 if(sig.s7.active && sig.s7.buckets.ov15>65) list.push({mkt:'Ov 1.5', dir:'ov15'});
 if(sig.s10.active && sig.s10.significant){
  if(sig.s10.direction==='over' && !list.find(x=>x.mkt==='Ov 2.5')) list.push({mkt:'Ov 2.5', dir:'over'});
  if(sig.s10.direction==='under' && !list.find(x=>x.mkt==='U 2.5')) list.push({mkt:'U 2.5', dir:'under'});
 }
 if(sig.s4.active && sig.s4.strength>0.35){
  if(sig.s4.side==='casa') list.push({mkt:'MG 1-3 Casa', dir:'mg13', side:'casa'});
  else list.push({mkt:'MG 1-3 Ospite', dir:'mg13', side:'ospite'});
 }
 const dm = L.dm.get(key);
 if(dm && dm.pSC>=58 && dm.igbc>=140){
  const teamConfirm = sig.s10.active && sig.s10.teamSignals.casaSegna;
  if(teamConfirm || dm.pSC>=68) list.push({mkt:'Casa Segna', dir:'casaSegna'});
 }
 if(dm && dm.pSO>=58 && dm.igbo>=140){
  const teamConfirm = sig.s10.active && sig.s10.teamSignals.ospiteSegna;
  if(teamConfirm || dm.pSO>=68) list.push({mkt:'Ospite Segna', dir:'ospiteSegna'});
 }
 if(dm && dm.pOV15>58 && dm.pUN35>58) list.push({mkt:'MG 2-4', dir:'mg24'});
 if(sig.s8.active && sig.s8.strength>0.15){
  if(sig.s8.v1) list.push({mkt:'1', dir:'1'});
  if(sig.s8.vX) list.push({mkt:'X', dir:'X'});
  if(sig.s8.v2) list.push({mkt:'2', dir:'2'});
 }
 return list;
}

const FIXED_ODDS = {
 'MG 1-3 Casa': 1.30,
 'MG 1-3 Ospite': 1.30,
 'MG 2-4': 1.50
};
function operationalOdds(market, sig, L, key){
 if(FIXED_ODDS[market]!==undefined) return FIXED_ODDS[market];
 const dm = L.dm.get(key);
 const dg = L.diffg.get(key);
 const ggov = L.ggov25.get(key);
 const ov = L.ov05pt.get(key);
 const qv = L.qVal.get(key);
 const firstValid = (...vals) => { for(const v of vals){ if(v && v>1.01) return v; } return null; };
 if(market==='Ov 0.5 PT') return firstValid(ov?ov.qrOv05:null, dm?dm.qOV05pt:null);
 if(market==='GG') return firstValid(dm?dm.qGG:null);
 if(market==='Ov 2.5') return firstValid(dg?dg.qrL:null, ggov?ggov.qov25:null, dm?dm.qOV25:null);
 if(market==='Ov 1.5') return firstValid(dm?dm.qOV15:null);
 if(market==='U 2.5') return firstValid(dm?dm.qUN35:null);
 if(market==='Casa Segna') return firstValid(dm?dm.qSC:null);
 if(market==='Ospite Segna') return firstValid(dm?dm.qSO:null);
 if(market==='1') return firstValid(qv?qv.r1:null, dm?dm.q1:null);
 if(market==='X') return firstValid(qv?qv.rx:null, dm?dm.qX:null);
 if(market==='2') return firstValid(qv?qv.r2:null, dm?dm.q2:null);
 return null;
}

/* ==================== CONFIDENCE ==================== */
const DIR_COMPAT = {
 'ov05pt':new Set(['ov05pt','over']),
 'gg':new Set(['gg','over','casaSegna','ospiteSegna']),
 'over':new Set(['over','gg','ov05pt','ov15']),
 'ov15':new Set(['ov15','over','gg','ov05pt']),
 'under':new Set(['under','noCasaSegna','noOspiteSegna']),
 'casaSegna':new Set(['casaSegna','gg','over','1']),
 'ospiteSegna':new Set(['ospiteSegna','gg','over','2']),
 'mg13':new Set(['mg13','under']),
 '1':new Set(['1','casaWin','casaSegna']),
 'X':new Set(['X','pareggio']),
 '2':new Set(['2','ospiteWin','ospiteSegna']),
 'mg24':new Set(['mg24','over','gg'])
};
function dirAgreesWith(targetDir, sigDir){
 if(!sigDir||sigDir==='neutral') return null;
 const set = DIR_COMPAT[targetDir];
 if(!set) return null;
 if(set.has(sigDir)) return +1;
 const opp = {'over':'under','under':'over','gg':'ng','ng':'gg','casaSegna':'noCasaSegna','noCasaSegna':'casaSegna','ospiteSegna':'noOspiteSegna','noOspiteSegna':'ospiteSegna'};
 if(opp[targetDir]===sigDir) return -1;
 return null;
}

function computeConfidence(target, sig, L, key){
 const targetDir = target.dir;
 const comp = [];
 // M1 con dettagli REALI
 let m1Active=false, m1Score=0, m1RealDetail={};
 if(targetDir==='ov05pt' && sig.s1.active){
  if(sig.s1.m1) m1Active=true;
  m1Score = sig.s1.strength;
  m1RealDetail = {rule:'IND<320 ∧ Delta<-20 ∧ Diff<0', vals:`IND=${sig.s1.details.ind} ${sig.s1.details.ind<320?'✓':'✗'}, Delta=${sig.s1.details.delta} ${sig.s1.details.delta<-20?'✓':'✗'}, Diff=${sig.s1.details.diff} ${sig.s1.details.diff<0?'✓':'✗'}`};
 }
 else if(targetDir==='gg' && sig.s2.active){
  if(sig.s2.m1) m1Active=true;
  m1Score = sig.s2.strength;
  const d = sig.s2.details;
  m1RealDetail = {rule:'IGBc≥150 ∧ IGBo≥150 ∧ S12<150 ∧ PGG≥55', vals:`IGBc=${d.igbc} ${d.igbc>=150?'✓':'✗'}, IGBo=${d.igbo} ${d.igbo>=150?'✓':'✗'}, S12=${d.s12} ${d.s12<150?'✓':'✗'}, PGG=${d.pgg} ${d.pgg>=55?'✓':'✗'}`};
 }
 else if(targetDir==='over' && sig.s3.active){
  if(sig.s3.m1o) m1Active=true;
  m1Score = sig.s3.sO;
  const d = sig.s3.details;
  m1RealDetail = {rule:'IGBt≥300 ∧ MGE≥3 ∧ Diff≤0', vals:`IGBt=${d.igbt} ${d.igbt>=300?'✓':'✗'}, MGE=${d.mge.toFixed(2)} ${d.mge>=3?'✓':'✗'}, Diff=${d.diff.toFixed(2)} ${d.diff<=0?'✓':'✗'}`};
 }
 else if(targetDir==='under' && sig.s3.active){
  if(sig.s3.m1u) m1Active=true;
  m1Score = sig.s3.sU;
  const d = sig.s3.details;
  m1RealDetail = {rule:'Diff>1.5 ∧ 0<MGE<3', vals:`Diff=${d.diff.toFixed(2)} ${d.diff>1.5?'✓':'✗'}, MGE=${d.mge.toFixed(2)} ${d.mge>0&&d.mge<3?'✓':'✗'}`};
 }
 else if(targetDir==='mg13' && sig.s4.active){
  const d = sig.s4.details;
  if(target.side==='casa'){
   if(sig.s4.m1c) m1Active=true;
   m1Score = sig.s4.sC;
   m1RealDetail = {rule:'ICH∈[300,350] ∧ VarC≥30', vals:`ICH=${d.ich} ${d.ich>=300&&d.ich<=350?'✓':'✗'}, VarC=${d.varc.toFixed(1)} ${d.varc>=30?'✓':'✗'}`};
  } else {
   if(sig.s4.m1o) m1Active=true;
   m1Score = sig.s4.sO;
   m1RealDetail = {rule:'ICA∈[300,350] ∧ VarO≥30', vals:`ICA=${d.ica} ${d.ica>=300&&d.ica<=350?'✓':'✗'}, VarO=${d.varo.toFixed(1)} ${d.varo>=30?'✓':'✗'}`};
  }
 }
 if(m1Score>0) comp.push({key:'M1', weight:W.M1, contrib:m1Score*2-1, coverage:1, label: m1Active?'M1 attiva':'M1 borderline', detail:m1RealDetail});
 else comp.push({key:'M1', weight:W.M1, contrib:0, coverage:0});

 // DM con NP reale
 if(sig.s7.active){
  let perc = 0;
  if(targetDir==='over') perc = sig.s7.buckets.over;
  else if(targetDir==='under') perc = sig.s7.buckets.under;
  else if(targetDir==='gg') perc = sig.s7.buckets.gg;
  else if(targetDir==='ov05pt') perc = sig.s7.buckets.ov05pt;
  else if(targetDir==='ov15') perc = sig.s7.buckets.ov15;
  else if(targetDir==='casaSegna') perc = sig.s7.buckets.casaSegna;
  else if(targetDir==='ospiteSegna') perc = sig.s7.buckets.ospiteSegna;
  else if(targetDir==='1') perc = sig.s7.buckets['1'];
  else if(targetDir==='X') perc = sig.s7.buckets['X'];
  else if(targetDir==='2') perc = sig.s7.buckets['2'];
  else if(targetDir==='mg24') perc = (sig.s7.buckets.ov15+sig.s7.buckets.under)/2;
  if(perc>0){
   const c = clamp((perc-50)/50, -1, 1)*sig.s7.npWeight;
   comp.push({key:'DM', weight:W.DM, contrib:c, coverage:1, label:`DM ${perc.toFixed(0)}% NP=${sig.s7.np}`, detail:{perc, np:sig.s7.np, npWeight:sig.s7.npWeight}});
  } else comp.push({key:'DM', weight:W.DM, contrib:0, coverage:0});
 } else comp.push({key:'DM', weight:W.DM, contrib:0, coverage:0});

 // GZ
 if(sig.s6.active && sig.s6.direction!=='neutral'){
  const ag = dirAgreesWith(targetDir, sig.s6.direction);
  if(ag!==null) comp.push({key:'GZ', weight:W.GZ, contrib:ag*sig.s6.strength, coverage:1, label:sig.s6.lbl, detail:{gz:sig.s6.details.gz, lbl:sig.s6.lbl}});
  else comp.push({key:'GZ', weight:W.GZ, contrib:0, coverage:0.5});
 } else comp.push({key:'GZ', weight:W.GZ, contrib:0, coverage:0});

 // S10
 let dgPenalty = 0;
 if(sig.s10.active){
  if(sig.s10.significant){
   const ag = dirAgreesWith(targetDir, sig.s10.direction);
   if(ag!==null){
    comp.push({key:'DGT', weight:W.DIFFG, contrib:ag*sig.s10.strength, coverage:1, label:`DGT ${sig.s10.dgt.toFixed(2)}`, detail:{dgt:sig.s10.dgt, mge:sig.s10.details.mge, mgu5:sig.s10.details.mgu5}});
    if(ag<0) dgPenalty = 0.15;
   } else comp.push({key:'DGT', weight:W.DIFFG, contrib:0, coverage:0.5});
  } else {
   if(targetDir==='casaSegna' && sig.s10.teamSignals.casaSegna) comp.push({key:'DiffC', weight:W.DIFFG, contrib:0.7, coverage:1, label:`DiffC ${sig.s10.diffC?.toFixed(2)}`, detail:{diffC:sig.s10.diffC}});
   else if(targetDir==='ospiteSegna' && sig.s10.teamSignals.ospiteSegna) comp.push({key:'DiffO', weight:W.DIFFG, contrib:0.7, coverage:1, label:`DiffO ${sig.s10.diffO?.toFixed(2)}`, detail:{diffO:sig.s10.diffO}});
   else comp.push({key:'DGT', weight:W.DIFFG, contrib:0, coverage:0});
  }
 } else comp.push({key:'DGT', weight:W.DIFFG, contrib:0, coverage:0});

 // VAL
 if(sig.s8.active){
  const ag = dirAgreesWith(targetDir, sig.s8.direction);
  if(ag!==null) comp.push({key:'VAL', weight:W.VAL, contrib:ag*sig.s8.strength, coverage:1, label:`Spread ${sig.s8.strength.toFixed(2)}`, detail:{spread:sig.s8.strength}});
  else comp.push({key:'VAL', weight:W.VAL, contrib:0, coverage:0.3});
 } else comp.push({key:'VAL', weight:W.VAL, contrib:0, coverage:0});

 // IA
 if(sig.s5.active && sig.s5.strength>0){
  const ag = dirAgreesWith(targetDir, sig.s5.direction);
  if(ag!==null) comp.push({key:'IA', weight:W.IA, contrib:ag*sig.s5.strength, coverage:1, label:`IA ${sig.s5.details.winner}`, detail:{winner:sig.s5.details.winner, avgAff:sig.s5.details.avgAff}});
  else comp.push({key:'IA', weight:W.IA, contrib:0, coverage:0.3});
 } else comp.push({key:'IA', weight:W.IA, contrib:0, coverage:0});

 if(sig.s9.active) comp.push({key:'PL', weight:W.PL, contrib:0, coverage:0.5});
 else comp.push({key:'PL', weight:W.PL, contrib:0, coverage:0});

 const W_eff = comp.reduce((s,c) => s+c.weight*c.coverage, 0);
 if(W_eff<=0) return {confidence:0, components:comp, coverage:0, conflictPenalty:0, capped:false, capReason:''};
 const score_raw = comp.reduce((s,c) => s+c.weight*c.coverage*c.contrib, 0)/W_eff;
 const score_base = 50+50*score_raw;
 const activeContribs = comp.filter(c => c.coverage>0).map(c => c.contrib);
 const activeWeights = comp.filter(c => c.coverage>0).map(c => c.weight*c.coverage);
 const sigma = stdW(activeContribs, activeWeights);
 const penalty = CONFLICT_LAMBDA*sigma;
 const W_total = Object.values(W).reduce((s,x) => s+x, 0);
 const cov_ratio = W_eff/W_total;
 const cov_factor = COV_FLOOR+(1-COV_FLOOR)*cov_ratio;
 let score = score_base*cov_factor-penalty;
 if(dgPenalty>0) score -= dgPenalty*100*0.4;
 let capped=false, capReason='';
 if(sig.s10.active && sig.s10.significant){
  const ag = dirAgreesWith(targetDir, sig.s10.direction);
  if(ag===-1 && score>70){ score=70; capped=true; capReason='DGT contraria'; }
 }
 if(sig.s10.active && sig.s10.dropDir==='contra' && score>60){ score=60; capped=true; capReason='Drop quota contrario'; }
 if(cov_ratio<0.5 && score>70){ score=70; capped=true; capReason='Coverage <50%'; }
 if(sig.s10.active && sig.s10.dropDir==='pro') score += 4;
 score = clamp(score, 0, 100);
 return {confidence:Math.round(score), components:comp, coverage:cov_ratio, conflictPenalty:penalty, capped, capReason, score_raw, score_base, cov_factor, sigma};
}

/* ==================== TOP CONTRIBUTORS / CONFLICTS ==================== */
function topContributors(components, n=3){
 return components.filter(c => c.coverage>0 && c.contrib>0.05).sort((a,b) => (Math.abs(b.contrib)*b.weight)-(Math.abs(a.contrib)*a.weight)).slice(0, n);
}
function topConflicts(components, n=1){
 return components.filter(c => c.coverage>0 && c.contrib<-0.05).sort((a,b) => (Math.abs(b.contrib)*b.weight)-(Math.abs(a.contrib)*a.weight)).slice(0, n);
}

/* ==================== NARRATIVA ==================== */
function buildNarrative(rec){
 const c = rec.confidence, m = rec.market, match = rec.match, odds = rec.odds;
 const tops = topContributors(rec.components, 3);
 const conflicts = topConflicts(rec.components, 1);
 const sig = rec.sig;
 const reasonStr = tops.map(t => t.label||t.key).join('; ') || 'segnali deboli';
 const conflictStr = conflicts.length ? `Attenzione: ${conflicts[0].label||conflicts[0].key} contro` : '';
 const oddsStr = odds ? odds.toFixed(2) : 'N/D';
 if(c<55) return `${match}. ${m}: segnali deboli (Conf ${c}, Cov ${(rec.coverage*100).toFixed(0)}%). Skip consigliato.`;
 if(c>=80) return `🏆 PICK FORTE · ${match} · ${m} a ${oddsStr}. ${reasonStr}. ${conflictStr || 'Nessun segnale contrario.'} Confidence ${c}/100.`;
 return `${match}. ${m} a ${oddsStr}. ${reasonStr}. ${conflictStr} Confidence ${c}/100.`;
}

/* ==================== KELLY ==================== */
function kellyStake(p, odds, opts={}){
 const fraction = opts.fraction!==undefined ? opts.fraction : S.bankroll.kellyFraction;
 const cap = opts.cap!==undefined ? opts.cap : S.bankroll.capPct;
 const bankroll = opts.bankroll!==undefined ? opts.bankroll : S.bankroll.segregated;
 if(!odds || odds<=1.01) return {pct:0, eur:0, edge:0, fStar:0};
 const b = odds-1;
 const pImpl = 1/odds;
 const alpha = clamp(0.4+0.6*(opts.confidence||50)/100, 0.4, 1.0);
 const pShrunk = alpha*p+(1-alpha)*pImpl;
 const fStar = (b*pShrunk-(1-pShrunk))/b;
 if(fStar<=0) return {pct:0, eur:0, edge:pShrunk-pImpl, fStar:0, pShrunk};
 let pct = fraction*fStar;
 if(S.bankroll.afterLossActive) pct *= 0.75;
 pct = clamp(pct, 0, cap);
 const eur = round(pct*bankroll, 2);
 const edge = pShrunk-pImpl;
 return {pct, eur, edge, fStar, pShrunk};
}

/* ==================== CORRELATION ==================== */
const CONFLICT_PAIRS = new Set([
 'Ov 2.5|U 2.5','U 2.5|Ov 2.5',
 'Ov 1.5|U 2.5','U 2.5|Ov 1.5',
 'GG|U 2.5','U 2.5|GG',
 'MG 2-4|Ov 2.5','Ov 2.5|MG 2-4'
]);
function pairKey(a,b){ return a+'|'+b; }
function sharesTeam(matchA, matchB){
 const sa = (matchA._key||'').split(' - ');
 const sb = (matchB._key||'').split(' - ');
 if(sa.length<2 || sb.length<2) return false;
 return sa[0]===sb[0]||sa[0]===sb[1]||sa[1]===sb[0]||sa[1]===sb[1];
}
function correlationScore(recA, recB){
 if(recA._key===recB._key){
  if(CONFLICT_PAIRS.has(pairKey(recA.market, recB.market))) return 1.0;
  return 0.6;
 }
 let s = 0;
 if(recA.lega && recB.lega && recA.lega===recB.lega) s += 0.30;
 const tA = timeVal(recA.ora), tB = timeVal(recB.ora);
 if(Math.abs(tA-tB)<=30) s += 0.20;
 if(recA.market===recB.market) s += 0.15;
 if(sharesTeam(recA, recB)) s += 0.50;
 return Math.min(s, 0.99);
}

/* ==================== ALL RECS ==================== */
function buildAllRecs(){
 const L = buildLookups();
 const universe = buildUniverse(L);
 const matches = [];
 for(const m of universe){
  const sig = extractSignals(L, m._key);
  const minCov = (sig.s7.active?1:0)+(sig.s2.active?1:0)+(sig.s10.active?1:0);
  if(minCov===0) continue;
  const candidates = enumerateMarkets(sig, L, m._key);
  if(!candidates.length) continue;
  const recs = [];
  for(const cand of candidates){
   const odds = operationalOdds(cand.mkt, sig, L, m._key);
   if(!odds || odds<1.20) continue;
   const conf = computeConfidence(cand, sig, L, m._key);
   const pModel = clamp(conf.confidence/100*0.85+0.05, 0.05, 0.95);
   const kelly = kellyStake(pModel, odds, {confidence:conf.confidence});
   const rec = {
    _key:m._key, match:m.evento,
    ora:m.ora||(L.ggov25.get(m._key)?.ora||''),
    lega:m.lega||(L.ggov25.get(m._key)?.lega||L.ia.get(m._key)?.lega||''),
    market:cand.mkt, dir:cand.dir, side:cand.side,
    odds, confidence:conf.confidence, coverage:conf.coverage,
    components:conf.components, capped:conf.capped, capReason:conf.capReason,
    pModel, kelly, stake:kelly.eur, stakePct:kelly.pct*100, edge:kelly.edge*100,
    sig,
    hasM1: !!(sig.s1.m1||sig.s2.m1||(sig.s3.m1o&&cand.dir==='over')||(sig.s3.m1u&&cand.dir==='under')||(sig.s4.m1c&&cand.side==='casa')||(sig.s4.m1o&&cand.side==='ospite'))
   };
   rec.narrative = buildNarrative(rec);
   recs.push(rec);
  }
  if(recs.length){
   recs.sort((a,b) => b.confidence-a.confidence);
   matches.push({match:m, sig, recs, top:recs[0]});
  }
 }
 matches.sort((a,b) => b.top.confidence-a.top.confidence);
 return matches;
}

/* ==================== GENERATORI BOLLAMAKER-STYLE ====================
   Strategia: prova prima soglie strette → se vuoto, allarga progressivamente
   ============================================================== */

function uniqueByMatch(recs){
 const dedup = {};
 recs.forEach(r => { if(!dedup[r._key] || dedup[r._key].confidence < r.confidence) dedup[r._key] = r; });
 return Object.values(dedup);
}

// 1) SINGOLA quota 1.50-1.80
function genSingola(allMatches){
 const tries = [
  {confMin:65, edgeMin:0, label:'standard'},
  {confMin:55, edgeMin:-2, label:'tolerante'},
  {confMin:45, edgeMin:-5, label:'molto tolerante'}
 ];
 for(const cfg of tries){
  const pool = [];
  const seen = new Set();
  for(const m of allMatches){
   for(const r of m.recs){
    if(!r.odds || r.odds<1.50 || r.odds>1.80) continue;
    if(r.confidence<cfg.confMin) continue;
    if(r.edge<cfg.edgeMin) continue;
    if(seen.has(r._key)) continue;
    seen.add(r._key);
    pool.push(r);
   }
  }
  if(pool.length>0){
   pool.sort((a,b) => (b.confidence+b.edge*1.2)-(a.confidence+a.edge*1.2));
   return {list: pool.slice(0,12), mode: cfg.label};
  }
 }
 return {list:[], mode:'nessuna'};
}

// 2) TRIPLA RADDOPPIO quota tot 1.80-2.10 (3 partite con quote ~1.20-1.30 ciascuna)
function genTriplaRaddoppio(allMatches){
 const tries = [
  {confMin:60, qLegMin:1.20, qLegMax:1.50, label:'standard'},
  {confMin:50, qLegMin:1.18, qLegMax:1.55, label:'tolerante'},
  {confMin:40, qLegMin:1.15, qLegMax:1.60, label:'molto tolerante'}
 ];
 for(const cfg of tries){
  const pool = [];
  for(const m of allMatches){
   for(const r of m.recs){
    if(!r.odds || r.odds<cfg.qLegMin || r.odds>cfg.qLegMax) continue;
    if(r.confidence<cfg.confMin) continue;
    pool.push(r);
   }
  }
  const cands = uniqueByMatch(pool).sort((a,b) => b.confidence-a.confidence).slice(0,16);
  const out = [];
  outer:
  for(let i=0; i<cands.length; i++){
   for(let j=i+1; j<cands.length; j++){
    for(let k=j+1; k<cands.length; k++){
     const a=cands[i], b=cands[j], c=cands[k];
     if(Math.max(correlationScore(a,b), correlationScore(a,c), correlationScore(b,c))>0.40) continue;
     const total = a.odds*b.odds*c.odds;
     if(total<1.80 || total>2.10) continue;
     const pJoint = a.pModel*b.pModel*c.pModel;
     const ev = pJoint*total-1;
     const score = (a.confidence+b.confidence+c.confidence)/3+ev*15;
     out.push({legs:[a,b,c], totalOdds:total, pJoint, ev, ev_pct:ev*100, score});
     if(out.length>50) break outer;
    }
   }
  }
  if(out.length>0){
   out.sort((x,y) => y.score-x.score);
   return {list: out.slice(0,3), mode: cfg.label};
  }
 }
 return {list:[], mode:'nessuna'};
}

// 3) CINQUINA quota tot 2.30-3.10
function genCinquina(allMatches){
 const tries = [
  {confMin:55, qLegMin:1.18, qLegMax:1.40, label:'standard'},
  {confMin:48, qLegMin:1.15, qLegMax:1.45, label:'tolerante'},
  {confMin:40, qLegMin:1.12, qLegMax:1.50, label:'molto tolerante'}
 ];
 for(const cfg of tries){
  const pool = [];
  for(const m of allMatches){
   for(const r of m.recs){
    if(!r.odds || r.odds<cfg.qLegMin || r.odds>cfg.qLegMax) continue;
    if(r.confidence<cfg.confMin) continue;
    pool.push(r);
   }
  }
  const cands = uniqueByMatch(pool).sort((a,b) => b.confidence-a.confidence).slice(0,18);
  if(cands.length<5) continue;
  const out = [];
  // Greedy: prendi top 5 con bassa correlazione progressiva
  function tryCombo(maxAttempts=200){
   const result = [];
   const usedLeagues = {};
   for(const c of cands){
    if(result.length>=5) break;
    let ok = true;
    for(const r of result){
     if(correlationScore(c, r)>0.40){ ok = false; break; }
    }
    // Limita 2 partite per lega
    if(ok && c.lega && (usedLeagues[c.lega]||0)>=2) ok=false;
    if(ok){
     result.push(c);
     if(c.lega) usedLeagues[c.lega] = (usedLeagues[c.lega]||0)+1;
    }
   }
   return result;
  }
  for(let attempt=0; attempt<5 && out.length<3; attempt++){
   // shuffle leggera per varianza
   const shuffled = cands.slice().sort(() => Math.random()-0.5+0.001*attempt);
   const picked = [];
   const usedLeagues = {};
   for(const c of shuffled){
    if(picked.length>=5) break;
    let ok = true;
    for(const r of picked){ if(correlationScore(c, r)>0.40){ ok=false; break; } }
    if(ok && c.lega && (usedLeagues[c.lega]||0)>=2) ok=false;
    if(ok){ picked.push(c); if(c.lega) usedLeagues[c.lega]=(usedLeagues[c.lega]||0)+1; }
   }
   if(picked.length===5){
    const total = picked.reduce((s,r) => s*r.odds, 1);
    if(total>=2.30 && total<=3.10){
     const pJoint = picked.reduce((s,r) => s*r.pModel, 1);
     const ev = pJoint*total-1;
     const avgConf = picked.reduce((s,r) => s+r.confidence, 0)/5;
     const dup = out.find(o => o.legs.every((l,i) => l._key===picked[i]?._key));
     if(!dup) out.push({legs:picked, totalOdds:total, pJoint, ev, ev_pct:ev*100, score:avgConf+ev*10});
    }
   }
  }
  if(out.length>0){
   out.sort((x,y) => y.score-x.score);
   return {list: out.slice(0,3), mode: cfg.label};
  }
 }
 return {list:[], mode:'nessuna'};
}

   }
  }

  if(cands.length<10) continue;
  const out = [];
  for(let attempt=0; attempt<5 && out.length<2; attempt++){
   const shuffled = cands.slice().sort(() => Math.random()-0.5+0.001*attempt);
   const picked = [];

   }
   if(picked.length===10){

     const dup = out.find(o => o.legs.every((l,i) => l._key===picked[i]?._key));

// 5) DOPPIA POTENZIATA: 2 partite DIVERSE, indipendenti, range quota fissi
//    Leg principale: 1.50-1.65 (Conf alto, mercato forte)
//    Leg potenziatore: 1.20-1.40 (Conf alto, mercato sicuro)
//    Totale: 1.80-2.30 · campionati e orari diversi · niente squadre comuni
function genSingolaPotenziata(allMatches){
 const tries = [
  {confLeg1:65, confLeg2:60, label:'standard'},
  {confLeg1:55, confLeg2:50, label:'tolerante'},
  {confLeg1:48, confLeg2:45, label:'molto tolerante'}
 ];
 for(const cfg of tries){
  // Pool 1: candidate per leg principale (quota 1.50-1.65)
  const pool1Raw = [];
  for(const m of allMatches){
   for(const r of m.recs){
    if(!r.odds || r.odds<1.50 || r.odds>1.65) continue;
    if(r.confidence<cfg.confLeg1) continue;
    pool1Raw.push(r);
   }
  }
  // Pool 2: candidate per leg potenziatore (quota 1.20-1.40)
  const pool2Raw = [];
  for(const m of allMatches){
   for(const r of m.recs){
    if(!r.odds || r.odds<1.20 || r.odds>1.40) continue;
    if(r.confidence<cfg.confLeg2) continue;
    pool2Raw.push(r);
   }
  }
  // Per ogni partita tieni solo il mercato con Confidence migliore
  const pool1 = uniqueByMatch(pool1Raw).sort((a,b) => b.confidence-a.confidence);
  const pool2 = uniqueByMatch(pool2Raw).sort((a,b) => b.confidence-a.confidence);
  if(pool1.length===0 || pool2.length===0) continue;

  // Combina: per ogni leg1 cerca il miglior leg2 indipendente
  const out = [];
  const usedLeg1 = new Set();
  const usedLeg2 = new Set();
  for(const a of pool1){
   if(usedLeg1.has(a._key)) continue;
   for(const b of pool2){
    if(usedLeg2.has(b._key)) continue;
    if(a._key === b._key) continue; // mai stessa partita
    // Indipendenza: campionati diversi, orari diversi (>30min), no squadre comuni
    const corr = correlationScore(a, b);
    if(corr > 0.35) continue;
    const totalOdds = a.odds * b.odds;
    if(totalOdds < 1.80 || totalOdds > 2.30) continue;
    const pJoint = a.pModel * b.pModel;
    const ev = pJoint * totalOdds - 1;
    const score = (a.confidence + b.confidence) / 2 + ev * 20;
    out.push({
     leg1: a,
     leg2: b,
     totalOdds,
     pJoint,
     ev,
     ev_pct: ev * 100,
     corr,
     score
    });
    usedLeg1.add(a._key);
    usedLeg2.add(b._key);
    break;
   }
  }
  if(out.length>0){
   out.sort((x,y) => y.score - x.score);
   return {list: out.slice(0,6), mode: cfg.label};
  }
 }
 return {list:[], mode:'nessuna'};
}

// 6) VALUE BETS
function genValueBets(allMatches){
 const tries = [
  {edgeMin:5, npMin:15, label:'standard'},
  {edgeMin:3, npMin:10, label:'tolerante'}
 ];
 for(const cfg of tries){

   out.sort((a,b) => b.edge-a.edge);
   return {list: out.slice(0,10), mode: cfg.label};
  }
 }
 return {list:[], mode:'nessuna'};
}

// 7) Filtra per mercato
function filterByMarket(allMatches, marketName, n=30){
 const out = [];
 const seen = new Set();
 for(const m of allMatches){
  for(const r of m.recs){
   if(r.market!==marketName) continue;
   if(seen.has(r._key)) continue;
   seen.add(r._key);
   out.push(r);
  }
 }
 out.sort((a,b) => b.confidence-a.confidence);
 return out.slice(0, n);
}

function getAllMatches(allMatches){
 const out = [];
 const seen = new Set();
 for(const m of allMatches){
  if(seen.has(m.match._key)) continue;
  seen.add(m.match._key);
  out.push(m.top);
 }
 return out;
}

function buildBadgeContent(badgeKey, recData){
 const r = recData;
 const sig = r ? r.sig : null;
 const matchTitle = r ? r.match : '';
 const marketTitle = r ? r.market : '';

/* ==================== UI HELPERS ==================== */
function gaugeHTML(value, size='lg', label='SCORE'){
 const v = clamp(value || 0, 0, 100);
 const r = size==='sm' ? 28 : 50;
 const c = 2*Math.PI*r;
 const off = c*(1-v/100);
 const cx = size==='sm' ? 36 : 60;
 const cls = v>=75 ? 'g-ok' : v>=60 ? 'g-wa' : 'g-er';
 const W = size==='sm' ? 72 : 120;
 return `<div class="gauge ${size==='sm'?'sm':''} ${cls}" data-badge="Confidence">
  <svg width="${W}" height="${W}" viewBox="0 0 ${W} ${W}">
   <circle class="bg-ring" cx="${cx}" cy="${cx}" r="${r}"/>
   <circle class="fg-ring" cx="${cx}" cy="${cx}" r="${r}" stroke-dasharray="${c.toFixed(2)}" stroke-dashoffset="${off.toFixed(2)}"/>
  </svg>
  <div class="lbl"><span class="v">${Math.round(v)}</span><span class="t">${escHtml(label)}</span></div>
 </div>`;
}

function dmBadgeFor(rec){
 const np = rec.sig?.s7?.np||0;
 if(np>=30) return `<span class="bdg bdg-dm-ok" data-badge="DM" data-rec="${rec._key}|${rec.market}">DM ${np}</span>`;
 if(np>=15) return `<span class="bdg bdg-dm-wa" data-badge="DM" data-rec="${rec._key}|${rec.market}">DM ${np}</span>`;
 if(np>0) return `<span class="bdg bdg-dm-er" data-badge="DM" data-rec="${rec._key}|${rec.market}">DM ${np}</span>`;
 return '';
}

function badgesFor(rec){
 const out = [];
 const recAttr = `data-rec="${rec._key}|${rec.market}"`;
 if(rec.hasM1) out.push(`<span class="bdg bdg-m1" data-badge="M1" ${recAttr}>🏅 M1</span>`);
 const dm = dmBadgeFor(rec);
 if(dm) out.push(dm);
 if(rec.edge>=5) out.push(`<span class="bdg bdg-val" data-badge="VALUE" ${recAttr}>VALUE ${rec.edge.toFixed(1)}%</span>`);
 if(rec.sig?.s10?.dropDir==='pro') out.push(`<span class="bdg bdg-gz" data-badge="Drop pro" ${recAttr}>📉 Drop pro</span>`);
 if(rec.sig?.s10?.dropDir==='contra') out.push(`<span class="bdg bdg-dm-er" data-badge="Drop contra" ${recAttr}>📈 Drop contra</span>`);
 if(rec.sig?.s6?.active && rec.sig.s6.direction!=='neutral') out.push(`<span class="bdg bdg-gz" data-badge="GZ" ${recAttr}>📡 GZ</span>`);
 if(rec.sig?.s10?.significant) out.push(`<span class="bdg bdg-dm-wa" data-badge="DGT" ${recAttr}>📉 DGT ${rec.sig.s10.dgt.toFixed(1)}</span>`);
 if(rec.capped) out.push(`<span class="bdg bdg-skip" data-badge="CAP" ${recAttr}>🚨 CAP</span>`);
 return out.join('');
}

function breakdownHTML(rec){
 const tops = topContributors(rec.components, 4);
 const conflicts = topConflicts(rec.components, 2);
 const all = [...tops, ...conflicts];
 if(!all.length) return '<div class="bk-row"><span class="n">Nessun contributo significativo</span></div>';
 const rows = all.map(c => {
  const sign = c.contrib>0 ? '+' : '';
  const cls = c.contrib>0 ? 'pos' : (c.contrib<0 ? 'neg' : 'zero');
  return `<div class="bk-row"><span class="n">${escHtml(c.label||c.key)} <small style="color:#8B95B4">(${(c.weight*100).toFixed(0)}%)</small></span><span class="p ${cls}">${sign}${(c.contrib*100).toFixed(0)}</span></div>`;
 }).join('');
 return `<div class="breakdown">${rows}</div>`;
}

function renderCombo(combo, type, idx){

 const icoMap = {tripla:'🎯', cinquina:'🃏', decina:'🎰'};
 const tipo = tipoMap[type] || 'Combo';
 const ico = icoMap[type] || '🎲';
 const legs = combo.legs.map(l => `<div class="combo-leg">

  <div class="o">${l.odds?.toFixed(2)||'-'}</div>
 </div>`).join('');
 const stakeJoint = round(S.bankroll.segregated*0.02, 2);

 return `<div class="combo">
  <div class="combo-hdr">

}

/* ==================== TICKET ACTIONS ==================== */
function findRecBy(key, market){
 if(!S.output) return null;
 for(const m of S.output.allMatches){
  if(m.match._key===key){
   for(const r of m.recs) if(r.market===market) return r;
  }
 }
 return null;
}

function addToTicket(key, market){
 const rec = findRecBy(key, market);
 if(!rec){ showToast('Pick non trovata', 'err'); return; }
 if(S.ticket.legs.length>=10){ showToast('Max 10 leg', 'err'); return; }
 if(S.ticket.legs.find(l => l._key===key && l.market===market)){ showToast('Pick già in schedina', 'err'); return; }
 for(const ex of S.ticket.legs){
  const corr = correlationScore(ex, rec);
  if(corr>0.40){
   if(!confirm(`Attenzione: correlazione ${(corr*100).toFixed(0)}% con "${ex.match}". Aggiungere comunque?`)) return;
  }
 }
 S.ticket.legs.push({
  _key:rec._key, match:rec.match, market:rec.market, odds:rec.odds,
  ora:rec.ora, lega:rec.lega, dir:rec.dir, side:rec.side,
  pModel:rec.pModel, confidence:rec.confidence
 });
 if(S.ticket.legs.length===1) S.ticket.stake = Math.max(1, Math.round(rec.stake||10));
 schedulePersist();
 showToast('Aggiunto alla schedina', 'ok');
 render();
}

function addComboToTicket(type, idx){
 const o = S.output;
 if(!o) return;
 let combo = null;
 let legs = null;
 if(type==='tripla'){ combo = genTriplaRaddoppio(o.allMatches).list[idx]; if(combo) legs = combo.legs; }
 else if(type==='cinquina'){ combo = genCinquina(o.allMatches).list[idx]; if(combo) legs = combo.legs; }
 else if(type==='decina'){ combo = genDecina(o.allMatches).list[idx]; if(combo) legs = combo.legs; }
 else if(type==='potenziata'){
  combo = genSingolaPotenziata(o.allMatches).list[idx];
  if(combo) legs = [combo.leg1, combo.leg2];
 }
 if(!combo || !legs) return;
 S.ticket.legs = legs.map(l => ({
  _key:l._key, match:l.match, market:l.market, odds:l.odds,
  ora:l.ora, lega:l.lega, dir:l.dir, side:l.side,
  pModel:l.pModel, confidence:l.confidence
 }));
 S.ticket.stake = Math.max(1, Math.round(S.bankroll.segregated*0.02));
 S.ui.tab = 'schedina';
 schedulePersist();
 const labels = {'tripla':'Tripla', 'cinquina':'Cinquina', 'decina':'Decina', 'potenziata':'Doppia potenziata'};
 showToast(`${labels[type]||type} caricata`, 'ok');
 render();
}

function confirmTicket(){
 if(!S.ticket.legs.length) return;
 const totalOdds = S.ticket.legs.reduce((s,l) => s*(l.odds||1), 1);
 const tipo = S.ticket.legs.length===1 ? 'Singola' : S.ticket.legs.length===2 ? 'Doppia' : S.ticket.legs.length===3 ? 'Tripla' : S.ticket.legs.length===5 ? 'Cinquina' : S.ticket.legs.length===10 ? 'Decina' : `Multipla x${S.ticket.legs.length}`;

  savedAt: new Date().toISOString(),
  tipo, legs: S.ticket.legs.slice(), totalOdds, stake: S.ticket.stake, status:'open', profit:0
 };
 S.history.unshift(entry);

 schedulePersist();
 showToast('Pick salvata', 'ok');
 S.ui.tab = 'storico';

}

function setHistStatus(id, status){
 const item = S.history.find(x => x.id===id);
 if(!item) return;
 item.status = status;
 if(status==='won') item.profit = item.stake*item.totalOdds-item.stake;
 else if(status==='lost') item.profit = -item.stake;
 else item.profit = 0;
 recomputeBankrollPL();
 schedulePersist();
 render();
}

function removeHist(id){
 if(!confirm('Eliminare?')) return;
 S.history = S.history.filter(x => x.id!==id);
 recomputeBankrollPL();
 schedulePersist();
 render();
}

function recomputeBankrollPL(){
 const today = new Date().toDateString();
 const startWeek = startOfWeekISO();
 let pld=0, plw=0;
 S.history.forEach(h => {
  if(h.status==='open') return;
  const d = new Date(h.savedAt);
  if(d.toDateString()===today) pld += h.profit||0;
  if(d.toISOString()>=startWeek) plw += h.profit||0;
 });
 S.bankroll.pl_day = pld;
 S.bankroll.pl_week = plw;
}

/* ==================== PERSISTENZA ==================== */
/* Bankroll/Storico/Schedina/UI → localStorage (piccoli)
   CSV (10 dataset) → IndexedDB (capienza grande)
   Auto-load all'apertura + promemoria giornaliero */

let saveTimer = null;
function schedulePersist(){ clearTimeout(saveTimer); saveTimer = setTimeout(persistState, 400); }

function persistState(){
 try {
  const toSave = {
   version: VERSION, savedAt: new Date().toISOString(),
   bankroll: S.bankroll, ticket: S.ticket, history: S.history,
   ui: {tab:S.ui.tab, uploadOpen:S.ui.uploadOpen, view:S.ui.view, market:S.ui.market}
  };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(toSave));
 } catch(e){ console.warn('Persist localStorage failed', e); }
}

function loadStateLocal(){
 try {
  const raw = localStorage.getItem(STORAGE_KEY);
  if(!raw) return;
  const obj = JSON.parse(raw);
  if(!obj || obj.version!==VERSION) return;
  if(obj.bankroll) Object.assign(S.bankroll, obj.bankroll);
  if(obj.ticket) Object.assign(S.ticket, obj.ticket);
  if(Array.isArray(obj.history)) S.history = obj.history;
  if(obj.ui) Object.assign(S.ui, obj.ui);
  recomputeBankrollPL();
 } catch(e){ console.warn('Load localStorage failed', e); }
}

/* ==================== INDEXEDDB PER CSV ==================== */
const DB_NAME = 'MAP_F5_DB';
const DB_VERSION = 1;
const DB_STORE = 'datasets';

function openDB(){
 return new Promise((resolve, reject) => {
  if(!('indexedDB' in window)){ reject(new Error('IndexedDB non supportato')); return; }
  const req = indexedDB.open(DB_NAME, DB_VERSION);
  req.onerror = () => reject(req.error);
  req.onsuccess = () => resolve(req.result);
  req.onupgradeneeded = e => {
   const db = e.target.result;
   if(!db.objectStoreNames.contains(DB_STORE)){
    db.createObjectStore(DB_STORE, {keyPath:'key'});
   }
  };
 });
}

function dbPutDataset(key, rows, savedAt){
 return new Promise((resolve, reject) => {
  openDB().then(db => {
   const tx = db.transaction(DB_STORE, 'readwrite');
   const st = tx.objectStore(DB_STORE);
   const putReq = st.put({key, rows, savedAt: savedAt || new Date().toISOString()});
   putReq.onsuccess = () => { db.close(); resolve(); };
   putReq.onerror = () => { db.close(); reject(putReq.error); };
  }).catch(reject);
 });
}

function dbDeleteDataset(key){
 return new Promise((resolve, reject) => {
  openDB().then(db => {
   const tx = db.transaction(DB_STORE, 'readwrite');
   const st = tx.objectStore(DB_STORE);
   const delReq = st.delete(key);
   delReq.onsuccess = () => { db.close(); resolve(); };
   delReq.onerror = () => { db.close(); reject(delReq.error); };
  }).catch(reject);
 });
}

function dbGetAllDatasets(){
 return new Promise((resolve, reject) => {
  openDB().then(db => {
   const tx = db.transaction(DB_STORE, 'readonly');
   const st = tx.objectStore(DB_STORE);
   const getReq = st.getAll();
   getReq.onsuccess = () => { db.close(); resolve(getReq.result || []); };
   getReq.onerror = () => { db.close(); reject(getReq.error); };
  }).catch(reject);
 });
}

function dbClearAll(){
 return new Promise((resolve, reject) => {
  openDB().then(db => {
   const tx = db.transaction(DB_STORE, 'readwrite');
   const st = tx.objectStore(DB_STORE);
   const clrReq = st.clear();
   clrReq.onsuccess = () => { db.close(); resolve(); };
   clrReq.onerror = () => { db.close(); reject(clrReq.error); };
  }).catch(reject);
 });
}

async function loadDatasetsFromDB(){
 try {
  const all = await dbGetAllDatasets();
  if(!all || !all.length) return {loaded:0, oldestDate:null};
  let oldest = null;
  all.forEach(item => {
   if(item && item.key && Array.isArray(item.rows)){
    S.datasets[item.key] = item.rows;
    if(item.savedAt){
     const d = new Date(item.savedAt);
     if(!oldest || d < oldest) oldest = d;
    }
   }
  });
  return {loaded: all.length, oldestDate: oldest};
 } catch(e){
  console.warn('IndexedDB load failed:', e);
  return {loaded:0, oldestDate:null};
 }
}

/* ==================== loadState UNIFICATO ==================== */
async function loadState(){
 loadStateLocal();
 const result = await loadDatasetsFromDB();
 if(result.loaded > 0){
  // Verifica se i CSV sono di un altro giorno → mostra promemoria
  const today = new Date();
  today.setHours(0,0,0,0);
  if(result.oldestDate){
   const dayDiff = Math.floor((today - result.oldestDate) / (1000*60*60*24));
   if(dayDiff >= 1){
    setTimeout(() => showReminderBanner(dayDiff, result.oldestDate), 600);
   }
  }
 }
 return result;
}

/* ==================== UPLOAD ==================== */
async function handleFileUpload(input){
 const key = input.dataset.target;
 const file = input.files && input.files[0];
 if(!key||!file){ setUploadStatus('File mancante', 'err'); return; }
 setUploadStatus(`Lettura ${file.name}…`);
 try {
  const text = typeof file.text==='function' ? await file.text() : await new Promise((res,rej) => {
   const fr = new FileReader();
   fr.onload = () => res(String(fr.result||''));
   fr.onerror = () => rej(fr.error);
   fr.readAsText(file);
  });
  if(!text.trim()) throw new Error('File vuoto');
  parseAndStore(key, text);
  const n = (S.datasets[key]||[]).length;
  // SALVA in IndexedDB per persistenza tra sessioni
  try {
   await dbPutDataset(key, S.datasets[key], new Date().toISOString());
   setUploadStatus(`✅ ${file.name}: ${n} righe (salvato)`, 'ok');
  } catch(eDb){
   console.warn('Save IndexedDB failed:', eDb);
   setUploadStatus(`✅ ${file.name}: ${n} righe (⚠️ non salvato in DB)`, 'ok');
  }
  // rimuovi banner promemoria se ancora presente
  const banner = document.getElementById('reminderBanner');
  if(banner) banner.remove();
  runDecisionEngine();
  render();
 } catch(e){
  setUploadStatus(`❌ ${e.message}`, 'err');
 } finally { input.value = ''; }
}

async function clearDataset(key){
 const ds = DATASETS.find(d => d.key === key);
 const label = ds ? ds.label : key;
 if(!confirm(`Eliminare il file "${label}"?\n\nIl CSV verrà rimosso anche dall'archivio salvato.`)) return;
 S.datasets[key] = [];
 try { await dbDeleteDataset(key); }
 catch(e){ console.warn('Delete IndexedDB failed:', e); }
 runDecisionEngine();
 render();
 showToast(`File "${label}" eliminato`, 'ok');
}

async function clearAllDatasets(){
 if(!confirm('Eliminare TUTTI i CSV caricati?\n\nL\'archivio salvato verrà svuotato. Bankroll e storico restano.')) return;
 DATASETS.forEach(d => { S.datasets[d.key] = []; });
 try { await dbClearAll(); }
 catch(e){ console.warn('Clear IndexedDB failed:', e); }
 runDecisionEngine();
 render();
 showToast('Tutti i CSV eliminati', 'ok');
}

/* ==================== EVENT WIRING ==================== */
function bindEvents(){
 document.getElementById('navTabs').addEventListener('click', e => {
  const btn = e.target.closest('.nav-btn');
  if(!btn) return;
  S.ui.tab = btn.dataset.tab;
  schedulePersist(); render();
 });

 document.getElementById('uploadTg').addEventListener('click', () => {
  S.ui.uploadOpen = !S.ui.uploadOpen;
  const body = document.getElementById('uploadBody');
  const tg = document.getElementById('uploadTg');
  if(S.ui.uploadOpen){ body.classList.add('open'); tg.classList.add('open'); }
  else { body.classList.remove('open'); tg.classList.remove('open'); }
  schedulePersist();
 });

 document.body.addEventListener('change', e => {
  const t = e.target;
  if(t.tagName==='INPUT' && t.type==='file' && t.dataset.target) handleFileUpload(t);
  if(t.id==='afterLossSel'){ S.bankroll.afterLossActive = t.value==='true'; schedulePersist(); runDecisionEngine(); render(); }
  if(t.id==='histStat'){ S.ui.histFilter = t.value; schedulePersist(); render(); }
 });

 document.body.addEventListener('click', e => {
  const tgt = e.target;
  // Badge info con dati reali della pick
  const badge = tgt.closest('[data-badge]');
  if(badge){
   const recAttr = badge.getAttribute('data-rec');
   let recData = null;
   if(recAttr){
    const [k, m] = recAttr.split('|');
    recData = findRecBy(k, m);
   }
   showBadgeInfo(badge.dataset.badge, recData);
   return;
  }
  // View
  const gv = tgt.closest('[data-view]');
  if(gv){ S.ui.view = gv.dataset.view; S.ui.market = null; schedulePersist(); render(); return; }
  const vc = tgt.closest('[data-view-click]');
  if(vc){ S.ui.view = vc.dataset.viewClick; S.ui.market = null; schedulePersist(); render(); return; }
  // Mercato
  const mkt = tgt.closest('[data-market]');
  if(mkt){ S.ui.view = 'mercato'; S.ui.market = mkt.dataset.market; schedulePersist(); render(); return; }
  const pick = tgt.closest('[data-pick]');
  if(pick){ const inp = document.querySelector(`input[type=file][data-target="${pick.dataset.pick}"]`); if(inp) inp.click(); return; }
  const clr = tgt.closest('[data-clear]');
  if(clr){ clearDataset(clr.dataset.clear); return; }
  const add = tgt.closest('[data-add]');
  if(add){ const [k,m] = add.dataset.add.split('|'); addToTicket(k, m); return; }
  const addCombo = tgt.closest('[data-add-combo]');
  if(addCombo){ const [type,idx] = addCombo.dataset.addCombo.split('|'); addComboToTicket(type, parseInt(idx)); return; }
  const rml = tgt.closest('[data-rm-leg]');
  if(rml){ removeLeg(parseInt(rml.dataset.rmLeg)); return; }
  const hs = tgt.closest('[data-set-status]');
  if(hs){ const [id,st] = hs.dataset.setStatus.split('|'); setHistStatus(id, st); return; }
  const hd = tgt.closest('[data-rm-hist]');
  if(hd){ removeHist(hd.dataset.rmHist); return; }
  if(tgt.id==='confirmTicket'){ confirmTicket(); return; }
  if(tgt.id==='clearTicket'){ clearTicket(); return; }
  if(tgt.id==='exportTicketPDF'){ exportTicketPDF(); return; }
  if(tgt.id==='exportFullPDF'){ exportFullPDF(); return; }
  if(tgt.id==='exportJSON'){ exportJSON(); return; }
  if(tgt.id==='recomputeBtn'){ runDecisionEngine(); render(); showToast('Ricalcolato', 'ok'); return; }
  if(tgt.id==='upClearAllBtn'){ clearAllDatasets(); return; }
  if(tgt.id==='bkSave'){
   const tot = parseFloat(document.getElementById('bkTotal').value)||1000;
   const seg = parseFloat(document.getElementById('bkSeg').value)||tot;
   S.bankroll.total = tot; S.bankroll.segregated = seg;
   schedulePersist(); runDecisionEngine(); render();
   showToast('Salvato', 'ok'); return;
  }
  if(tgt.id==='bkResetWeek'){ if(!confirm('Reset?')) return; S.bankroll.startWeek = startOfWeekISO(); S.bankroll.pl_week = 0; schedulePersist(); render(); return; }
  if(tgt.id==='bkResetAll'){ if(!confirm('Reset?')) return; S.bankroll.pl_day = 0; S.bankroll.pl_week = 0; S.bankroll.afterLossActive = false; schedulePersist(); render(); return; }
 });

 document.body.addEventListener('input', e => {
  if(e.target.id==='kellyFrac'){ const v = parseFloat(e.target.value); document.getElementById('kellyFracOut').textContent = v.toFixed(2); S.bankroll.kellyFraction = v; schedulePersist(); runDecisionEngine(); }
  if(e.target.id==='capPct'){ const v = parseFloat(e.target.value); document.getElementById('capPctOut').textContent = (v*100).toFixed(1)+'%'; S.bankroll.capPct = v; schedulePersist(); runDecisionEngine(); }
  if(e.target.id==='stakeInp'){ S.ticket.stake = parseFloat(e.target.value)||0; schedulePersist(); const totalOdds = S.ticket.legs.reduce((s,l) => s*(l.odds||1), 1); const win = S.ticket.stake*totalOdds; const profit = win-S.ticket.stake; const wEls = document.querySelectorAll('.ticket-total .v'); if(wEls[0]) wEls[0].textContent = fmtEur(win); if(wEls[1]) wEls[1].textContent = fmtEur(profit); }
  if(e.target.id==='allSearch'){ S.ui.q = e.target.value; render(); }
 });

 bus.on('csv:loaded', () => render());
 bus.on('data:recomputed', () => { if(S.ui.tab==='oggi') renderOggi(); });
}

/* ==================== INIT ==================== */
async function init(){
 bindEvents();
 // Mostra subito la UI base (header, tab, pannello upload vuoto)
 render();
 // Carica stato da localStorage + CSV da IndexedDB
 const result = await loadState();
 // Se sono stati caricati CSV → ricalcola pronostici
 if(result && result.loaded > 0){
  runDecisionEngine();
  render();
  showToast(`📂 ${result.loaded} CSV caricati dall'archivio`, 'ok');
 } else {
  render();
  // Se NON ci sono dati né salvati né nuovi → apri pannello upload
  const hasData = DATASETS.some(d => (S.datasets[d.key]||[]).length>0);
  if(!hasData && !S.ui.uploadOpen){
   setTimeout(() => { document.getElementById('uploadTg').click(); }, 200);
  }
 }
 console.log('Match Analyzer Pro F5 v5 pronto');
}

global.MAP = {init, S, bus, runDecisionEngine, render, dbClearAll, clearAllDatasets};

if(document.readyState==='loading'){
 document.addEventListener('DOMContentLoaded', init);
} else {
 init();
}

})(window);
